<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Volley Scout - Splash</title>
  <link rel="stylesheet" href="animations.css?v=1">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#ffffff; min-height:100vh; display:flex; align-items:center; justify-content:center; color:#1e293b; }
    .splash { text-align:center; }
    .logo { width:min(80vw, 420px); height:auto; display:block; margin:0 auto 10px; }
    .title { font-weight:600; color:#2563eb; margin-bottom:6px; }
    .text { color:#374151; }
    .spinner { width:32px; height:32px; border:3px solid #e5e7eb; border-top:3px solid #2563eb; border-radius:999px; animation:spin 1s linear infinite; margin:12px auto 0; }
    @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg);} }
  </style>
</head>
<body>
  <div class="splash">
    <img class="logo" src="/c:/Users/STEFANO/Desktop/My-Volley-Scout/LOGO_APP.png" alt="My Volley Scout" onerror="this.onerror=null; this.src='./LOGO_APP.png';">
    <div class="title">My Volley Scout</div>
    <div class="text">Caricamento…</div>
    <div class="spinner"></div>
  </div>
  <script>
    window.addEventListener('load', function(){ try{ localStorage.removeItem('allowScoutingEntry'); }catch(_){} setTimeout(function(){ window.location.href = 'auth-login.html'; }, 900); });
  </script>
</body>
</html>
