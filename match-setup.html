<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Volley Scout - Nuova Partita</title>
    <link rel="stylesheet" href="animations.css?v=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            margin-bottom: 40px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 16px;
            transition: color 0.2s ease;
        }

        .back-btn:hover {
            color: #1a1a1a;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: #666;
            font-size: 16px;
        }

        .form-section {
            background: white;
            border-radius: 12px;
            padding: 32px;
            border: 2px solid #0d6efd; /* bordo blu coerente */
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 500;
            margin-bottom: 6px;
            color: #1a1a1a;
            font-size: 14px;
        }

        .required {
            color: #ef4444;
        }

        input[type="text"],
        input[type="date"],
        select,
        textarea {
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
            background: white;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .radio-group {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            transition: all 0.2s ease;
            background: white;
            flex: 1;
            justify-content: center;
        }

        .radio-option:hover {
            border-color: #3b82f6;
        }

        .radio-option.selected {
            border-color: #3b82f6;
            background: #eff6ff;
        }

        .radio-option input[type="radio"] {
            margin: 0;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 32px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        .btn-secondary:hover {
            background: #f9fafb;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
            border: 1px solid #fecaca;
        }

        .success-message {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
            border: 1px solid #bbf7d0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .form-section {
                padding: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .radio-group {
                flex-direction: column;
            }

            .form-actions {
                flex-direction: column-reverse;
            }

            .page-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- TopAppBar -->
        <header class="topappbar">
            <div class="topappbar-content">
                <div class="topappbar-left">
                    <a href="matches.html" class="back-btn" title="Torna alle partite">←</a>
                    <img src="./Copilot_20251105_011636.png" alt="Logo My Volley Scout" class="app-logo" width="64" height="64" />
                    <div class="app-title">My Volley Scout</div>
                </div>
                <div class="topappbar-right">
                    <button id="headerMenuToggle" class="top-account-btn" aria-expanded="false" aria-controls="headerMenu" title="Account">
                        <span class="menu-item-icon" aria-hidden="true" style="display:inline-flex;align-items:center;">
                          <!-- User icon -->
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 20v-1c0-3.314 3.582-6 8-6s8 2.686 8 6v1H4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </span>
                    </button>
                    <div id="headerMenu" class="top-account-menu" hidden>
                        <button id="goToMatchesBtnMobile" class="menu-item" aria-label="Vai a Elenco Partite" type="button">Vai a Elenco Partite</button>
                        <button id="goToTeamsBtnMobile" class="menu-item" aria-label="Vai a Elenco Squadre" type="button">Vai a Elenco Squadre</button>
                        <!-- Nuova voce: Esci (torna a Welcome.html) -->
                        <button id="exitToWelcomeBtnMobile" class="menu-item" aria-label="Esci" type="button">Esci</button>
                        <button id="signOutBtnMobile" class="menu-item" aria-label="Logout" type="button">Logout</button>
                    </div>
                </div>
            </div>
        </header>

        <script>
          // Toggle Account menu in TopAppBar (Match Setup)
          (function(){
            const toggle = document.getElementById('headerMenuToggle');
            const menu = document.getElementById('headerMenu');
            if (!toggle || !menu) return;
            const closeMenu = () => { menu.setAttribute('hidden',''); toggle.setAttribute('aria-expanded','false'); };
            toggle.addEventListener('click', () => {
              const isHidden = menu.hasAttribute('hidden');
              if (isHidden) { menu.removeAttribute('hidden'); toggle.setAttribute('aria-expanded','true'); }
              else { closeMenu(); }
            });
            document.addEventListener('click', (e) => {
              if (!menu.contains(e.target) && e.target !== toggle) closeMenu();
            });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMenu(); });
            // Handler per la nuova voce 'Esci' -> Welcome.html
            const exitBtn = document.getElementById('exitToWelcomeBtnMobile');
            if (exitBtn) {
              exitBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                window.location.href = 'welcome.html';
                closeMenu();
              });
            }
          })();
        </script>

        <!-- Form Section -->
        <div class="form-section">
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="matchForm">
                <div class="form-grid">
                    <!-- Avversario e Data -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="opponent">
                                Squadra Avversaria <span class="required">*</span>
                            </label>
                            <input type="text" id="opponent" name="opponent" required placeholder="Nome squadra avversaria">
                        </div>
                        <div class="form-group">
                            <label for="matchDate">
                                Data Partita <span class="required">*</span>
                            </label>
                            <input type="date" id="matchDate" name="matchDate" required>
                        </div>
                    </div>

                    <!-- Tipo Evento -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventType">
                                Tipo Evento <span class="required">*</span>
                            </label>
                            <select id="eventType" name="eventType" required>
                                <option value="">Seleziona tipo evento</option>
                                <option value="campionato">Campionato</option>
                                <option value="coppa">Coppa</option>
                                <option value="playoff">Playoff</option>
                                <option value="amichevole">Amichevole</option>
                                <option value="torneo">Torneo</option>
                                <option value="altro">Altro</option>
                            </select>
                        </div>
                    </div>

                    <!-- Casa/Trasferta -->
                    <div class="form-group">
                        <label>
                            Luogo Partita <span class="required">*</span>
                        </label>
                        <div class="radio-group">
                            <div class="radio-option" data-value="casa">
                                <input type="radio" id="casa" name="location" value="casa" required>
                                <label for="casa">Casa</label>
                            </div>
                            <div class="radio-option" data-value="trasferta">
                                <input type="radio" id="trasferta" name="location" value="trasferta" required>
                                <label for="trasferta">Trasferta</label>
                            </div>
                        </div>
                    </div>

                    <!-- Palazzetto -->
                    <div class="form-group">
                        <label for="venue">
                            Palazzetto/Sede
                        </label>
                        <input type="text" id="venue" name="venue" placeholder="Nome del palazzetto o sede">
                    </div>

                    <!-- Descrizione -->
                    <div class="form-group">
                        <label for="description">
                            Note aggiuntive
                        </label>
                        <textarea id="description" name="description" placeholder="Note sulla partita (importanza, condizioni particolari, ecc.)"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="window.history.back()">Annulla</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Continua →</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="./connection-manager.js"></script>
    <script src="./firebase-config.js"></script>
    <script src="./firestore-service.js"></script>
    <script src="./auth.js"></script>
    <script src="./src/modules/teams/teams.js"></script>
    <script src="./src/modules/matches/matches.js"></script>
    <script src="./src/modules/scouting/scouting.js"></script>

    <script>
        // Variabili globali
        let currentUser = null;

        // Elementi DOM
        const matchForm = document.getElementById('matchForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');
        const radioOptions = document.querySelectorAll('.radio-option');

        // Inizializzazione
        document.addEventListener('DOMContentLoaded', function() {
            initializeMatchSetup();
            setupRadioButtons();
            setDefaultDate();
        });

        function initializeMatchSetup() {
            // Attendi che Firebase sia pronto
            if (typeof window.authFunctions === 'undefined') {
                setTimeout(initializeMatchSetup, 200);
                return;
            }

            // Controlla autenticazione
            window.authFunctions.onAuthStateChanged((user) => {
                if (!user) {
    window.location.href = '/auth-login.html';
                    return;
                }
                
                currentUser = user;
            });

            // Event listeners
            matchForm.addEventListener('submit', handleFormSubmit);
        }

        function setupRadioButtons() {
            radioOptions.forEach(option => {
                option.addEventListener('click', function() {
                    const value = this.dataset.value;
                    const radio = this.querySelector('input[type="radio"]');
                    
                    // Rimuovi selezione da tutti
                    radioOptions.forEach(opt => opt.classList.remove('selected'));
                    
                    // Aggiungi selezione al corrente
                    this.classList.add('selected');
                    radio.checked = true;
                });
            });
        }

        function setDefaultDate() {
            const today = new Date();
            const dateString = today.toISOString().split('T')[0];
            document.getElementById('matchDate').value = dateString;
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
            
            // Scroll to top
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            hideMessages();

            // Validazione form
            const formData = new FormData(matchForm);
            const matchData = {
                opponent: formData.get('opponent')?.trim(),
                matchDate: formData.get('matchDate'),
                eventType: formData.get('eventType'),
                location: formData.get('location'),
                venue: formData.get('venue')?.trim(),
                description: formData.get('description')?.trim(),
                teamId: localStorage.getItem('selectedTeamId'),
                createdAt: new Date().toISOString(),
                status: 'setup'
            };

            // Validazioni
            if (!matchData.opponent) {
                showError('Il nome della squadra avversaria è obbligatorio');
                return;
            }

            if (!matchData.matchDate) {
                showError('La data della partita è obbligatoria');
                return;
            }

            if (!matchData.eventType) {
                showError('Il tipo di evento è obbligatorio');
                return;
            }

            if (!matchData.location) {
                showError('Devi specificare se la partita è in casa o in trasferta');
                return;
            }

            if (!matchData.teamId) {
                showError('Errore: nessuna squadra selezionata');
                return;
            }

            // Disabilita il pulsante durante il salvataggio
            submitBtn.disabled = true;
            submitBtn.textContent = 'Salvataggio...';

            try {
                // Genera ID partita e arricchisci con info squadra
                const matchId = 'match_' + Date.now();
                matchData.id = matchId;
                const currentTeam = window.teamsModule?.getCurrentTeam?.();
                const selectedTeamId = matchData.teamId;
                const myTeamName = currentTeam?.name || null;

                // Prepara payload coerente con uso generale
                const payload = {
                    id: matchId,
                    teamId: selectedTeamId,
                    myTeam: myTeamName,
                    opponentTeam: matchData.opponent,
                    matchDate: matchData.matchDate,
                    eventType: matchData.eventType,
                    location: matchData.location,
                    venue: matchData.venue || '',
                    description: matchData.description || '',
                    status: 'planned',
                    createdAt: matchData.createdAt,
                    updatedAt: new Date().toISOString()
                };

                // 1) Persistenza locale: aggiungi/aggiorna in volleyMatches
                try {
                    const local = JSON.parse(localStorage.getItem('volleyMatches') || '[]');
                    local.unshift(payload);
                    localStorage.setItem('volleyMatches', JSON.stringify(local));
                } catch (e) {
                    console.warn('Salvataggio locale partita non riuscito:', e);
                }

                // 2) Persistenza cloud (se utente loggato e funzioni disponibili)
                try {
                    if (window.authFunctions?.getCurrentUser && window.firestoreFunctions?.saveMatch) {
                        const user = window.authFunctions.getCurrentUser();
                        if (user) {
                            await window.firestoreFunctions.saveMatch(payload);
                        }
                    }
                } catch (e) {
                    console.warn('Salvataggio cloud non riuscito (proseguo):', e);
                }

                // 3) Imposta setup corrente per set-config
                localStorage.setItem('currentMatchSetup', JSON.stringify(matchData));

                showSuccess('Partita salvata! Reindirizzamento alla configurazione set...');

                // Reindirizza alla configurazione dei set dopo breve attesa
                setTimeout(() => {
                    window.location.href = 'set-config.html';
                }, 1200);

            } catch (error) {
                console.error('Errore nel salvataggio:', error);
                showError('Errore nel salvataggio dei dati. Riprova.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Continua →';
            }
        }
    </script>
</body>
</html>
