<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Volley Scout - Nuova Partita</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            margin-bottom: 40px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 16px;
            transition: color 0.2s ease;
        }

        .back-btn:hover {
            color: #1a1a1a;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: #666;
            font-size: 16px;
        }

        .form-section {
            background: white;
            border-radius: 12px;
            padding: 32px;
            border: 1px solid #e5e5e5;
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 500;
            margin-bottom: 6px;
            color: #1a1a1a;
            font-size: 14px;
        }

        .required {
            color: #ef4444;
        }

        input[type="text"],
        input[type="date"],
        select,
        textarea {
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
            background: white;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .radio-group {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            transition: all 0.2s ease;
            background: white;
            flex: 1;
            justify-content: center;
        }

        .radio-option:hover {
            border-color: #3b82f6;
        }

        .radio-option.selected {
            border-color: #3b82f6;
            background: #eff6ff;
        }

        .radio-option input[type="radio"] {
            margin: 0;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 32px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        .btn-secondary:hover {
            background: #f9fafb;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
            border: 1px solid #fecaca;
        }

        .success-message {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
            border: 1px solid #bbf7d0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .form-section {
                padding: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .radio-group {
                flex-direction: column;
            }

            .form-actions {
                flex-direction: column-reverse;
            }

            .page-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <a href="matches.html" class="back-btn">
                ← Torna alle partite
            </a>
            <h1 class="page-title">Nuova Partita</h1>
            <p class="page-subtitle">Inserisci i dettagli della partita per iniziare lo scouting</p>
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="matchForm">
                <div class="form-grid">
                    <!-- Avversario e Data -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="opponent">
                                Squadra Avversaria <span class="required">*</span>
                            </label>
                            <input type="text" id="opponent" name="opponent" required placeholder="Nome squadra avversaria">
                        </div>
                        <div class="form-group">
                            <label for="matchDate">
                                Data Partita <span class="required">*</span>
                            </label>
                            <input type="date" id="matchDate" name="matchDate" required>
                        </div>
                    </div>

                    <!-- Tipo Evento -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventType">
                                Tipo Evento <span class="required">*</span>
                            </label>
                            <select id="eventType" name="eventType" required>
                                <option value="">Seleziona tipo evento</option>
                                <option value="campionato">Campionato</option>
                                <option value="coppa">Coppa</option>
                                <option value="playoff">Playoff</option>
                                <option value="amichevole">Amichevole</option>
                                <option value="torneo">Torneo</option>
                                <option value="altro">Altro</option>
                            </select>
                        </div>
                    </div>

                    <!-- Casa/Trasferta -->
                    <div class="form-group">
                        <label>
                            Luogo Partita <span class="required">*</span>
                        </label>
                        <div class="radio-group">
                            <div class="radio-option" data-value="casa">
                                <input type="radio" id="casa" name="location" value="casa" required>
                                <label for="casa">Casa</label>
                            </div>
                            <div class="radio-option" data-value="trasferta">
                                <input type="radio" id="trasferta" name="location" value="trasferta" required>
                                <label for="trasferta">Trasferta</label>
                            </div>
                        </div>
                    </div>

                    <!-- Palazzetto -->
                    <div class="form-group">
                        <label for="venue">
                            Palazzetto/Sede
                        </label>
                        <input type="text" id="venue" name="venue" placeholder="Nome del palazzetto o sede">
                    </div>

                    <!-- Descrizione -->
                    <div class="form-group">
                        <label for="description">
                            Note aggiuntive
                        </label>
                        <textarea id="description" name="description" placeholder="Note sulla partita (importanza, condizioni particolari, ecc.)"></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="window.history.back()">Annulla</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Continua →</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="./connection-manager.js"></script>
    <script src="./firebase-config.js"></script>
    <script src="./firestore-service.js"></script>
    <script src="./auth.js"></script>
    <script src="./src/modules/teams/teams.js"></script>
    <script src="./src/modules/matches/matches.js"></script>
    <script src="./src/modules/scouting/scouting.js"></script>

    <script>
        // Variabili globali
        let currentUser = null;

        // Elementi DOM
        const matchForm = document.getElementById('matchForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');
        const radioOptions = document.querySelectorAll('.radio-option');

        // Inizializzazione
        document.addEventListener('DOMContentLoaded', function() {
            initializeMatchSetup();
            setupRadioButtons();
            setDefaultDate();
        });

        function initializeMatchSetup() {
            // Attendi che Firebase sia pronto
            if (typeof window.authFunctions === 'undefined') {
                setTimeout(initializeMatchSetup, 200);
                return;
            }

            // Controlla autenticazione
            window.authFunctions.onAuthStateChanged((user) => {
                if (!user) {
                    window.location.href = 'auth-login.html';
                    return;
                }
                
                currentUser = user;
            });

            // Event listeners
            matchForm.addEventListener('submit', handleFormSubmit);
        }

        function setupRadioButtons() {
            radioOptions.forEach(option => {
                option.addEventListener('click', function() {
                    const value = this.dataset.value;
                    const radio = this.querySelector('input[type="radio"]');
                    
                    // Rimuovi selezione da tutti
                    radioOptions.forEach(opt => opt.classList.remove('selected'));
                    
                    // Aggiungi selezione al corrente
                    this.classList.add('selected');
                    radio.checked = true;
                });
            });
        }

        function setDefaultDate() {
            const today = new Date();
            const dateString = today.toISOString().split('T')[0];
            document.getElementById('matchDate').value = dateString;
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
            
            // Scroll to top
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            hideMessages();

            // Validazione form
            const formData = new FormData(matchForm);
            const matchData = {
                opponent: formData.get('opponent')?.trim(),
                matchDate: formData.get('matchDate'),
                eventType: formData.get('eventType'),
                location: formData.get('location'),
                venue: formData.get('venue')?.trim(),
                description: formData.get('description')?.trim(),
                teamId: localStorage.getItem('selectedTeamId'),
                createdAt: new Date().toISOString(),
                status: 'setup'
            };

            // Validazioni
            if (!matchData.opponent) {
                showError('Il nome della squadra avversaria è obbligatorio');
                return;
            }

            if (!matchData.matchDate) {
                showError('La data della partita è obbligatoria');
                return;
            }

            if (!matchData.eventType) {
                showError('Il tipo di evento è obbligatorio');
                return;
            }

            if (!matchData.location) {
                showError('Devi specificare se la partita è in casa o in trasferta');
                return;
            }

            if (!matchData.teamId) {
                showError('Errore: nessuna squadra selezionata');
                return;
            }

            // Disabilita il pulsante durante il salvataggio
            submitBtn.disabled = true;
            submitBtn.textContent = 'Salvataggio...';

            try {
                // Salva i dati della partita nel localStorage per ora
                // TODO: Salvare in Firestore
                const matchId = 'match_' + Date.now();
                matchData.id = matchId;
                
                localStorage.setItem('currentMatchSetup', JSON.stringify(matchData));
                
                showSuccess('Dati partita salvati! Reindirizzamento alla configurazione set...');
                
                // Reindirizza alla configurazione dei set dopo 2 secondi
                setTimeout(() => {
                    window.location.href = 'set-config.html';
                }, 2000);
                
            } catch (error) {
                console.error('Errore nel salvataggio:', error);
                showError('Errore nel salvataggio dei dati. Riprova.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Continua Setup →';
            }
        }
    </script>
</body>
</html>
