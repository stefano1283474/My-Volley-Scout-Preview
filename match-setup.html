<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Volley Scout - Nuova Partita</title>
    <link rel="stylesheet" href="animations.css?v=1">
    <!-- Design system globale -->
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/styles/components.css">
    <link rel="stylesheet" href="styles.css">
    <style>
      /* Allinea layout di intestazione a matches.html */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: var(--font-family); background: #ffffff; color: #333; min-height: 100vh; }
      button, input, select, textarea { font-family: inherit; }
      .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

      .header { background: #ffffff; border-radius: 12px; padding: 8px 12px; margin-bottom: 16px; display: flex; justify-content: center; align-items: center; position: relative; }
      .logo { display: flex; align-items: center; gap: 10px; }
      .logo-icon { width: 100%; max-width: 576px; height: 180px; overflow: hidden; display: block; margin: 0 auto; }
      .logo-icon img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 40%; display: block; }

      .account-actions { position: absolute; top: 8px; right: 8px; display: flex; align-items: center; z-index: 2; }
      .back-actions { position: absolute; top: 8px; left: 8px; display: flex; align-items: center; z-index: 2; }
      .icon-button { background: #ffffff; color: #0d6efd; border: 1px solid #e9ecef; padding: 6px; border-radius: 8px; cursor: pointer; transition: background .15s ease, color .15s ease, border-color .15s ease, transform .15s ease; }
      .icon-button:hover { background: #f8f9fa; border-color: #dbe1e6; transform: translateY(-1px); }

      .account-dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: #ffffff; border: 1px solid #e9ecef; border-radius: 8px; box-shadow: 0 4px 14px rgba(0,0,0,.08); min-width: 160px; }
      .account-dropdown .menu-item { width: 100%; padding: 10px 12px; text-align: left; background: transparent; border: none; cursor: pointer; color: #333; }
      .account-dropdown .menu-item:hover { background: #f8f9fa; }

      /* Toggle Casa/Trasferta come pulsanti che cambiano colore */
      .radio-group { display: flex; gap: var(--space-4); flex-wrap: wrap; }
      .radio-option { display:flex; align-items:center; justify-content:center; padding: var(--space-3) var(--space-5); border: 1px solid var(--outline); border-radius: var(--radius-lg); background: var(--surface); color: var(--on-surface-variant); cursor: pointer; transition: all var(--transition-fast); min-width: 120px; }
      .radio-option:hover { border-color: var(--primary-300); background: var(--primary-50); }
      .radio-option.selected { border-color: var(--primary-600); background: var(--primary-600); color: #fff; }

      /* Azioni form: mantiene su una riga anche su mobile e rende i bottoni più compatti */
      .form-actions { flex-wrap: wrap; justify-content: flex-end; }
      .btn-compact { padding: var(--space-2) var(--space-4); font-size: var(--font-size-sm); min-height: 36px; min-width: 96px; }
      @media (max-width: 768px) {
        .form-actions { flex-direction: row !important; }
        .form-actions .btn { width: auto !important; }
      }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header coerente con matches.html -->
        <header class="header">
            <div class="back-actions">
                <a href="matches.html" class="icon-button" title="Torna alle partite" id="backBtn" aria-label="Indietro">←</a>
            </div>
            <div class="account-actions">
                <button id="headerMenuToggle" class="icon-button" aria-expanded="false" aria-controls="headerMenu" title="Account">
                    <span class="menu-item-icon" aria-hidden="true" style="display:inline-flex;align-items:center;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 20v-1c0-3.314 3.582-6 8-6s8 2.686 8 6v1H4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </span>
                </button>
                <div id="headerMenu" class="account-dropdown" hidden>
                    <button id="goToMatchesBtnMobile" class="menu-item" aria-label="Vai a Elenco Partite" type="button">Vai a Elenco Partite</button>
                    <button id="goToTeamsBtnMobile" class="menu-item" aria-label="Vai a Elenco Squadre" type="button">Vai a Elenco Squadre</button>
                    <button id="exitToWelcomeBtnMobile" class="menu-item" aria-label="Esci" type="button">Esci</button>
                    <button id="signOutBtnMobile" class="menu-item" aria-label="Logout" type="button">Logout</button>
                </div>
            </div>
            <div class="logo">
                <div class="logo-icon">
                    <img src="/c:/Users/STEFANO/Desktop/My-Volley-Scout/LOGO_APP.png" alt="Logo My Volley Scout"
                         onerror="this.onerror=null; this.src='./LOGO_APP.png';" />
                </div>
            </div>
        </header>

        <script>
          // Toggle Account menu (header)
          (function(){
            const toggle = document.getElementById('headerMenuToggle');
            const menu = document.getElementById('headerMenu');
            if (!toggle || !menu) return;
            const closeMenu = () => { menu.setAttribute('hidden',''); toggle.setAttribute('aria-expanded','false'); };
            toggle.addEventListener('click', () => {
              const isHidden = menu.hasAttribute('hidden');
              if (isHidden) { menu.removeAttribute('hidden'); toggle.setAttribute('aria-expanded','true'); }
              else { closeMenu(); }
            });
            document.addEventListener('click', (e) => {
              if (!menu.contains(e.target) && e.target !== toggle) closeMenu();
            });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMenu(); });
            // Handler per la nuova voce 'Esci' -> Welcome.html
            const exitBtn = document.getElementById('exitToWelcomeBtnMobile');
            if (exitBtn) {
              exitBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                window.location.href = 'welcome.html';
                closeMenu();
              });
            }
          })();
        </script>

        <!-- Sezione form con classi globali -->
        <div class="match-form">
            <h2 id="match-setup-title" class="section-title">Nuova Partita</h2>
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="matchForm">
                    <!-- Avversario e Data -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="opponent">
                                Squadra Avversaria <span class="required">*</span>
                            </label>
                            <input type="text" id="opponent" name="opponent" required placeholder="Nome squadra avversaria">
                        </div>
                        <div class="form-group">
                            <label for="matchDate">
                                Data Partita <span class="required">*</span>
                            </label>
                            <input type="date" id="matchDate" name="matchDate" required>
                        </div>
                    </div>

                    <!-- Tipo Evento -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventType">
                                Tipo Evento <span class="required">*</span>
                            </label>
                            <select id="eventType" name="eventType" required>
                                <option value="">Seleziona tipo evento</option>
                                <option value="campionato">Campionato</option>
                                <option value="coppa">Coppa</option>
                                <option value="playoff">Playoff</option>
                                <option value="amichevole">Amichevole</option>
                                <option value="torneo">Torneo</option>
                                <option value="altro">Altro</option>
                            </select>
                        </div>
                    </div>

                    <!-- Casa/Trasferta -->
                    <div class="form-group">
                        <label>
                            Luogo Partita <span class="required">*</span>
                        </label>
                        <div class="radio-group">
                            <div class="radio-option" data-value="casa" role="button" tabindex="0" aria-pressed="false">Casa</div>
                            <div class="radio-option" data-value="trasferta" role="button" tabindex="0" aria-pressed="false">Trasferta</div>
                        </div>
                        <input type="hidden" id="locationInput" name="location" value="">
                    </div>

                    <!-- Palazzetto/Sede rimosso su richiesta utente -->

                    <!-- Descrizione -->
                    <div class="form-group">
                        <label for="description">
                            Note aggiuntive
                        </label>
                        <textarea id="description" name="description" placeholder="Note sulla partita (importanza, condizioni particolari, ecc.)"></textarea>
                    </div>
                

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary btn-compact" onclick="window.history.back()">Annulla</button>
                    <button type="submit" class="btn btn-secondary btn-compact" id="submitBtn" disabled>Continua →</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="./connection-manager.js"></script>
    <script src="./firebase-config.js"></script>
    <script src="./firestore-service.js"></script>
    <script src="./auth.js"></script>
    <script src="./src/modules/teams/teams.js"></script>
    <script src="./src/modules/matches/matches.js"></script>
    <script src="./src/modules/scouting/scouting.js"></script>

    <script>
        // Variabili globali
        let currentUser = null;

        // Elementi DOM
        const matchForm = document.getElementById('matchForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');
        const radioOptions = document.querySelectorAll('.radio-option');

        // Inizializzazione
        document.addEventListener('DOMContentLoaded', function() {
            initializeMatchSetup();
            setupRadioButtons();
            setDefaultDate();
            bindLiveValidation();
            updateSubmitState();
        });

        function initializeMatchSetup() {
            // Attendi che Firebase sia pronto
            if (typeof window.authFunctions === 'undefined') {
                setTimeout(initializeMatchSetup, 200);
                return;
            }

            // Controlla autenticazione
            window.authFunctions.onAuthStateChanged((user) => {
                if (!user) {
    window.location.href = '/auth-login.html';
                    return;
                }
                
                currentUser = user;
            });

            // Event listeners
            matchForm.addEventListener('submit', handleFormSubmit);
        }

        function setupRadioButtons() {
            radioOptions.forEach(option => {
                option.addEventListener('click', function() {
                    const value = this.dataset.value;
                    const hidden = document.getElementById('locationInput');
                    // Rimuovi selezione da tutti
                    radioOptions.forEach(opt => {
                        opt.classList.remove('selected');
                        opt.setAttribute('aria-pressed','false');
                    });
                    // Aggiungi selezione al corrente
                    this.classList.add('selected');
                    this.setAttribute('aria-pressed','true');
                    if (hidden) hidden.value = value;
                    updateSubmitState();
                });
                // Selezione da tastiera (Enter/Space)
                option.addEventListener('keydown', function(e){
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            });
        }

        function setDefaultDate() {
            const today = new Date();
            const dateString = today.toISOString().split('T')[0];
            document.getElementById('matchDate').value = dateString;
            updateSubmitState();
        }

        function bindLiveValidation() {
            const opponentEl = document.getElementById('opponent');
            const matchDateEl = document.getElementById('matchDate');
            const eventTypeEl = document.getElementById('eventType');
            const locationEl = document.getElementById('locationInput');
            if (opponentEl) opponentEl.addEventListener('input', updateSubmitState);
            if (matchDateEl) matchDateEl.addEventListener('change', updateSubmitState);
            if (eventTypeEl) eventTypeEl.addEventListener('change', updateSubmitState);
            if (locationEl) locationEl.addEventListener('change', updateSubmitState);
        }

        function updateSubmitState() {
            const opponent = document.getElementById('opponent')?.value.trim();
            const matchDate = document.getElementById('matchDate')?.value;
            const eventType = document.getElementById('eventType')?.value;
            const location = document.getElementById('locationInput')?.value;
            const allValid = !!(opponent && matchDate && eventType && location);
            if (!submitBtn) return;
            submitBtn.disabled = !allValid;
            if (allValid) {
                submitBtn.classList.remove('btn-secondary');
                submitBtn.classList.add('btn-primary');
            } else {
                submitBtn.classList.add('btn-secondary');
                submitBtn.classList.remove('btn-primary');
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
            
            // Scroll to top
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            hideMessages();

            // Validazione form
            const formData = new FormData(matchForm);
            const matchData = {
                opponent: formData.get('opponent')?.trim(),
                matchDate: formData.get('matchDate'),
                eventType: formData.get('eventType'),
                location: formData.get('location'),
                description: formData.get('description')?.trim(),
                teamId: localStorage.getItem('selectedTeamId'),
                createdAt: new Date().toISOString(),
                status: 'setup'
            };

            // Validazioni
            if (!matchData.opponent) {
                showError('Il nome della squadra avversaria è obbligatorio');
                return;
            }

            if (!matchData.matchDate) {
                showError('La data della partita è obbligatoria');
                return;
            }

            if (!matchData.eventType) {
                showError('Il tipo di evento è obbligatorio');
                return;
            }

            if (!matchData.location) {
                showError('Devi specificare se la partita è in casa o in trasferta');
                return;
            }

            if (!matchData.teamId) {
                showError('Errore: nessuna squadra selezionata');
                return;
            }

            // Disabilita il pulsante durante il salvataggio
            submitBtn.disabled = true;
            submitBtn.textContent = 'Salvataggio...';

            try {
                // Genera ID partita e arricchisci con info squadra
                const matchId = 'match_' + Date.now();
                matchData.id = matchId;
                const currentTeam = window.teamsModule?.getCurrentTeam?.();
                const selectedTeamId = matchData.teamId;
                const myTeamName = currentTeam?.name || null;

                // Prepara payload coerente con uso generale
                const payload = {
                    id: matchId,
                    teamId: selectedTeamId,
                    myTeam: myTeamName,
                    opponentTeam: matchData.opponent,
                    matchDate: matchData.matchDate,
                    eventType: matchData.eventType,
                    location: matchData.location,
                    description: matchData.description || '',
                    status: 'planned',
                    createdAt: matchData.createdAt,
                    updatedAt: new Date().toISOString()
                };

                // 1) Persistenza locale: aggiungi/aggiorna in volleyMatches
                try {
                    const local = JSON.parse(localStorage.getItem('volleyMatches') || '[]');
                    local.unshift(payload);
                    localStorage.setItem('volleyMatches', JSON.stringify(local));
                } catch (e) {
                    console.warn('Salvataggio locale partita non riuscito:', e);
                }

                // 2) Persistenza cloud (se utente loggato e funzioni disponibili)
                try {
                    if (window.authFunctions?.getCurrentUser && window.firestoreFunctions?.saveMatch) {
                        const user = window.authFunctions.getCurrentUser();
                        if (user) {
                            await window.firestoreFunctions.saveMatch(payload);
                        }
                    }
                } catch (e) {
                    console.warn('Salvataggio cloud non riuscito (proseguo):', e);
                }

                // 3) Imposta setup corrente per set-config
                localStorage.setItem('currentMatchSetup', JSON.stringify(matchData));

                showSuccess('Partita salvata! Reindirizzamento alla configurazione set...');

                // Reindirizza alla configurazione dei set dopo breve attesa
                setTimeout(() => {
                    window.location.href = 'set-config.html';
                }, 1200);

            } catch (error) {
                console.error('Errore nel salvataggio:', error);
                showError('Errore nel salvataggio dei dati. Riprova.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Continua →';
            }
        }
    </script>
</body>
</html>
