<!DOCTYPE html>

<head>

    <style>
      /* Allinea layout di intestazione a matches.html */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: var(--font-family); background: #ffffff; color: #333; min-height: 100vh; }
      button, input, select, textarea { font-family: inherit; }
      .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

      .header { background: #ffffff; border-radius: 12px; padding: 8px 12px; margin-bottom: 16px; display: flex; justify-content: center; align-items: center; position: relative; }
      .logo { display: flex; align-items: center; gap: 10px; }
      .logo-icon { width: 100%; max-width: 576px; height: 180px; overflow: hidden; display: block; margin: 0 auto; }
      .logo-icon img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 40%; display: block; }

      .account-actions { position: absolute; top: 8px; right: 8px; display: flex; align-items: center; z-index: 2; }
      .back-actions { position: absolute; top: 8px; left: 8px; display: flex; align-items: center; z-index: 2; }
      .icon-button { background: #ffffff; color: #0d6efd; border: 1px solid #e9ecef; padding: 6px; border-radius: 8px; cursor: pointer; transition: background .15s ease, color .15s ease, border-color .15s ease, transform .15s ease; }
      .icon-button:hover { background: #f8f9fa; border-color: #dbe1e6; transform: translateY(-1px); }
      .icon-button-primary { background:#2563eb; color:#fff; border:1px solid #2563eb; }
      .icon-button-circle { width:32px; height:32px; min-width:32px; min-height:32px; display:inline-flex; align-items:center; justify-content:center; border-radius:999px; padding:0; }
      .icon-button-outline { background:#fff; color:#2563eb; border:1px solid #2563eb; }

      .account-dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: #ffffff; border: 1px solid #e9ecef; border-radius: 8px; box-shadow: 0 4px 14px rgba(0,0,0,.08); min-width: 160px; }
      .account-dropdown .menu-item { width: 100%; padding: 10px 12px; text-align: left; background: transparent; border: none; cursor: pointer; color: #333; }
      .account-dropdown .menu-item:hover { background: #f8f9fa; }

      /* Toggle Casa/Trasferta come pulsanti che cambiano colore */
      .radio-group { display: flex; gap: var(--space-4); flex-wrap: wrap; }
      .radio-option { display:flex; align-items:center; justify-content:center; padding: var(--space-3) var(--space-5); border: 1px solid var(--outline); border-radius: var(--radius-lg); background: var(--surface); color: var(--on-surface-variant); cursor: pointer; transition: all var(--transition-fast); min-width: 120px; }
      .radio-option:hover { border-color: var(--primary-300); background: var(--primary-50); }
      .radio-option.selected { border-color: var(--primary-600); background: var(--primary-600); color: #fff; }

      /* Azioni form: mantiene su una riga anche su mobile e rende i bottoni più compatti */
      .form-actions { flex-wrap: wrap; justify-content: flex-end; }
      .btn-compact { padding: var(--space-2) var(--space-4); font-size: var(--font-size-sm); min-height: 36px; min-width: 96px; }
      .section-card { border:1px solid #2563eb; border-radius:16px; padding:16px; background:#fff; margin:16px 0; }
      .section-title-row { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:12px 0 10px 0; flex-wrap: nowrap; }
      .section-title { font-size:18px; font-weight:700; color:#0f172a; }
      .rounded-title { border: 1px solid #e9ecef; border-radius: 12px; padding: 6px 12px; display: inline-block; background: #ffffff; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
      .section-title-row .section-title { margin: 0; }
      .section-title-row #submitBtn { margin: 0; min-height: 32px; padding: 6px 10px; }
      .section-card input,
      .section-card select,
      .section-card textarea { border: 1px solid #0d6efd; background:#fff; }
      .section-subtle { color:#64748b; }
      @keyframes pageSlideIn { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      .page-slide-in { animation: pageSlideIn .24s ease-out; }
      /* Animazione uniforme per elementi cliccabili (stile card squadra) */
      .btn,
      .icon-button,
      .radio-option {
        transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      }
      .btn:hover,
      .icon-button:hover,
      .radio-option:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(0,0,0,0.10);
      }
      .btn:active,
      .icon-button:active,
      .radio-option:active {
        transform: translateY(0);
        box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      }
      @media (max-width: 768px) {
        .form-actions { flex-direction: row !important; }
        .form-actions .btn { width: auto !important; }
      }
    </style>
</head>
<body>

        <script>document.addEventListener('DOMContentLoaded',function(){var c=document.querySelector('.container');if(c)c.classList.add('page-slide-in');});</script>

                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 20v-1c0-3.314 3.582-6 8-6s8 2.686 8 6v1H4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>

        <script>
          // Toggle Account menu (header)
          (function(){
            const toggle = document.getElementById('headerMenuToggle');
            const menu = document.getElementById('headerMenu');
            if (!toggle || !menu) return;
            const closeMenu = () => { menu.setAttribute('hidden',''); toggle.setAttribute('aria-expanded','false'); };
            toggle.addEventListener('click', () => {
              const isHidden = menu.hasAttribute('hidden');
              if (isHidden) { menu.removeAttribute('hidden'); toggle.setAttribute('aria-expanded','true'); }
              else { closeMenu(); }
            });
            document.addEventListener('click', (e) => {
              if (!menu.contains(e.target) && e.target !== toggle) closeMenu();
            });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMenu(); });
            // Handler per la nuova voce 'Esci' -> Welcome.html
            const exitBtn = document.getElementById('exitToWelcomeBtnMobile');
            if (exitBtn) {
              exitBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                window.location.href = '/my-teams.html';
                closeMenu();
              });
            }
          })();
        </script>
        <script>

            const goToMatchesBtnMobile = document.getElementById('goToMatchesBtnMobile');
            const goToTeamsBtnMobile = document.getElementById('goToTeamsBtnMobile');
            const signOutBtnMobile = document.getElementById('signOutBtnMobile');
            if (goToMatchesBtnMobile) {
              goToMatchesBtnMobile.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); window.location.href='/matches.html'; });
            }
            if (goToTeamsBtnMobile) {
              goToTeamsBtnMobile.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); window.location.href='/my-teams.html'; });
            }
            if (signOutBtnMobile && window.authFunctions?.signOut) {
              signOutBtnMobile.addEventListener('click', async (e)=>{ e.preventDefault(); e.stopPropagation(); try { await window.authFunctions.signOut(); localStorage.removeItem('selectedTeamId'); try{ if(location.hash){ history.replaceState(null,'',location.pathname); } }catch(_){ } window.location.href='/auth-login.html'; } catch(_){} });
            }
          })();

    <script>
        // Variabili globali
        let currentUser = null;
        let currentRoster = [];
        let derivedTeamName = null;
        let derivedClubName = null;

        // Elementi DOM
        const matchForm = document.getElementById('matchForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');
        const radioOptions = document.querySelectorAll('.radio-option');

        // Inizializzazione
        document.addEventListener('DOMContentLoaded', function() {
            initializeMatchSetup();
            setupRadioButtons();
            setDefaultDate();
            bindLiveValidation();
            restoreMyFields();
            updateSubmitState();
        });

        function initializeMatchSetup() {
            // Attendi che Firebase sia pronto
            if (typeof window.authFunctions === 'undefined') {
                setTimeout(initializeMatchSetup, 200);
                return;
            }

            // Controlla autenticazione
            window.authFunctions.onAuthStateChanged((user) => {
                if (!user) {
    try{ if(location.hash){ history.replaceState(null,'',location.pathname); } }catch(_){ } window.location.href = '/auth-login.html';
                    return;
                }
                
                currentUser = user;
            });

            // Event listeners
            matchForm.addEventListener('submit', handleFormSubmit);
            const importRosterIcon = document.getElementById('importRosterIcon');
            const exportRosterIcon = document.getElementById('exportRosterIcon');
            const createRosterIcon = document.getElementById('createRosterIcon');
            const confirmRosterBtn = document.getElementById('confirmRosterBtn');
            const cancelRosterBtn = document.getElementById('cancelRosterBtn');
            const rosterCsvInput = document.getElementById('rosterCsvInput');
            if (importRosterIcon) importRosterIcon.addEventListener('click', () => rosterCsvInput && rosterCsvInput.click());
            if (exportRosterIcon) exportRosterIcon.addEventListener('click', exportRosterCSV);
            if (rosterCsvInput) rosterCsvInput.addEventListener('change', (e) => { const f = e.target.files && e.target.files[0]; if (f) importRosterCSV(f); e.target.value = ''; });
            if (createRosterIcon) createRosterIcon.addEventListener('click', () => { showRosterEditor(); currentRoster = Array.isArray(currentRoster)?currentRoster:[]; if (!currentRoster.length) { for (let i=0;i<7;i++) addRosterRow(); addRosterRow(); } else { renderRosterRows(currentRoster); addRosterRow(); } updateSubmitState(); updateConfirmRosterState(); });
            if (confirmRosterBtn) confirmRosterBtn.addEventListener('click', confirmCurrentRoster);
            if (cancelRosterBtn) cancelRosterBtn.addEventListener('click', cancelRosterEditing);
            renderRosterList();
            updateConfirmRosterState();
            const myTeamField = document.getElementById('myTeamInput');
            const myClubField = document.getElementById('myClub');
            if (myTeamField) myTeamField.addEventListener('input', (e)=>{ try { localStorage.setItem('lastMyTeam', e.target.value || ''); } catch(_){} updateSubmitState(); });
            if (myClubField) myClubField.addEventListener('input', (e)=>{ try { localStorage.setItem('lastMyClub', e.target.value || ''); } catch(_){} });

            const teamId = localStorage.getItem('selectedTeamId');
            let selected = window.teamsModule?.getCurrentTeam?.();
            if (!selected && teamId && window.teamsModule?.getTeamById) {
                selected = window.teamsModule.getTeamById(teamId);
            }
            const fallbackTeam = localStorage.getItem('lastMyTeam') || localStorage.getItem('derivedTeamNameForSetup') || '';
            const fallbackClub = localStorage.getItem('lastMyClub') || '';
            const prefillTeam = selected?.teamName || fallbackTeam;
            const prefillClub = selected?.clubName || fallbackClub;
            if (myTeamField && prefillTeam) { myTeamField.value = prefillTeam; myTeamField.disabled = true; }
            if (myClubField && prefillClub) { myClubField.value = prefillClub; myClubField.disabled = true; }
            updateSubmitState();
        }

        function setupRadioButtons() {
            radioOptions.forEach(option => {
                option.addEventListener('click', function() {
                    const value = this.dataset.value;
                    const hidden = document.getElementById('locationInput');
                    // Rimuovi selezione da tutti
                    radioOptions.forEach(opt => {
                        opt.classList.remove('selected');
                        opt.setAttribute('aria-pressed','false');
                    });
                    // Aggiungi selezione al corrente
                    this.classList.add('selected');
                    this.setAttribute('aria-pressed','true');
                    if (hidden) hidden.value = value;
                    updateSubmitState();
                });
                // Selezione da tastiera (Enter/Space)
                option.addEventListener('keydown', function(e){
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            });
        }

        // --- Controlli data personalizzati (gg Mese AAAA) ---
        function pad2(n){ return String(n).padStart(2,'0'); }
        const IT_MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
        function getDaysInMonth(year, monthIndex){ return new Date(year, monthIndex + 1, 0).getDate(); }

        function populateMonthOptions(){
            const mSel = document.getElementById('matchDateMonth');
            if (!mSel) return;
            mSel.innerHTML = '';
            IT_MONTHS.forEach((name, idx) => {
                const opt = document.createElement('option');
                opt.value = String(idx);
                opt.textContent = name;
                mSel.appendChild(opt);
            });
        }
        function populateYearOptions(){
            const ySel = document.getElementById('matchDateYear');
            if (!ySel) return;
            ySel.innerHTML = '';
            const current = new Date().getFullYear();
            for(let y = current - 2; y <= current + 5; y++){
                const opt = document.createElement('option');
                opt.value = String(y);
                opt.textContent = String(y);
                ySel.appendChild(opt);
            }
        }
        function populateDayOptions(year, monthIndex){
            const dSel = document.getElementById('matchDateDay');
            if (!dSel) return;
            dSel.innerHTML = '';
            const days = getDaysInMonth(year, monthIndex);
            for(let d = 1; d <= days; d++){
                const opt = document.createElement('option');
                opt.value = String(d);
                opt.textContent = pad2(d);
                dSel.appendChild(opt);
            }
        }
        function syncMatchDateHidden(){
            const dSel = document.getElementById('matchDateDay');
            const mSel = document.getElementById('matchDateMonth');
            const ySel = document.getElementById('matchDateYear');
            const hidden = document.getElementById('matchDate');
            if (!dSel || !mSel || !ySel || !hidden) return;
            const day = parseInt(dSel.value,10);
            const monthIndex = parseInt(mSel.value,10);
            const year = parseInt(ySel.value,10);
            if (Number.isFinite(day) && Number.isFinite(monthIndex) && Number.isFinite(year)){
                hidden.value = `${year}-${pad2(monthIndex+1)}-${pad2(day)}`;
            } else {
                hidden.value = '';
            }
        }
        function setDefaultDate(){
            populateMonthOptions();
            populateYearOptions();
            const today = new Date();
            const ySel = document.getElementById('matchDateYear');
            const mSel = document.getElementById('matchDateMonth');
            const dSel = document.getElementById('matchDateDay');
            if (!ySel || !mSel || !dSel) return;
            ySel.value = String(today.getFullYear());
            mSel.value = String(today.getMonth());
            populateDayOptions(today.getFullYear(), today.getMonth());
            dSel.value = String(today.getDate());
            syncMatchDateHidden();
            updateDatePreview();
        }

        function bindLiveValidation() {
            const opponentEl = document.getElementById('opponent');
            const dSel = document.getElementById('matchDateDay');
            const mSel = document.getElementById('matchDateMonth');
            const ySel = document.getElementById('matchDateYear');
            const eventTypeEl = document.getElementById('eventType');
            const locationEl = document.getElementById('locationInput');
            if (opponentEl) opponentEl.addEventListener('input', updateSubmitState);
            [dSel, mSel, ySel].forEach(sel => {
                if (!sel) return;
                sel.addEventListener('change', () => {
                    const year = parseInt(ySel.value,10);
                    const monthIndex = parseInt(mSel.value,10);
                    if (sel === mSel || sel === ySel){
                        const currentDay = parseInt(dSel.value,10) || 1;
                        populateDayOptions(year, monthIndex);
                        const maxDay = getDaysInMonth(year, monthIndex);
                        dSel.value = String(Math.min(currentDay, maxDay));
                    }
                    syncMatchDateHidden();
                    updateDatePreview();
                    updateSubmitState();
                });
            });
            if (eventTypeEl) eventTypeEl.addEventListener('change', updateSubmitState);
            if (locationEl) locationEl.addEventListener('change', updateSubmitState);
        }

        // Formatta una data (ISO yyyy-mm-dd o Date) nel formato richiesto: "gg Mese AAAA" con mese in italiano
        function formatItalianLongDate(raw){
            let d = null;
            if (raw instanceof Date){
                d = raw;
            } else if (typeof raw === 'string'){
                const s = raw.trim();
                if (/^\d{4}-\d{2}-\d{2}/.test(s)){
                    d = new Date(s);
                } else if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)){
                    const [day, month, year] = s.split('/').map(Number);
                    d = new Date(year, month - 1, day);
                } else if (!isNaN(Date.parse(s))){
                    d = new Date(s);
                }
            } else if (typeof raw === 'number'){
                d = new Date(raw);
            }
            if (!(d instanceof Date) || isNaN(d)) return '';
            const day = String(d.getDate()).padStart(2,'0');
            const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
            const monthName = months[d.getMonth()];
            const year = d.getFullYear();
            return `${day} ${monthName} ${year}`;
        }

        function updateDatePreview(){
            const el = document.getElementById('matchDate');
            const prev = document.getElementById('matchDatePreview');
            if (!el || !prev) return;
            prev.textContent = formatItalianLongDate(el.value);
        }

        function updateSubmitState() {
            const opponent = document.getElementById('opponent')?.value.trim();
            const matchDate = document.getElementById('matchDate')?.value;
            const eventType = document.getElementById('eventType')?.value;
            const location = document.getElementById('locationInput')?.value;
            const allValid = !!(opponent && matchDate && eventType && location);
            if (!submitBtn) return;
            submitBtn.disabled = !allValid;
            if (allValid) {
                submitBtn.classList.remove('btn-secondary');
                submitBtn.classList.add('btn-primary');
            } else {
                submitBtn.classList.add('btn-secondary');
                submitBtn.classList.remove('btn-primary');
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
            
            // Scroll to top
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            hideMessages();

            // Validazione form
            const formData = new FormData(matchForm);
            const matchData = {
                opponent: formData.get('opponent')?.trim(),
                matchDate: formData.get('matchDate'),
                eventType: formData.get('eventType'),
                location: formData.get('location'),
                description: formData.get('description')?.trim(),
                teamId: localStorage.getItem('selectedTeamId'),
                createdAt: new Date().toISOString(),
                status: 'setup'
            };

            // Validazioni
            if (!matchData.opponent) {
                showError('Il nome della squadra avversaria è obbligatorio');
                return;
            }

            if (!matchData.matchDate) {
                showError('La data della partita è obbligatoria');
                return;
            }

            if (!matchData.eventType) {
                showError('Il tipo di evento è obbligatorio');
                return;
            }

            if (!matchData.location) {
                showError('Devi specificare se la partita è in casa o in trasferta');
                return;
            }

            // Il roster sarà gestito nella pagina successiva

            // Disabilita il pulsante durante il salvataggio
            submitBtn.disabled = true;
            submitBtn.textContent = 'Salvataggio...';

            try {
                const matchId = (localStorage.getItem('selectedMatchId') || (new URLSearchParams(window.location.search).get('match')) || null);
                if (!matchId) { showError('ID partita mancante. Torna a Elenco Partite e premi "+".'); return; }
                matchData.id = String(matchId);
                const currentTeam = window.teamsModule?.getCurrentTeam?.();
                let selectedTeamId = matchData.teamId || localStorage.getItem('selectedTeamId') || (currentTeam?.id || currentTeam?.teamId) || null;
                if (selectedTeamId) { try { localStorage.setItem('selectedTeamId', String(selectedTeamId)); } catch(_){} }
                const formMyTeam = document.getElementById('myTeamInput')?.value.trim() || '';
                const formMyClub = document.getElementById('myClub')?.value.trim() || '';
                let selectedTeamObj = null;
                try { if (window.teamsModule?.getTeamById && selectedTeamId) selectedTeamObj = window.teamsModule.getTeamById(selectedTeamId); } catch(_){ }
                const myTeamName = (selectedTeamObj?.teamName || currentTeam?.teamName || formMyTeam || derivedTeamName || '').trim();
                const myClubName = (selectedTeamObj?.clubName || formMyClub || derivedClubName || '').trim();
                const roster = [];

                // Prepara payload coerente con uso generale
                const payload = {
                    id: String(matchId),
                    teamId: selectedTeamId,
                    myTeam: myTeamName,
                    myClub: myClubName || null,
                    opponentTeam: matchData.opponent,
                    matchDate: matchData.matchDate,
                    eventType: matchData.eventType,
                    location: matchData.location,
                    description: matchData.description || '',
                    status: 'planned',
                    createdAt: matchData.createdAt,
                    updatedAt: new Date().toISOString(),
                    roster: Array.isArray(roster) ? roster : []
                };

                // 1) Persistenza locale: aggiungi/aggiorna in volleyMatches
                try {
                    const local = JSON.parse(localStorage.getItem('volleyMatches') || '[]');
                    local.unshift(payload);
                    localStorage.setItem('volleyMatches', JSON.stringify(local));
                } catch (e) {
                    console.warn('Salvataggio locale partita non riuscito:', e);
                }

                // 2) Persistenza cloud (se utente loggato e funzioni disponibili)
                try {
                    if (window.authFunctions?.getCurrentUser && window.firestoreService?.saveMatchTree && selectedTeamId) {
                        const user = window.authFunctions.getCurrentUser();
                        if (user) {
                            await window.firestoreService.saveMatchTree(String(selectedTeamId), payload);
                        }
                    }
                } catch (e) {
                    console.warn('Salvataggio cloud non riuscito (proseguo):', e);
                }

                // 3) Imposta setup corrente per pagina di roster
                localStorage.setItem('currentMatchSetup', JSON.stringify({ ...matchData, teamId: selectedTeamId, myTeam: myTeamName || '', myClub: (formMyClub || derivedClubName || ''), roster: [] }));

                showSuccess('Partita salvata! Prosegui alla selezione del roster...');

                // Reindirizza alla pagina roster dopo breve attesa
                setTimeout(() => {
                    const qp = new URLSearchParams(); qp.set('team', String(selectedTeamId||'')); qp.set('match', String(matchId));
                    window.location.href = 'match-roster.html?' + qp.toString();
                }, 900);

            } catch (error) {
                console.error('Errore nel salvataggio:', error);
                showError('Errore nel salvataggio dei dati. Riprova.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Continua →';
            }
        }

        // --- Roster editor helpers ---
        function ensureTwoDigits(n){ const s = String(n||'').trim(); const n2 = s.replace(/\D+/g,''); if (!n2) return ''; return String(n2).padStart(2,'0').slice(0,2); }
        function normalizeRole(val){ const v = String(val||'').trim().toUpperCase(); const c = v[0]||''; return ['P','S','O','C','L'].includes(v)?v:(['P','S','O','C','L'].includes(c)?c:''); }
        function showRosterEditor(){ const el = document.getElementById('rosterEditor'); if (el) el.style.display = 'block'; }
        function renderRosterRows(list){ const el = document.getElementById('rosterEditor'); if (!el) return; const header = el.querySelector('.player-header'); el.innerHTML=''; if (header) el.appendChild(header); (Array.isArray(list)?list:[]).forEach(p=>addRosterRow(p)); }
        function addRosterRow(player={}){
            const el = document.getElementById('rosterEditor'); if (!el) return;
            const row = document.createElement('div'); row.className='player-row';
            const num = ensureTwoDigits(player.number||'');
            const name = (player.name||'').toString().slice(0,12);
            const surname = (player.surname||'').toString().slice(0,12);
            const nick = (player.nickname||'').toString().slice(0,12);
            const role = normalizeRole(player.role||'');
            row.innerHTML = `
              <div><input type="text" class="input num-input" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="#" value="${num}" /></div>
              <div><input type="text" class="input name-input" maxlength="12" placeholder="Nome" value="${name}" /></div>
              <div><input type="text" class="input surname-input" maxlength="12" placeholder="Cognome" value="${surname}" /></div>
              <div><input type="text" class="input nick-input" maxlength="12" placeholder="Soprannome" value="${nick}" /></div>
              <div class="role-cell" data-empty="${role?0:1}">
                <select class="input role-select">
                  <option value="">—</option>
                  <option value="P">P</option>
                  <option value="S">S</option>
                  <option value="O">O</option>
                  <option value="C">C</option>
                  <option value="L">L</option>
                </select>
              </div>
              <div><button type="button" class="btn btn-secondary" onclick="this.closest('.player-row').remove()">Rimuovi</button></div>`;
            el.appendChild(row);
            const sel = row.querySelector('.role-select'); if (sel) sel.value = role||'';
            const cell = row.querySelector('.role-cell'); if (sel && cell) sel.addEventListener('change', ()=>{ cell.dataset.empty = sel.value ? '0' : '1'; });
        }
        function collectRosterFromEditor(){ const el = document.getElementById('rosterEditor'); if (!el || el.style.display==='none') return currentRoster||[]; const rows = Array.from(el.querySelectorAll('.player-row')); const list = rows.map(r=>({ number: (r.querySelector('.num-input')?.value||'').trim(), name:(r.querySelector('.name-input')?.value||'').trim(), surname:(r.querySelector('.surname-input')?.value||'').trim(), nickname:(r.querySelector('.nick-input')?.value||'').trim(), role:(r.querySelector('.role-select')?.value||'').trim() })).filter(p=>p && (p.number||p.name||p.surname||p.nickname||p.role)); currentRoster = list; return list; }

        // --- Roster: selezione/import ---
        function openRosterSelectDialog(){ renderRosterList(); }
        function buildRosterOptions(){
            let saved = []; let matches = []; let imported = [];
            try { saved = JSON.parse(localStorage.getItem('savedRosters')||'[]'); } catch(_){ }
            try { matches = JSON.parse(localStorage.getItem('volleyMatches')||'[]'); } catch(_){ }
            try { imported = JSON.parse(localStorage.getItem('importedRoster')||'[]'); } catch(_){ }
            const opts = [];
            if (imported && imported.length) opts.push({ id:'imported', label:'Ultimo import', roster:imported, source:'imported' });
            saved.forEach((r,idx)=>{ opts.push({ id:'saved_'+idx, label:r.name||'Roster salvato', roster:Array.isArray(r.players)?r.players:[], source:'saved' }); });
            matches.forEach(m=>{ if (Array.isArray(m.roster) && m.roster.length){ const date = (m.matchDate||m.date||'').toString().slice(0,10); const opp = m.opponentTeam||m.opponent||'Avversario'; opts.push({ id:String(m.id||date+opp), label:`Partita: ${date} vs ${opp}`, roster:m.roster, source:'match' }); } });
            return opts;
        }
        function renderRosterList(){
            const el = document.getElementById('rosterList'); if (!el) return;
            const opts = buildRosterOptions();
            if (!opts.length){ el.innerHTML = ''; return; }
            el.innerHTML = opts.map(o => {
                const canDel = o.source === 'saved';
                return `<div class="card" style="display:flex; align-items:center; justify-content:space-between; gap:8px; border:1px solid #e9ecef; border-radius:12px; padding:8px; background:#fff;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <input type="checkbox" class="roster-select" data-id="${o.id}">
                        <div style="font-weight:600;">${o.label}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button type="button" class="icon-button" data-action="edit" data-id="${o.id}">✎</button>
                        ${canDel ? `<button type="button" class="icon-button" data-action="delete" data-id="${o.id}">🗑️</button>` : ''}
                    </div>
                </div>`;
            }).join('');
            el.querySelectorAll('.roster-select').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    el.querySelectorAll('.roster-select').forEach(x => { if (x !== e.target) x.checked = false; });
                    const id = e.target.getAttribute('data-id');
                    const picked = buildRosterOptions().find(x => x.id === id);
                    currentRoster = Array.isArray(picked?.roster) ? picked.roster : [];
                    const ed = document.getElementById('rosterEditor'); if (ed) ed.style.display = 'none';
                    updateSubmitState();
                    updateConfirmRosterState();
                });
            });
            el.querySelectorAll('button[data-action]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.getAttribute('data-id');
                    const action = btn.getAttribute('data-action');
                    const picked = buildRosterOptions().find(x => x.id === id);
                    if (action === 'edit'){ currentRoster = Array.isArray(picked?.roster) ? picked.roster : []; showRosterEditor(); renderRosterRows(currentRoster); addRosterRow(); updateSubmitState(); updateConfirmRosterState(); }
                    else if (action === 'delete'){ try { const saved = JSON.parse(localStorage.getItem('savedRosters')||'[]'); const idx = Number(id.replace('saved_','')); if (!isNaN(idx)) { saved.splice(idx,1); localStorage.setItem('savedRosters', JSON.stringify(saved)); } } catch(_){ } renderRosterList(); updateConfirmRosterState(); }
                });
            });
            updateConfirmRosterState();
        }
        function importRosterCSV(file){
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const text = reader.result;
                    const lines = String(text||'').split(/\r?\n/).filter(l => String(l).trim());
                    if (lines.length < 2) throw new Error('Il file CSV deve avere intestazione e almeno una riga di dati.');
                    const headers = splitCSVLine(lines[0]).map(h => h.trim().toLowerCase());
                    const idx = {
                        squadra: headers.indexOf('squadra'),
                        societa: (function(){ const i1 = headers.indexOf('societa'); const i2 = headers.indexOf('società'); return i1 !== -1 ? i1 : i2; })(),
                        numero: headers.indexOf('numero'),
                        nome: headers.indexOf('nome'),
                        cognome: headers.indexOf('cognome'),
                        soprannome: headers.indexOf('soprannome'),
                        ruolo: headers.indexOf('ruolo')
                    };
                    const importedPlayers = [];
                    for (let i = 1; i < lines.length; i++){
                        const cols = splitCSVLine(lines[i]);
                        if (!cols.length) continue;
                        if (!derivedTeamName) {
                            const tn1 = idx.squadra !== -1 ? (cols[idx.squadra] || '') : '';
                            const cn1 = idx.societa !== -1 ? (cols[idx.societa] || '') : '';
                            const teamNameCandidate = tn1.trim();
                            const clubNameCandidate = cn1.trim();
                            if (teamNameCandidate) derivedTeamName = teamNameCandidate;
                            if (clubNameCandidate) derivedClubName = clubNameCandidate;
                        }
                        const player = {
                            number: ensureTwoDigits(idx.numero !== -1 ? (cols[idx.numero] || '') : ''),
                            name: (idx.nome !== -1 ? (cols[idx.nome] || '') : '').trim(),
                            surname: (idx.cognome !== -1 ? (cols[idx.cognome] || '') : '').trim(),
                            nickname: (idx.soprannome !== -1 ? (cols[idx.soprannome] || '') : '').trim(),
                            role: normalizeRole(idx.ruolo !== -1 ? (cols[idx.ruolo] || '') : '')
                        };
                        if (player.number || player.name || player.surname || player.nickname || player.role) importedPlayers.push(player);
                    }
                    if (!importedPlayers.length) throw new Error('Nessun giocatore rilevato nel CSV.');
                    currentRoster = importedPlayers;
                    try { localStorage.setItem('importedRoster', JSON.stringify(importedPlayers)); } catch(_){}
                    try { if (derivedTeamName) localStorage.setItem('derivedTeamNameForSetup', derivedTeamName); } catch(_){}
                    try {
                      if (derivedTeamName) {
                        const tf = document.getElementById('myTeamInput'); if (tf) tf.value = derivedTeamName;
                        localStorage.setItem('lastMyTeam', derivedTeamName);
                      }
                      if (derivedClubName) {
                        const cf = document.getElementById('myClub'); if (cf) cf.value = derivedClubName;
                        localStorage.setItem('lastMyClub', derivedClubName);
                      }
                    } catch(_){}
                    showRosterEditor(); renderRosterRows(currentRoster); addRosterRow();
                    updateSubmitState(); updateConfirmRosterState();
                    alert('Roster importato da CSV.');
                } catch(err){
                    console.error(err);
                    alert('Errore nell\'importazione CSV: ' + err.message);
                }
            };
            reader.onerror = () => alert('Impossibile leggere il file CSV selezionato.');
            reader.readAsText(file);
        }
        function splitCSVLine(line){
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < String(line||'').length; i++){
                const ch = line[i];
                if (ch === '"'){
                    if (inQuotes && line[i+1] === '"'){ current += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (ch === ',' && !inQuotes){ result.push(current); current = ''; }
                else { current += ch; }
            }
            result.push(current);
            return result;
        }

        function exportRosterCSV(){
            try {
                const teamName = (document.getElementById('myTeamInput')?.value.trim()) || derivedTeamName || (window.teamsModule?.getCurrentTeam?.()?.name || '');
                const players = collectRosterFromEditor();
                if (!Array.isArray(players) || !players.length) { alert('Nessun giocatore nel roster da esportare'); return; }
                const header = 'Squadra,Numero,Nome,Cognome,Ruolo,Soprannome';
                function esc(v){ const s = String(v||''); return (s.includes(',') || s.includes('"')) ? '"'+s.replace(/"/g,'""')+'"' : s; }
                const lines = [header].concat(players.map(p => {
                    const num = p.number ? String(parseInt(p.number,10) || '').trim() : '';
                    return [teamName, num, p.name||'', p.surname||'', p.role||'', (p.nickname||'')].map(esc).join(',');
                }));
                const csvText = lines.join('\n');
                const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8;' });
                const d = new Date(); const dd = String(d.getDate()).padStart(2,'0'); const mm = String(d.getMonth()+1).padStart(2,'0'); const yyyy = String(d.getFullYear());
                const safeTeam = String(teamName||'roster').replace(/[\\/:*?"<>|]+/g,'_').replace(/\s+/g,'_');
                const filename = `${safeTeam}_roster_${dd}-${mm}-${yyyy}.csv`;
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            } catch(e){ console.error(e); alert('Errore esportazione CSV'); }
        }
        function restoreMyFields(){
            try {
                const teamField = document.getElementById('myTeamInput');
                const clubField = document.getElementById('myClub');
                const savedTeam = localStorage.getItem('lastMyTeam') || localStorage.getItem('derivedTeamNameForSetup') || '';
                const savedClub = localStorage.getItem('lastMyClub') || '';
                if (teamField && !teamField.value && savedTeam) teamField.value = savedTeam;
                if (clubField && !clubField.value && savedClub) clubField.value = savedClub;
            } catch(_){}
        }
        (function(){
            const goToTeamsBtnMobile = document.getElementById('goToTeamsBtnMobile');
            if (goToTeamsBtnMobile){
              goToTeamsBtnMobile.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); window.location.href='/my-teams.html'; });
            }
        })();
        function confirmCurrentRoster(){
            const list = collectRosterFromEditor();
            if (!Array.isArray(list) || list.length === 0){ alert('Aggiungi almeno un giocatore prima di confermare'); return; }
            const teamName = (document.getElementById('myTeamInput')?.value.trim()) || (window.teamsModule?.getCurrentTeam?.()?.name || '') || 'Roster';
            try {
                const saved = (()=>{ try { return JSON.parse(localStorage.getItem('savedRosters')||'[]'); } catch(_){ return []; } })();
                const key = String(teamName||'').toLowerCase();
                const idx = saved.findIndex(r => String(r.name||'').toLowerCase() === key);
                const entry = { name: teamName, players: list };
                if (idx >= 0) saved[idx] = entry; else saved.push(entry);
                localStorage.setItem('savedRosters', JSON.stringify(saved));
                currentRoster = list;
                const ed = document.getElementById('rosterEditor'); if (ed) ed.style.display = 'none';
                renderRosterList();
                const el = document.getElementById('rosterList');
                if (el){
                  const savedIdx = (idx >= 0) ? idx : (saved.length - 1);
                  const cb = el.querySelector(`.roster-select[data-id="saved_${savedIdx}"]`);
                  if (cb){
                      el.querySelectorAll('.roster-select').forEach(other => { if (other !== cb) other.checked = false; });
                      cb.checked = true;
                  }
                }
                updateSubmitState();
                alert('Roster confermato e reso selezionabile');
            } catch(e){ console.error(e); alert('Errore nel salvataggio del roster'); }
        }
        function cancelRosterEditing(){
            try {
                const ed = document.getElementById('rosterEditor'); if (ed) ed.style.display = 'none';
                updateConfirmRosterState();
            } catch(_){}
        }
        function updateConfirmRosterState(){
            const btn = document.getElementById('confirmRosterBtn'); if (!btn) return;
            const hasSelection = !!document.querySelector('#rosterList .roster-select:checked');
            const hasEditor = document.getElementById('rosterEditor')?.style.display === 'block';
            const hasPlayers = Array.isArray(currentRoster) && currentRoster.length > 0;
            const shouldHighlight = hasSelection || (hasEditor && hasPlayers);
            if (shouldHighlight){ btn.classList.remove('btn-secondary'); btn.classList.add('btn-primary'); }
            else { btn.classList.add('btn-secondary'); btn.classList.remove('btn-primary'); }
        }
    </script>
