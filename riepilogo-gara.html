<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Riepilogo Gara</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="icon" type="image/png" href="LOGO_APP.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="180x180" href="LOGO_APP.png">
    <link rel="stylesheet" href="styles.css?v=4" />
    <style>
      .back-btn { background:#fff; color:#0d6efd; border:1px solid #e9ecef; padding:6px; border-radius:8px; text-decoration:none; display:inline-flex; align-items:center; }
      @media (hover: hover) { .back-btn:hover { background:#f8f9fa; border-color:#dbe1e6; transform:translateY(-1px); } }
      .meta-input { width:100%; padding:10px 12px; border-radius:10px; border:1px solid #e5e7eb; background:#fff; font-size:15px; }
      .meta-actions { margin-top:12px; display:flex; gap:10px; justify-content:flex-end; align-items:center; }
      .meta-status { font-weight:600; color:#0f172a; }
    </style>
      <script src="/pwa-install.js" defer></script>
</head>
<body>
  <header class="topappbar">
    <div class="topappbar-content">
      <div class="topappbar-left">
        <a href="javascript:void(0)" class="back-btn" aria-label="Indietro" title="Indietro" onclick="history.back()" style="text-decoration:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M19 12H5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
      <div class="topappbar-center">
        <img src="./LOGO_APP.png" alt="Logo My Volley Scout" class="app-logo" width="64" height="64" />
      </div>
      <div class="topappbar-right">
        <button id="headerMenuToggle" class="top-account-btn" aria-expanded="false" aria-controls="headerMenu" title="Account">
          <span class="menu-item-icon" aria-hidden="true" style="display:inline-flex;align-items:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 20v-1c0-3.314 3.582-6 8-6s8 2.686 8 6v1H4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </button>
        <div id="headerMenu" class="top-account-menu" hidden>
          <div class="menu-title">Account</div>
          <div class="menu-divider"></div>
          <button id="goToMatchesBtnMobile" class="menu-item" type="button">Vai a Elenco Partite</button>
          <button id="goToTeamsBtnMobile" class="menu-item" type="button">Vai a Elenco Squadre</button>
          <button id="exitToWelcomeBtnMobile" class="menu-item" type="button">Esci</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main" id="riepilogo-gara">
    <section class="section-panel">
      <h2 class="section-title">Riepilogo Gara</h2>
      <div id="matchMeta" class="matches-list"></div>
      <div class="meta-actions">
        <div id="saveMatchMetaStatus" class="meta-status"></div>
        <button id="saveMatchMetaBtn" class="btn btn-primary" type="button">Salva</button>
      </div>
    </section>

    <section class="section-panel">
      <h3 class="section-title">Set</h3>
      <div id="setsSummary" class="matches-list"></div>
    </section>

    <section class="section-panel">
      <h3 class="section-title">Elenco Player</h3>
      <div id="rosterTable" class="matches-list"></div>
    </section>
  </main>

  <script>
    (function(){
      function getSession(){ try { return JSON.parse(localStorage.getItem('currentScoutingSession')||'{}'); } catch(_){ return {}; } }
      async function getSelectedMatchSession(){
        try {
          const qs = new URLSearchParams(location.search || '');
          const matchId = qs.get('match') || localStorage.getItem('selectedMatchId') || '';
          let sess = {};
          if (matchId) {
            try {
              const team = window.teamsModule?.getCurrentTeam?.();
              if (team?.id && window.authModule?.isAuthenticated() && window.firestoreService?.getMatchData) {
                try {
                  const res = await window.firestoreService.getMatchData(team.id, matchId);
                  if (res?.success) {
                    const roster = Array.isArray(res.roster) ? res.roster : [];
                    const d = res.details || {};
                    const meta = res.meta || {};
                    const opponent = meta.opponentTeam || meta.opponent || '';
                    const dateStr = meta.matchDate || meta.date || '';
                    const type = meta.matchType || meta.eventType || '';
                    const ha = meta.homeAway || meta.location || '';
                    sess = {
                      id: matchId,
                      teamId: team?.id != null ? String(team.id) : null,
                      myTeam: meta.myTeam || '',
                      opponentTeam: opponent,
                      matchDate: dateStr,
                      matchType: type,
                      homeAway: ha,
                      description: meta.description || '',
                      finalResult: meta.finalResult || '',
                      matchOutcome: meta.matchOutcome || '',
                      actionsBySet: d.actionsBySet || {},
                      setMeta: d.setMeta || {},
                      setStateBySet: d.setStateBySet || {},
                      scoreHistoryBySet: d.scoreHistoryBySet || {},
                      setSummary: d.setSummary || {},
                      roster
                    };
                  }
                } catch(_){ }
                if (sess && sess.id) return sess;
              }
              // Cloud-only: localStorage removed
              const list = [];
              const found = Array.isArray(list) ? list.find(m => String(m.id)===String(matchId)) : null;
              if (found) {
                sess = {
                  id: found.id,
                  teamId: found.teamId || null,
                  myTeam: found.myTeam || found.teamName || '',
                  opponentTeam: found.opponentTeam || found.opponent || '',
                  matchDate: found.matchDate || found.date || '',
                  matchType: found.matchType || found.eventType || '',
                  homeAway: found.homeAway || found.location || '',
                  description: found.description || '',
                  finalResult: found.finalResult || '',
                  matchOutcome: found.matchOutcome || '',
                  actionsBySet: found.actionsBySet || {},
                  setMeta: found.setMeta || {},
                  setStateBySet: found.setStateBySet || {},
                  scoreHistoryBySet: found.scoreHistoryBySet || {},
                  setSummary: found.setSummary || {},
                  roster: Array.isArray(found.roster) ? found.roster : (Array.isArray(found.players) ? found.players : [])
                };
                return sess;
              }
            } catch(_) {}
          }
          const fallback = getSession();
          return fallback;
        } catch(_) { return getSession(); }
      }
      function normalizeHA(val){ const v=String(val||'').toLowerCase(); if(v==='casa'||v==='home') return 'home'; if(v==='trasferta'||v==='away') return 'away'; return ''; }
      function normalizeDateInput(v){
        if (!v) return '';
        const s = String(v).trim();
        const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (m) return `${m[1]}-${m[2]}-${m[3]}`;
        try {
          const d = new Date(s);
          if (!isNaN(d)) return d.toISOString().slice(0,10);
        } catch(_) {}
        return '';
      }
      function parseFinalResult(value){
        const s = String(value || '').trim();
        if (!s) return null;
        const m = s.match(/(\d+)\D+(\d+)/);
        if (!m) return null;
        return { my: Number(m[1]) || 0, opp: Number(m[2]) || 0 };
      }
      function deriveOutcomeFromResult(value){
        const r = parseFinalResult(value);
        if (!r) return '';
        if (r.my > r.opp) return 'Vinto';
        if (r.my < r.opp) return 'Perso';
        return '';
      }
      function isValidScore(h,a){ const hv = Number(h||0), av = Number(a||0); const bothZero = (hv===0 && av===0); const bothBlank = (String(h||'').trim()==='' && String(a||'').trim()===''); return !(bothZero || bothBlank); }
      function computeSetOutcome(h,a){ if(!isValidScore(h,a)) return ''; return (Number(h)>Number(a)) ? 'Vinto' : (Number(a)>Number(h) ? 'Perso' : ''); }
      function computeOverallOutcome(sess){ let my=0, opp=0; const sum = sess.setSummary || {}; const st = sess.setStateBySet || {}; for(let i=1;i<=6;i++){ const s = sum[i] || {}; const si = st[i] || {}; let h = s.home!=null ? Number(s.home||0) : Number(si.homeScore||0); let a = s.away!=null ? Number(s.away||0) : Number(si.awayScore||0); if (!isValidScore(h,a)) continue; const myScore = h; const oppScore = a; if (myScore>oppScore) my++; else if (oppScore>myScore) opp++; }
        const punteggio = `${my} a ${opp}`; const esito = my>opp ? 'Vinto' : (opp>my ? 'Perso' : ''); return { punteggio, esito };
      }

      function renderMeta(sess){
        const target = document.getElementById('matchMeta');
        if (!target) return;
        const _mrRGP = (sess.description || '').toLowerCase();
        const opponent = (_mrRGP === 'andata' ? '(A) ' : _mrRGP === 'ritorno' ? '(R) ' : '') + (sess.opponent || sess.opponentTeam || '');
        const date = normalizeDateInput(sess.matchDate || sess.date || '');
        const type = sess.eventType || sess.matchType || '';
        const location = (sess.location || (normalizeHA(sess.homeAway)==='home'?'casa':'trasferta')) || '';
        const overall = computeOverallOutcome(sess);
        const finalResult = sess.finalResult || overall.punteggio || '';
        const outcome = sess.matchOutcome || overall.esito || '';
        target.innerHTML = [
          `<div class="match-item"><div class="match-title">Avversario</div><div class="match-details"><input id="metaOpponent" class="meta-input" type="text" value="${String(opponent).replace(/"/g,'&quot;')}"></div></div>`,
          `<div class="match-item"><div class="match-title">Data</div><div class="match-details"><input id="metaDate" class="meta-input" type="date" value="${date}"></div></div>`,
          `<div class="match-item"><div class="match-title">Tipo Evento</div><div class="match-details"><input id="metaType" class="meta-input" type="text" value="${String(type).replace(/"/g,'&quot;')}"></div></div>`,
          `<div class="match-item"><div class="match-title">Luogo</div><div class="match-details"><select id="metaLocation" class="meta-input"><option value="casa"${location==='casa'?' selected':''}>casa</option><option value="trasferta"${location==='trasferta'?' selected':''}>trasferta</option></select></div></div>`,
          `<div class="match-item"><div class="match-title">Descrizione</div><div class="match-details"><input id="metaDescription" class="meta-input" type="text" value="${String(sess.description||'').replace(/"/g,'&quot;')}"></div></div>`,
          `<div class="match-item"><div class="match-title">Punteggio</div><div class="match-details"><input id="metaScore" class="meta-input" type="text" value="${String(finalResult).replace(/"/g,'&quot;')}"></div></div>`,
          `<div class="match-item"><div class="match-title">Esito</div><div class="match-details"><input id="metaOutcome" class="meta-input" type="text" value="${String(outcome).replace(/"/g,'&quot;')}"></div></div>`
        ].join('');
      }

      function renderSets(sess){ const target = document.getElementById('setsSummary'); if (!target) return; const sum = sess.setSummary || {}; const st = sess.setStateBySet || {};
        function getScores(i){ const s = sum[i] || {}; const si = st[i] || {}; return { home: s.home!=null ? Number(s.home||0) : Number(si.homeScore||0), away: s.away!=null ? Number(s.away||0) : Number(si.awayScore||0) }; }
        const rows = [];
        for (let i=1;i<=6;i++){
          const sc = getScores(i); const valid = isValidScore(sc.home, sc.away);
          if (i>=4){ const prev = getScores(i-1); const prevValid = isValidScore(prev.home, prev.away); if (!prevValid) break; if (!valid) break; }
          const my = sc.home; const opp = sc.away; const outcome = computeSetOutcome(my, opp);
          const details = outcome ? `${outcome} ${my} a ${opp}` : `${my} a ${opp}`;
          rows.push(`<div class="match-item"><div class="match-title">Set ${i}</div><div class="match-details">${details}</div></div>`);
        }
        target.innerHTML = rows.join('');
      }

      function renderRoster(sess){ const panel = document.getElementById('rosterTable'); if (!panel) return; let players = Array.isArray(sess.roster) ? sess.roster : []; if (!players || players.length === 0) { try { const matchId = sess.id || localStorage.getItem('selectedMatchId') || ''; const localMatches = []; // Cloud-only: localStorage removed for volleyMatches const found = matchId ? localMatches.find(m => String(m.id)===String(matchId)) : null; const rr = found ? (Array.isArray(found.roster)?found.roster:(Array.isArray(found.players)?found.players:[])) : []; if (Array.isArray(rr) && rr.length) players = rr; } catch(_) {} } if (!players || players.length === 0) { try { const raw = localStorage.getItem('importedRoster'); const arr = raw ? JSON.parse(raw) : []; if (Array.isArray(arr) && arr.length) players = arr; } catch(_) {} } if (!players || players.length === 0) { try { const arr = Array.isArray(window.appState?.currentRoster) ? window.appState.currentRoster : []; if (Array.isArray(arr) && arr.length) players = arr; } catch(_) {} } if (!players || players.length === 0) { try { const selId = localStorage.getItem('selectedTeamId'); const teams = []; // Cloud-only: localStorage removed for volleyTeams const t = selId ? teams.find(x => String(x.id)===String(selId)) : null; const rr = t ? (Array.isArray(t.roster)?t.roster:(Array.isArray(t.players)?t.players:[])) : []; if (Array.isArray(rr) && rr.length) players = rr; } catch(_) {} } if (!players || players.length === 0) { try { const t = window.teamsModule?.getCurrentTeam?.(); const rr = Array.isArray(t?.players)?t.players:[]; if (Array.isArray(rr) && rr.length) players = rr; } catch(_) {} } if (!players || players.length === 0) { panel.innerHTML = '<div class="match-item"><div class="match-details">Nessun giocatore presente</div></div>'; return; } function fmtNum(v){ const s = String(v||'').replace(/^'/,''); return s ? s.padStart(2,'0').slice(-2) : ''; } const rows = players.map(p => { const n = fmtNum(p.number); const name = p.name || p.firstName || ''; const surname = p.surname || p.lastName || ''; const nick = p.nickname || p.nick || ''; const role = p.role || ''; return `<tr><td style="width:6ch;">${n}</td><td>${name}</td><td>${surname}</td><td>${nick}</td><td>${role}</td></tr>`; }).join(''); const table = `<table style="width:100%; border-collapse:collapse;"><thead><tr><th style="text-align:left; border-bottom:1px solid #e9ecef; padding:6px;">N°</th><th style="text-align:left; border-bottom:1px solid #e9ecef; padding:6px;">Nome</th><th style="text-align:left; border-bottom:1px solid #e9ecef; padding:6px;">Cognome</th><th style="text-align:left; border-bottom:1px solid #e9ecef; padding:6px;">Soprannome</th><th style="text-align:left; border-bottom:1px solid #e9ecef; padding:6px;">Ruolo</th></tr></thead><tbody>${rows}</tbody></table>`; panel.innerHTML = table; }

      let currentSession = null;
      function goBackAfterSave(){
        try {
          if (history.length > 1) { history.back(); return; }
        } catch(_) {}
        try {
          const qp = new URLSearchParams(location.search || '');
          const arch = qp.get('archive') || localStorage.getItem('mvsSelectedArchive') || '';
          if (arch) { location.href = '/matches.html?archive=' + encodeURIComponent(arch); }
          else { location.href = '/matches.html'; }
          return;
        } catch(_) {}
        location.href = '/matches.html';
      }
      async function saveMetaChanges(){
        const status = document.getElementById('saveMatchMetaStatus');
        if (status) status.textContent = '';
        const matchId = String(currentSession?.id || localStorage.getItem('selectedMatchId') || '').trim();
        const opponent = (document.getElementById('metaOpponent')?.value || '').trim();
        const date = (document.getElementById('metaDate')?.value || '').trim();
        const type = (document.getElementById('metaType')?.value || '').trim();
        const location = (document.getElementById('metaLocation')?.value || '').trim();
        const description = (document.getElementById('metaDescription')?.value || '').trim();
        const scoreRaw = (document.getElementById('metaScore')?.value || '').trim();
        const outcomeRaw = (document.getElementById('metaOutcome')?.value || '').trim();
        if (!opponent) { if (status) status.textContent = 'Inserisci avversario'; return false; }
        if (!date) { if (status) status.textContent = 'Inserisci data'; return false; }
        if (!type) { if (status) status.textContent = 'Inserisci tipo evento'; return false; }
        const normalizedLocation = location === 'trasferta' ? 'trasferta' : 'casa';
        const overall = computeOverallOutcome(currentSession || {});
        const finalResult = scoreRaw || overall.punteggio || '';
        const matchOutcome = outcomeRaw || deriveOutcomeFromResult(finalResult) || overall.esito || '';
        const ha = location === 'trasferta' ? 'away' : 'home';
        let teamName = '';
        let teamId = currentSession?.teamId || null;
        try {
          const t = window.teamsModule?.getCurrentTeam?.();
          if (!teamName) teamName = t?.teamName || t?.name || '';
          if (!teamId && t?.id != null) teamId = String(t.id);
        } catch(_) {}
        if (!teamId) {
          try { teamId = localStorage.getItem('selectedTeamId'); } catch(_) {}
        }
        const updatedAt = new Date().toISOString();
        const base = Object.assign({}, currentSession || {});
        const next = Object.assign({}, base, {
          id: matchId || base.id || ('m_' + Date.now()),
          teamId: teamId || base.teamId || null,
          myTeam: base.myTeam || teamName || base.teamName || '',
          opponentTeam: opponent || base.opponentTeam || base.opponent || '',
          matchDate: date || base.matchDate || base.date || '',
          date: date || base.date || base.matchDate || '',
          matchType: type || base.matchType || base.eventType || '',
          eventType: type || base.eventType || base.matchType || '',
          homeAway: ha,
          location: normalizedLocation,
          description: description,
          finalResult: finalResult,
          matchOutcome: matchOutcome,
          updatedAt
        });
        if (next.myTeam || next.opponentTeam) {
          next.homeTeam = ha === 'home' ? (next.myTeam || '') : (next.opponentTeam || '');
          next.awayTeam = ha === 'home' ? (next.opponentTeam || '') : (next.myTeam || '');
        }
        try {
          // Cloud-only: localStorage write removed for volleyMatches
          // Data is now saved via Firestore only
        } catch(_) {}
        try {
          const sess = Object.assign({}, getSession(), next);
          localStorage.setItem('currentScoutingSession', JSON.stringify(sess));
        } catch(_) {}
        try {
          if (window.appState?.currentMatch && String(window.appState.currentMatch.id || '') === String(next.id || '')) {
            window.appState.currentMatch = Object.assign({}, window.appState.currentMatch, next);
          }
        } catch(_) {}
        try { localStorage.setItem('selectedMatchId', String(next.id)); } catch(_) {}
        currentSession = next;
        if ((window.authModule?.isAuthenticated?.() === true || window.authFunctions?.getCurrentUser?.()) && teamId && window.firestoreService?.saveMatchTree) {
          try {
            await window.firestoreService.saveMatchTree(teamId, next);
          } catch(_) {}
        }
        renderMeta(currentSession);
        renderSets(currentSession);
        if (status) status.textContent = 'Salvato';
        return true;
      }

      getSelectedMatchSession().then(function(session){
        currentSession = session || {};
        renderMeta(currentSession);
        renderSets(currentSession);
        renderRoster(currentSession);
        (function(){
          try{
            var panel = document.getElementById('rosterTable');
            var empty = panel && /Nessun giocatore presente/i.test(panel.textContent||'');
            if (empty){
              var raw2 = localStorage.getItem('currentScoutingSession');
              var sess2 = raw2 ? JSON.parse(raw2) : {};
              var rr = Array.isArray(sess2.roster) ? sess2.roster : [];
              if (Array.isArray(rr) && rr.length){ renderRoster({ roster: rr, id: session.id }); }
              else {
                var raw = localStorage.getItem('importedRoster');
                var arr = raw ? JSON.parse(raw) : [];
                if (Array.isArray(arr) && arr.length){ renderRoster({ roster: arr, id: session.id }); }
              }
            }
          }catch(_){ }
        })();
        const saveBtn = document.getElementById('saveMatchMetaBtn');
        if (saveBtn) saveBtn.addEventListener('click', async (e) => { e.preventDefault(); await saveMetaChanges(); });
      });

      (function(){
        const toggle = document.getElementById('headerMenuToggle');
        const menu = document.getElementById('headerMenu');
        if (toggle && menu){
          toggle.addEventListener('click', ()=>{
            const hidden = menu.hasAttribute('hidden');
            if (hidden) menu.removeAttribute('hidden'); else menu.setAttribute('hidden','');
          });
        }
        const goToMatchesBtnMobile = document.getElementById('goToMatchesBtnMobile');
        const goToTeamsBtnMobile = document.getElementById('goToTeamsBtnMobile');
        const exitBtn = document.getElementById('exitToWelcomeBtnMobile');
        if (goToMatchesBtnMobile) goToMatchesBtnMobile.addEventListener('click', ()=>{ location.href='/matches.html'; });
        if (goToTeamsBtnMobile) goToTeamsBtnMobile.addEventListener('click', ()=>{ location.href='/my-teams.html'; });
        if (exitBtn) exitBtn.addEventListener('click', ()=>{ location.href='/my-teams.html'; });
      })();
    })();
  </script>
</body>
</html>
