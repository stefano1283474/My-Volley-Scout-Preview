<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Volley Scout - Configurazione Set</title>
    <link rel="stylesheet" href="animations.css?v=1">
    <link rel="stylesheet" href="styles.css?v=4">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            color: #1e293b;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 12px; /* ridotto del 50% */
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 12px; /* ridotto del 50% */
            margin-bottom: 12px; /* ridotto del 50% */
            border: none; /* rimosso bordo blu dalla testata */
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            color: #64748b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .back-btn:hover {
            background: #e2e8f0;
            color: #475569;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
        }

        .match-info {
            background: white;
            border-radius: 12px;
            padding: 12px; /* ridotto del 50% */
            margin-bottom: 12px; /* ridotto del 50% */
            border: 2px solid #0d6efd; /* bordo blu evidente */
        }

        .match-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px; /* ridotto del 50% */
            text-align: center;
        }

        /* Riga per accoppiare due campi affiancati */
        .match-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .match-detail {
            padding: 8px; /* ridotto del 50% */
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .match-detail-label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 4px;
            letter-spacing: 0.05em;
        }

        .match-detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }

        .config-section {
            background: white;
            border-radius: 12px;
            padding: 16px; /* ridotto del 50% */
            border: 2px solid #0d6efd; /* bordo blu evidente */
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #1e293b;
            display: block;
            padding-bottom: 4px;
            border-bottom: 1px solid #cbd5e1;
        }

        .section-subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 12px; /* ridotto del 50% */
            font-size: 14px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr; /* ogni riquadro su una riga */
            gap: 12px; /* ridotto del 50% */
            margin-bottom: 12px; /* ridotto del 50% */
        }

        .config-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px; /* ridotto del 50% */
            border: 1px solid #e2e8f0;
        }

        .config-card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px; /* ridotto del 50% */
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Select generico, coerente con palette bianco/blu */
        .form-select {
            width: 100%;
            padding: 8px 12px; /* compatibile con riduzione */
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            color: #1e293b;
            font-size: 14px;
        }
        .form-select:focus {
            outline: none;
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.1);
        }

        .phase-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px; /* ridotto del 50% */
        }

        .phase-btn {
            padding: 10px; /* ridotto del 50% */
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .phase-btn:hover {
            border-color: #0d6efd; /* blu pieno */
            background: #f8fbff;
        }

        .phase-btn.active {
            background: #0d6efd; /* blu pieno */
            color: white;
            border-color: #0d6efd;
        }

        .phase-icon {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .phase-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .phase-desc {
            font-size: 12px;
            opacity: 0.7;
        }

        /* eliminati i bottoni rotazione: uso select */

        .optional-label {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .start-button {
            background: #0d6efd; /* blu pieno */
            color: white;
            border: none;
            padding: 8px 16px; /* ridotto del 50% */
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 12px; /* ridotto del 50% */
        }

        .start-button:hover {
            background: #0b5ed7; /* accento hover */
        }

        .start-button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        /* Animazione uniforme per elementi cliccabili (stile card squadra) */
        .btn,
        .icon-button,
        .phase-btn,
        .set-btn,
        .start-button {
            transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
        }
        .btn:hover,
        .icon-button:hover,
        .phase-btn:hover,
        .set-btn:hover,
        .start-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.10);
        }
        .btn:active,
        .icon-button:active,
        .phase-btn:active,
        .set-btn:active,
        .start-button:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid #fecaca;
        }

        .validation-info {
            background: #fffbeb;
            color: #92400e;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            border: 1px solid #fed7aa;
        }

        @media (max-width: 768px) {
            .container {
                padding: 8px; /* ridotto del 50% */
            }

            .header {
                flex-direction: column;
                gap: 16px;
            }

            .header-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px; /* ridotto del 50% */
            }

            .config-section {
                padding: 12px; /* ridotto del 50% */
            }

            .config-grid {
                grid-template-columns: 1fr; /* anche su mobile: impila verticalmente */
            }

            .set-selector {
                grid-template-columns: repeat(3, 1fr);
            }

            .rotation-selector {
                grid-template-columns: repeat(3, 1fr);
            }

            .phase-selector {
                grid-template-columns: 1fr 1fr; /* affianca anche su mobile */
                gap: 6px; /* ridotto del 50% */
            }
        }
    </style>
</head>
<body>

    <script>
        // Variabili globali
        let currentUser = null;
        let matchData = null;
        let setConfig = {
            set: 1, // default fisso: Set 1
            phase: null,
            ourRotation: null,
            opponentRotation: null
        };

        // Elementi DOM
        const matchSummary = document.getElementById('matchSummary');
        const errorMessage = document.getElementById('errorMessage');
        const scoutBtn = document.getElementById('scoutBtn');
        // Nessun selettore set: è sempre Set 1
        const phaseButtons = document.querySelectorAll('.phase-btn');
        const ourRotationSelect = document.getElementById('ourRotationSelect');
        const opponentRotationSelect = document.getElementById('opponentRotationSelect');
        // Header elements
        const headerMenuToggle = document.getElementById('headerMenuToggle');
        const headerMenu = document.getElementById('headerMenu');
        const accountEmail = document.getElementById('accountEmail');
        const accountLogout = document.getElementById('accountLogout');
        const goToMatchesBtn = document.getElementById('goToMatchesBtn');
        const goToTeamsBtn = document.getElementById('goToTeamsBtn');
        const backBtn = document.getElementById('backBtn');

        // Inizializzazione
        document.addEventListener('DOMContentLoaded', function() {
            initializeSetConfig();
            setupEventListeners();
            setupHeaderListeners();
        });

        function initializeSetConfig() {
            // Attendi che Firebase sia pronto
            if (typeof window.authFunctions === 'undefined') {
                setTimeout(initializeSetConfig, 200);
                return;
            }

            // Controlla autenticazione
            let __authRedirectTimer = null;
            window.authFunctions.onAuthStateChanged((user) => {
                if (!user) {
                    if (__authRedirectTimer) clearTimeout(__authRedirectTimer);
                    __authRedirectTimer = setTimeout(() => {
                        const stillNull = !window.authFunctions.getCurrentUser();
                        if (stillNull) window.location.href = '/auth-login.html';
                    }, 600);
                    return;
                }
                if (__authRedirectTimer) { clearTimeout(__authRedirectTimer); __authRedirectTimer = null; }
                currentUser = user;
                if (accountEmail) accountEmail.textContent = user.email;
                loadMatchData();
            });
        }

        async function loadMatchData() {
            try {
                const url = new URL(window.location.href);
                const teamId = url.searchParams.get('team') || localStorage.getItem('selectedTeamId');
                let matchId = url.searchParams.get('match');
                if (!matchId) {
                    try {
                        const setup = JSON.parse(localStorage.getItem('currentMatchSetup')||'{}');
                        matchId = setup?.id || localStorage.getItem('selectedMatchId') || null;
                    } catch(_) {
                        matchId = localStorage.getItem('selectedMatchId');
                    }
                }
                if (!teamId || !matchId) { hideError(); return; }

                function normalize(meta){
                    const m = meta || {};
                    const homeAway = m.homeAway || (m.location === 'casa' ? 'home' : (m.location === 'trasferta' ? 'away' : ''));
                    const loc = m.location || (homeAway === 'home' ? 'casa' : (homeAway === 'away' ? 'trasferta' : ''));
                    const opp = m.opponent || m.opponentTeam || (() => {
                        const my = m.myTeam || m.teamName || '';
                        if (homeAway === 'home') return m.awayTeam || '';
                        if (homeAway === 'away') return m.homeTeam || '';
                        return m.awayTeam || m.homeTeam || '';
                    })();
                    const dateStr = m.matchDate || m.date || '';
                    const type = m.eventType || m.matchType || '';
                    return { opponent: opp, matchDate: dateStr, eventType: type, location: loc, myTeam: m.myTeam || m.teamName || '', description: m.description || '' };
                }

                let loaded = false;
                try {
                    const res = await window.firestoreService.getMatchData(teamId, matchId);
                    if (res?.success && res.meta) {
                        const norm = normalize(res.meta);
                        matchData = { ...norm, teamId, roster: Array.isArray(res.roster)?res.roster:[] };
                        loaded = true;
                    }
                } catch(_) {}

                if (!loaded) {
                    try {
                        const local = JSON.parse(localStorage.getItem('volleyMatches')||'[]');
                        const found = Array.isArray(local) ? local.find(x => String(x.id) === String(matchId)) : null;
                        if (found) {
                            const norm = normalize(found);
                            matchData = { ...norm, teamId, roster: Array.isArray(found.roster)?found.roster:[] };
                            loaded = true;
                        }
                    } catch(_) {}
                }

                if (!loaded) {
                    try {
                        const setup = JSON.parse(localStorage.getItem('currentMatchSetup')||'{}');
                        const norm = normalize(setup);
                        matchData = { ...norm, teamId, roster: Array.isArray(setup.roster)?setup.roster:[] };
                        loaded = !!(norm.opponent || norm.matchDate || norm.eventType || norm.location);
                    } catch(_) {}
                }

                if (loaded) { displayMatchSummary(); } else { hideError(); }
            } catch (error) {
                console.error('Errore nel caricamento dati partita:', error);
                hideError();
            }
        }

        function displayMatchSummary() {
            if (!matchData) return;

            const eventTypeLabelMap = {
                'campionato': 'Campionato',
                'coppa': 'Coppa',
                'pgs': 'PGS',
                'csi': 'CSI',
                'playoff': 'Playoff',
                'amichevole': 'Amichevole',
                'torneo': 'Torneo',
                'altro': 'Altro'
            };

            matchSummary.innerHTML = `
                <div class="match-row">
                    <div class="match-detail">
                        <div class="match-detail-label">Avversario</div>
                        <div class="match-detail-value">${matchData.opponent || matchData.opponentTeam || ''}</div>
                    </div>
                    <div class="match-detail">
                        <div class="match-detail-label">Data</div>
                        <div class="match-detail-value">${formatDate(matchData.matchDate || matchData.date || '')}</div>
                    </div>
                </div>
                <div class="match-row">
                    <div class="match-detail">
                        <div class="match-detail-label">Tipo</div>
                        <div class="match-detail-value">${eventTypeLabelMap[(matchData.eventType || matchData.matchType || '').toLowerCase()] || (matchData.eventType || matchData.matchType || '')}</div>
                    </div>
                    <div class="match-detail">
                        <div class="match-detail-label">Luogo</div>
                        <div class="match-detail-value">${(matchData.location || ((matchData.homeAway==='home')?'casa':(matchData.homeAway==='away')?'trasferta':'')) === 'casa' ? 'Casa' : 'Trasferta'}</div>
                    </div>
                </div>
            `;
        }

        function setupEventListeners() {
            // Set fisso
            setConfig.set = 1;

            // Phase selection
            phaseButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    phaseButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    setConfig.phase = this.dataset.phase;
                    validateConfig();
                });
            });

            // Our rotation selection (select)
            if (ourRotationSelect) {
                ourRotationSelect.addEventListener('change', function(){
                    setConfig.ourRotation = this.value;
                    validateConfig();
                });
                setConfig.ourRotation = ourRotationSelect.value;
            }

            // Opponent rotation selection (optional, select)
            if (opponentRotationSelect) {
                opponentRotationSelect.addEventListener('change', function(){
                    setConfig.opponentRotation = this.value || null;
                });
            }

            // Scout button
            scoutBtn.addEventListener('click', startScouting);
        }

        function setupHeaderListeners(){
            // Menu account toggle
            if (headerMenuToggle && headerMenu){
                let open = false;
                function setOpen(v){ open = !!v; if (open){ headerMenu.removeAttribute('hidden'); headerMenuToggle.setAttribute('aria-expanded','true'); } else { headerMenu.setAttribute('hidden',''); headerMenuToggle.setAttribute('aria-expanded','false'); } }
                headerMenuToggle.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); setOpen(!open); });
                document.addEventListener('click', function(){ if (open) setOpen(false); });
                const exportBtn = document.getElementById('exportSetsBtnMobile');
                const saveBtn = document.getElementById('save-match-btn');
                const toMatchesBtn = document.getElementById('goToMatchesBtnMobile');
                const toTeamsBtn = document.getElementById('goToTeamsBtnMobile');
                const exitBtn = document.getElementById('exitToWelcomeBtnMobile');
                const signOutBtn = document.getElementById('signOutBtnMobile');
                if (exportBtn) exportBtn.addEventListener('click', async (e)=>{ e.preventDefault(); e.stopPropagation(); try{ if (typeof window.exportAllSetsToExcel==='function'){ await window.exportAllSetsToExcel(); } else { alert('Esporta non disponibile su questa pagina'); } } finally { setOpen(false); } });
                if (saveBtn) saveBtn.addEventListener('click', async (e)=>{ e.preventDefault(); e.stopPropagation(); try{ if (typeof window.saveCurrentMatch==='function'){ await window.saveCurrentMatch(); alert('Dati salvati'); } else { alert('Salvataggio non disponibile su questa pagina'); } } finally { setOpen(false); } });
                if (toMatchesBtn) toMatchesBtn.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); setOpen(false); location.href='matches.html'; });
                if (toTeamsBtn) toTeamsBtn.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); setOpen(false); location.href='my-teams.html'; });
                if (exitBtn) exitBtn.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); setOpen(false); location.href='src/index.html'; });
                if (signOutBtn) signOutBtn.addEventListener('click', async (e)=>{ e.preventDefault(); e.stopPropagation(); try{ if (window.authFunctions && typeof window.authFunctions.signOut==='function'){ await window.authFunctions.signOut(); } } finally { setOpen(false); location.href='src/index.html'; } });
            }
            // Navigazione menu account
            if (goToMatchesBtn){
                goToMatchesBtn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); window.location.href = 'matches.html'; });
            }
            if (goToTeamsBtn){
                goToTeamsBtn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); window.location.href = 'my-teams.html'; });
            }
            // Logout
            if (accountLogout){
                accountLogout.addEventListener('click', handleLogout);
            }
            // Back
            if (backBtn){
                backBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (window.history.length > 1){
                        window.history.back();
                    } else {
                        window.location.href = 'match-setup.html';
                    }
                });
            }
        }

        function handleLogout(){
            try {
                if (window.authFunctions && typeof window.authFunctions.signOut === 'function'){
                    window.authFunctions.signOut();
                } else {
                    console.warn('authFunctions.signOut non disponibile');
                }
            } catch (e){
                console.error('Errore durante il logout:', e);
            }
        }

        function validateConfig() {
            const isValid = setConfig.phase && setConfig.ourRotation;
            scoutBtn.disabled = !isValid;
            
            if (isValid) {
                scoutBtn.textContent = 'Start Scout';
                hideError();
            } else {
                scoutBtn.textContent = 'Completa la configurazione';
            }
        }

        function startScouting() {
            const missing = [];
            if (!setConfig.phase) missing.push('Fase di inizio');
            if (!setConfig.ourRotation) missing.push('Rotazione Nostra');
            let teamId = null, matchId = null;
            try {
                const url = new URL(window.location.href);
                teamId = url.searchParams.get('team') || localStorage.getItem('selectedTeamId');
                matchId = url.searchParams.get('match') || null;
            } catch(_) { teamId = localStorage.getItem('selectedTeamId'); }
            if (!matchId) {
                try {
                    const setup = JSON.parse(localStorage.getItem('currentMatchSetup')||'{}');
                    matchId = setup?.id || localStorage.getItem('selectedMatchId') || null;
                } catch(_) {
                    matchId = localStorage.getItem('selectedMatchId');
                }
            }
            if (!teamId) missing.push('Squadra selezionata');
            if (!matchId) missing.push('ID partita');

            if (missing.length) { showError(missing); return; }

            // Preserva/recupera il roster per la sessione
            let existing = {};
            try { existing = JSON.parse(localStorage.getItem('currentScoutingSession')||'{}'); } catch(_){ existing = {}; }
            let existingRoster = Array.isArray(existing.roster) ? existing.roster : [];
            if (!existingRoster.length) {
                try {
                    const setup = JSON.parse(localStorage.getItem('currentMatchSetup')||'{}');
                    const rr = Array.isArray(setup?.roster) ? setup.roster : [];
                    if (rr.length) existingRoster = rr;
                } catch(_){}
            }
            if (!existingRoster.length) {
                try {
                    const fromApp = Array.isArray(window.appState?.currentRoster) ? window.appState.currentRoster : [];
                    if (fromApp.length) existingRoster = fromApp;
                } catch(_){ }
            }
            if (!existingRoster.length) {
                try {
                    const local = JSON.parse(localStorage.getItem('volleyMatches')||'[]');
                    const found = local.find(m => String(m.id) === String(matchId));
                    const rr = found ? (Array.isArray(found.roster) ? found.roster : (Array.isArray(found.players) ? found.players : [])) : [];
                    if (rr.length) existingRoster = rr;
                } catch(_){}
            }
            if (!existingRoster.length) {
                try {
                    const saved = JSON.parse(localStorage.getItem('savedRosters')||'[]');
                    let best = null, bestScore = -1;
                    saved.forEach(item => {
                        const rr = Array.isArray(item?.roster) ? item.roster : (Array.isArray(item?.players) ? item.players : []);
                        if (Array.isArray(rr) && rr.length){
                            const s = rr.reduce((acc,p)=> acc + ((p && (p.name||p.surname||p.firstName||p.lastName)) ? 1 : 0), 0);
                            if (s > bestScore){ bestScore = s; best = rr; }
                        }
                    });
                    if (best) existingRoster = best;
                } catch(_){}
            }

            const fullConfig = { ...existing, ...matchData, teamId, matchId, setConfig: { ...setConfig, set: 1 }, startTime: new Date().toISOString(), roster: existingRoster };
            localStorage.setItem('currentScoutingSession', JSON.stringify(fullConfig));
            localStorage.setItem('allowScoutingEntry','1');
            window.location.href = 'index.html';
        }

        function formatDate(dateString) {
            // Aspettandoci formato ISO yyyy-mm-dd, senza timezone
            const parts = String(dateString || '').split('-');
            if (parts.length === 3) {
                const [yyyy, mm, dd] = parts;
                return `${dd.padStart(2,'0')}/${mm.padStart(2,'0')}/${yyyy}`;
            }
            const d = new Date(dateString);
            const day = String(d.getDate()).padStart(2,'0');
            const month = String(d.getMonth()+1).padStart(2,'0');
            const year = String(d.getFullYear());
            return `${day}/${month}/${year}`;
        }

        function showError(message) {
            if (Array.isArray(message)) {
                errorMessage.innerHTML = 'Parametri mancanti:<ul>' + message.map(m => `<li>${m}</li>`).join('') + '</ul>';
            } else {
                errorMessage.textContent = String(message || '');
            }
            errorMessage.style.display = 'block';
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }
    </script>
</body>
</html>
