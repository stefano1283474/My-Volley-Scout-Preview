<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Volley Scout - Configurazione Set</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            color: #1e293b;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 12px; /* ridotto del 50% */
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 12px; /* ridotto del 50% */
            margin-bottom: 12px; /* ridotto del 50% */
            border: 2px solid #0d6efd; /* bordo blu evidente */
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            color: #64748b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .back-btn:hover {
            background: #e2e8f0;
            color: #475569;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
        }

        .match-info {
            background: white;
            border-radius: 12px;
            padding: 12px; /* ridotto del 50% */
            margin-bottom: 12px; /* ridotto del 50% */
            border: 2px solid #0d6efd; /* bordo blu evidente */
        }

        .match-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px; /* ridotto del 50% */
            text-align: center;
        }

        /* Riga per accoppiare due campi affiancati */
        .match-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .match-detail {
            padding: 8px; /* ridotto del 50% */
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .match-detail-label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 4px;
            letter-spacing: 0.05em;
        }

        .match-detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }

        .config-section {
            background: white;
            border-radius: 12px;
            padding: 16px; /* ridotto del 50% */
            border: 2px solid #0d6efd; /* bordo blu evidente */
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            color: #1e293b;
        }

        .section-subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 12px; /* ridotto del 50% */
            font-size: 14px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px; /* ridotto del 50% */
            margin-bottom: 12px; /* ridotto del 50% */
        }

        .config-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px; /* ridotto del 50% */
            border: 1px solid #e2e8f0;
        }

        .config-card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px; /* ridotto del 50% */
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Select generico, coerente con palette bianco/blu */
        .form-select {
            width: 100%;
            padding: 8px 12px; /* compatibile con riduzione */
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            color: #1e293b;
            font-size: 14px;
        }
        .form-select:focus {
            outline: none;
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.1);
        }

        .phase-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px; /* ridotto del 50% */
        }

        .phase-btn {
            padding: 10px; /* ridotto del 50% */
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .phase-btn:hover {
            border-color: #0d6efd; /* blu pieno */
            background: #f8fbff;
        }

        .phase-btn.active {
            background: #0d6efd; /* blu pieno */
            color: white;
            border-color: #0d6efd;
        }

        .phase-icon {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .phase-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .phase-desc {
            font-size: 12px;
            opacity: 0.7;
        }

        /* eliminati i bottoni rotazione: uso select */

        .optional-label {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .start-button {
            background: #0d6efd; /* blu pieno */
            color: white;
            border: none;
            padding: 8px 16px; /* ridotto del 50% */
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 12px; /* ridotto del 50% */
        }

        .start-button:hover {
            background: #0b5ed7; /* accento hover */
        }

        .start-button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid #fecaca;
        }

        .validation-info {
            background: #fffbeb;
            color: #92400e;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            border: 1px solid #fed7aa;
        }

        @media (max-width: 768px) {
            .container {
                padding: 8px; /* ridotto del 50% */
            }

            .header {
                flex-direction: column;
                gap: 16px;
            }

            .header-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px; /* ridotto del 50% */
            }

            .config-section {
                padding: 12px; /* ridotto del 50% */
            }

            .config-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .set-selector {
                grid-template-columns: repeat(3, 1fr);
            }

            .rotation-selector {
                grid-template-columns: repeat(3, 1fr);
            }

            .phase-selector {
                grid-template-columns: 1fr 1fr; /* affianca anche su mobile */
                gap: 6px; /* ridotto del 50% */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <a href="match-setup.html" class="back-btn">
                    ← Modifica Partita
                </a>
                <div>
                    <h1 class="page-title">Configurazione Set</h1>
                    <p class="section-subtitle">Configura il set da giocare e i parametri di inizio</p>
                </div>
            </div>
        </div>

        <!-- Match Info -->
        <div class="match-info">
            <h2 class="section-title" style="font-size:18px; text-align:left; margin-bottom:8px;">Dati della partita</h2>
            <div class="match-summary" id="matchSummary">
                <!-- Match details will be loaded here -->
            </div>
        </div>

        <!-- Configuration Section -->
        <div class="config-section">
            <h2 class="section-title">Setup Set</h2>

            

            <div class="error-message" id="errorMessage"></div>

            <div class="config-grid">
                <!-- Set Selection -->
                <div class="config-card">
                    <div class="config-card-title">Selezione Set</div>
                    <select id="setSelect" class="form-select">
                        <option value="1">Set 1</option>
                        <option value="2">Set 2</option>
                        <option value="3">Set 3</option>
                        <option value="4">Set 4</option>
                        <option value="5">Set 5</option>
                        <option value="6">Set 6</option>
                    </select>
                </div>

                <!-- Phase Selection -->
                <div class="config-card">
                    <div class="config-card-title">Fase di Inizio</div>
                    <div class="phase-selector">
                        <div class="phase-btn" data-phase="servizio">Servizio</div>
                        <div class="phase-btn" data-phase="ricezione">Ricezione</div>
                    </div>
                </div>

                <!-- Our Team Rotation -->
                <div class="config-card">
                    <div class="config-card-title">Rotazione Nostra</div>
                    <select id="ourRotationSelect" class="form-select">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                    </select>
                </div>

                <!-- Opponent Rotation (Optional) -->
                <div class="config-card">
                    <div class="config-card-title">Rotazione Avversari</div>
                    <div class="optional-label">Opzionale - Se conosciuta</div>
                    <select id="opponentRotationSelect" class="form-select">
                        <option value="">Non specificata</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                    </select>
                </div>
            </div>

            <button class="start-button" id="scoutBtn" disabled>
                Start Scout
            </button>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="./connection-manager.js"></script>
    <script src="./firebase-config.js"></script>
    <script src="./firestore-service.js"></script>
    <script src="./auth.js"></script>
    <script src="./src/modules/teams/teams.js"></script>
    <script src="./src/modules/matches/matches.js"></script>
    <script src="./src/modules/scouting/scouting.js"></script>

    <script>
        // Variabili globali
        let currentUser = null;
        let matchData = null;
        let setConfig = {
            set: null,
            phase: null,
            ourRotation: null,
            opponentRotation: null
        };

        // Elementi DOM
        const matchSummary = document.getElementById('matchSummary');
        const errorMessage = document.getElementById('errorMessage');
        const scoutBtn = document.getElementById('scoutBtn');
        const setSelect = document.getElementById('setSelect');
        const phaseButtons = document.querySelectorAll('.phase-btn');
        const ourRotationSelect = document.getElementById('ourRotationSelect');
        const opponentRotationSelect = document.getElementById('opponentRotationSelect');

        // Inizializzazione
        document.addEventListener('DOMContentLoaded', function() {
            initializeSetConfig();
            setupEventListeners();
        });

        function initializeSetConfig() {
            // Attendi che Firebase sia pronto
            if (typeof window.authFunctions === 'undefined') {
                setTimeout(initializeSetConfig, 200);
                return;
            }

            // Controlla autenticazione
            window.authFunctions.onAuthStateChanged((user) => {
                if (!user) {
                    window.location.href = 'auth-login.html';
                    return;
                }
                
                currentUser = user;
                loadMatchData();
            });
        }

        function loadMatchData() {
            // Carica i dati della partita dal localStorage
            const savedMatchData = localStorage.getItem('currentMatchSetup');
            if (!savedMatchData) {
                showError('Errore: dati partita non trovati. Torna alla configurazione partita.');
                return;
            }

            try {
                matchData = JSON.parse(savedMatchData);
                displayMatchSummary();
            } catch (error) {
                console.error('Errore nel parsing dei dati partita:', error);
                showError('Errore nel caricamento dei dati partita.');
            }
        }

        function displayMatchSummary() {
            if (!matchData) return;

            const locationIcon = matchData.location === 'casa' ? '🏠' : '✈️';
            const eventTypeMap = {
                'campionato': '🏆 Campionato',
                'coppa': '🏆 Coppa',
                'playoff': '🏆 Playoff',
                'amichevole': '🤝 Amichevole',
                'torneo': '🏆 Torneo',
                'altro': '📋 Altro'
            };

            matchSummary.innerHTML = `
                <div class="match-row">
                    <div class="match-detail">
                        <div class="match-detail-label">Avversario</div>
                        <div class="match-detail-value">${matchData.opponent}</div>
                    </div>
                    <div class="match-detail">
                        <div class="match-detail-label">Data</div>
                        <div class="match-detail-value">${formatDate(matchData.matchDate)}</div>
                    </div>
                </div>
                <div class="match-row">
                    <div class="match-detail">
                        <div class="match-detail-label">Tipo</div>
                        <div class="match-detail-value">${eventTypeMap[matchData.eventType] || matchData.eventType}</div>
                    </div>
                    <div class="match-detail">
                        <div class="match-detail-label">Luogo</div>
                        <div class="match-detail-value">${locationIcon} ${matchData.location === 'casa' ? 'Casa' : 'Trasferta'}</div>
                    </div>
                </div>
            `;
        }

        function setupEventListeners() {
            // Set selection (select)
            if (setSelect) {
                setSelect.addEventListener('change', function(){
                    setConfig.set = this.value;
                    validateConfig();
                });
                // default iniziale
                setConfig.set = setSelect.value;
            }

            // Phase selection
            phaseButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    phaseButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    setConfig.phase = this.dataset.phase;
                    validateConfig();
                });
            });

            // Our rotation selection (select)
            if (ourRotationSelect) {
                ourRotationSelect.addEventListener('change', function(){
                    setConfig.ourRotation = this.value;
                    validateConfig();
                });
                setConfig.ourRotation = ourRotationSelect.value;
            }

            // Opponent rotation selection (optional, select)
            if (opponentRotationSelect) {
                opponentRotationSelect.addEventListener('change', function(){
                    setConfig.opponentRotation = this.value || null;
                });
            }

            // Scout button
            scoutBtn.addEventListener('click', startScouting);
        }

        function validateConfig() {
            const isValid = setConfig.set && setConfig.phase && setConfig.ourRotation;
            scoutBtn.disabled = !isValid;
            
            if (isValid) {
                scoutBtn.textContent = 'Start Scout';
                hideError();
            } else {
                scoutBtn.textContent = 'Completa la configurazione';
            }
        }

        function startScouting() {
            if (!setConfig.set || !setConfig.phase || !setConfig.ourRotation) {
                showError('Completa tutti i campi obbligatori prima di iniziare.');
                return;
            }

            // Salva la configurazione del set
            const fullConfig = {
                ...matchData,
                setConfig: setConfig,
                startTime: new Date().toISOString()
            };

            localStorage.setItem('currentScoutingSession', JSON.stringify(fullConfig));
            
            // Reindirizza alla pagina di scouting (l'attuale index.html con Start-Scouting)
            window.location.href = 'index.html';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('it-IT', {
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }
    </script>
</body>
</html>
