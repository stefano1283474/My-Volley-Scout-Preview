<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Volley Scout - Gestione Partite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff; /* sfondo bianco */
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: auto 1fr auto; /* sinistra | centro | destra */
            align-items: start; /* posiziona verso l'alto */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid #0d6efd; /* contorno blu */
        }

        .header .team-info { justify-self: center; }
        .header-left-col { justify-self: start; align-self: start; display:flex; flex-direction:column; gap:8px; }

        .back-btn {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            color: #666;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .back-btn:hover {
            background: #e9ecef;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .team-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100());
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .team-details h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .team-stats {
            color: #666;
            font-size: 14px;
        }

        /* Account menu */
        .account { position: relative; }
        .account-btn {
            background: #ffffff;
            color: #0d6efd;
            border: 1px solid #e9ecef;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .account-avatar { font-size: 20px; line-height: 1; }
        .account-menu {
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            background: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            padding: 10px;
            min-width: 220px;
        }
        .account-row { display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
        .account-label { color:#666; font-size:12px; }
        .account-value { color:#333; font-size:14px; }
        .menu-item {
            background: #ffffff;
            color: #0d6efd;
            border: 1px solid #e9ecef;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }

        .actions-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .action-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
        }

        .action-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: white;
        }

        .action-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .action-description {
            color: #666;
            line-height: 1.5;
        }

        .matches-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid #0d6efd; /* contorno blu */
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        .matches-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .match-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            display: block; /* singola riga */
            white-space: nowrap; /* evita a capo */
            overflow-x: auto; /* consente scroll se troppo lunga */
            transition: all 0.3s ease;
        }

        .match-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.12);
        }

        .match-line { color:#333; font-size:16px; }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: #0d6efd; /* blu pieno */
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #0b5ed7; /* blu più scuro */
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(13, 110, 253, 0.25);
        }

        .btn-secondary {
            background: #ffffff; /* bianco pieno */
            color: #0d6efd; /* testo blu */
            border: 1px solid #e9ecef;
        }

        .btn-secondary:hover {
            background: #f8f9fa; /* scala di bianco */
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Tabs */
        .tabs { display:flex; gap:10px; margin: 0 0 16px 0; }
        .tab-button {
            background:#ffffff; border:1px solid #e9ecef; color:#0d6efd;
            padding:8px 14px; border-radius:10px; cursor:pointer; font-weight:600;
        }
        .tab-button.active {
            background: #0d6efd; /* blu pieno */
            color:#ffffff; border:1px solid #0d6efd;
        }
        .tab-panel { margin-top: 0; }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header {
                grid-template-columns: auto 1fr auto;
                gap: 15px;
            }

            .actions-grid {
                grid-template-columns: 1fr;
            }

            .match-card {
                /* mantiene singola riga anche su mobile */
                text-align: left;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left-col">
                <a href="welcome.html" class="back-btn" aria-label="Torna alle squadre" title="Torna alle squadre">←</a>
                <div class="account">
                    <button id="accountBtn" class="account-btn" aria-expanded="false" aria-controls="accountMenu" title="Account">
                        <span class="account-avatar">👤</span>
                    </button>
                    <div id="accountMenu" class="account-menu" hidden>
                        <div class="account-row">
                            <div class="account-label">Utente</div>
                            <div class="account-value" id="accountEmail">Caricamento...</div>
                        </div>
                        <button class="menu-item" id="accountLogout">Esci</button>
                    </div>
                </div>
            </div>
            <div class="team-info">
                <div class="team-icon">🏐</div>
                <div class="team-details">
                    <div id="teamTitle" style="line-height:1.2;">
                        <div id="clubNameTop" style="font-size:18px; font-weight:600; color:#111;">Caricamento...</div>
                        <div id="teamNameBottom" style="font-size:16px; color:#333;">Caricamento...</div>
                    </div>
                    <div class="team-stats" id="teamStats">Caricamento statistiche...</div>
                </div>
            </div>
            <div></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button id="tabNew" class="tab-button active">Nuova partita</button>
            <button id="tabList" class="tab-button">Elenco Partite</button>
        </div>

        <!-- Tab: Nuova partita -->
        <div id="newMatchSection" class="matches-section tab-panel" style="display:block;">
            <h2 class="section-title">Nuova partita</h2>
            <form id="inlineMatchForm" class="new-match-form" style="display:flex; flex-direction:column; gap:14px;">
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:14px;">
                    <div>
                        <label for="opponent-team" style="display:block; margin-bottom:6px; color:#555;">Avversario</label>
                        <input type="text" id="opponent-team" name="opponent-team" class="input" placeholder="Nome squadra avversaria" style="width:100%; padding:10px; border:1px solid #e9ecef; border-radius:8px;">
                    </div>
                    <div>
                        <label for="home-away" style="display:block; margin-bottom:6px; color:#555;">Casa/Trasferta</label>
                        <select id="home-away" name="home-away" class="input" style="width:100%; padding:10px; border:1px solid #e9ecef; border-radius:8px;">
                            <option value="home">Casa</option>
                            <option value="away">Trasferta</option>
                        </select>
                    </div>
                    <div>
                        <label for="match-type" style="display:block; margin-bottom:6px; color:#555;">Tipo partita</label>
                        <select id="match-type" name="match-type" class="input" style="width:100%; padding:10px; border:1px solid #e9ecef; border-radius:8px;">
                            <option value="campionato">Campionato</option>
                            <option value="coppa">Coppa</option>
                            <option value="pgs">PGS</option>
                            <option value="csi">CSI</option>
                            <option value="amichevole">Amichevole</option>
                            <option value="torneo">Torneo</option>
                        </select>
                    </div>
                    <div id="tournamentNameWrapper" style="display:none;">
                        <label for="tournament-name" style="display:block; margin-bottom:6px; color:#555;">Nome torneo</label>
                        <input type="text" id="tournament-name" name="tournament-name" class="input" placeholder="Inserisci il nome del torneo" style="width:100%; padding:10px; border:1px solid #e9ecef; border-radius:8px;">
                    </div>
                    <div>
                        <label for="match-date" style="display:block; margin-bottom:6px; color:#555;">Data</label>
                        <input type="date" id="match-date" name="match-date" class="input" style="width:100%; padding:10px; border:1px solid #e9ecef; border-radius:8px;">
                    </div>
                </div>
                <div>
                    <label for="match-description" style="display:block; margin-bottom:6px; color:#555;">Descrizione (opzionale)</label>
                    <textarea id="match-description" name="match-description" rows="3" class="input" style="width:100%; padding:10px; border:1px solid #e9ecef; border-radius:8px;"></textarea>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:10px;">
                    <button type="submit" class="btn btn-primary">Crea partita</button>
                </div>
            </form>
        </div>

        
        
        <!-- Tab: Elenco Partite -->
        <div id="listSection" class="matches-section tab-panel" style="display:none;">
            <h2 class="section-title">Elenco Partite</h2>
            
            <div class="matches-list" id="matchesList">
                <!-- Matches will be loaded here -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyMatches" style="display: none;">
                <div class="empty-icon">🏐</div>
                <p>Nessuna partita trovata</p>
                <p>Inizia creando la tua prima partita!</p>
            </div>
        </div>
        
        

        
     </div>
 
      <!-- Loading Screen -->
    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center;">
            <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <p>Caricamento...</p>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="./connection-manager.js"></script>
    <script src="./firebase-config.js"></script>
    <script src="./firestore-service.js"></script>
    <script src="./auth.js"></script>
    <script src="./src/modules/teams/teams.js"></script>
    <script src="./src/modules/matches/matches.js"></script>
    <script src="./src/modules/scouting/scouting.js"></script>

    <script>
        // Variabili globali
        let currentUser = null;
        let selectedTeam = null;
        let matches = [];

        // Elementi DOM
        const teamName = document.getElementById('teamName');
        const teamStats = document.getElementById('teamStats');
        const accountBtn = document.getElementById('accountBtn');
        const accountMenu = document.getElementById('accountMenu');
        const accountEmail = document.getElementById('accountEmail');
        const accountLogout = document.getElementById('accountLogout');
        const matchesList = document.getElementById('matchesList');
        const emptyMatches = document.getElementById('emptyMatches');
        const loadingScreen = document.getElementById('loadingScreen');
        const tabNew = document.getElementById('tabNew');
        const tabList = document.getElementById('tabList');
        const newMatchSection = document.getElementById('newMatchSection');
        const listSection = document.getElementById('listSection');
        const inlineMatchForm = document.getElementById('inlineMatchForm');

        // Inizializzazione
        document.addEventListener('DOMContentLoaded', function() {
            initializeMatchesPage();
        });

        function initializeMatchesPage() {
            // Attendi che Firebase sia pronto
            if (typeof window.authFunctions === 'undefined') {
                setTimeout(initializeMatchesPage, 200);
                return;
            }

            // Controlla autenticazione
            window.authFunctions.onAuthStateChanged((user) => {
                if (!user) {
                    window.location.href = 'auth-login.html';
                    return;
                }
                
                currentUser = user;
                if (accountEmail) accountEmail.textContent = user.email;
                loadSelectedTeam();
                hideLoadingScreen();
            });

            // Event listeners
            if (accountBtn && accountMenu){
                accountBtn.addEventListener('click', () => {
                    const expanded = accountBtn.getAttribute('aria-expanded') === 'true';
                    accountBtn.setAttribute('aria-expanded', (!expanded).toString());
                    accountMenu.hidden = expanded;
                });
                document.addEventListener('click', (e) => {
                    if (!accountMenu.hidden && !accountMenu.contains(e.target) && e.target !== accountBtn){
                        accountMenu.hidden = true;
                        accountBtn.setAttribute('aria-expanded', 'false');
                    }
                });
            }
            if (accountLogout){
                accountLogout.addEventListener('click', handleLogout);
            }
            // Tabs
            if (tabNew) tabNew.addEventListener('click', () => switchTab('new'));
            if (tabList) tabList.addEventListener('click', () => switchTab('list'));
            // Form nuova partita
            if (inlineMatchForm) inlineMatchForm.addEventListener('submit', handleInlineMatchSubmit);
            // Mostra/nascondi campo torneo
            const matchTypeSelect = document.getElementById('match-type');
            if (matchTypeSelect) matchTypeSelect.addEventListener('change', toggleTournamentField);
        }

        function loadSelectedTeam() {
            const teamId = localStorage.getItem('selectedTeamId');
            if (window.teamsModule) {
                // Se esiste un team corrente nel modulo, usalo, altrimenti prova con l'id memorizzato
                const current = window.teamsModule.getCurrentTeam();
                selectedTeam = current || (teamId ? window.teamsModule.getTeamById(teamId) : null);
            }

            if (!selectedTeam) {
                if (!teamId) {
                    // Nessuna squadra: proponi di andare alla gestione squadre per crearne/importarne una
                    const go = confirm('Non hai ancora creato o selezionato una squadra. Vuoi andare alla schermata "Squadre" per crearla o importarla?');
                    if (go) {
                        window.location.href = 'welcome.html';
                    }
                    return;
                } else {
                    // teamsModule non ancora pronto, riprova tra poco
                    setTimeout(loadSelectedTeam, 200);
                    return;
                }
            }

            updateTeamInfo();
            // Imposta tab predefinita e data odierna
            switchTab('new');
            const dateInput = document.getElementById('match-date');
            if (dateInput && !dateInput.value) {
                dateInput.value = new Date().toISOString().slice(0,10);
            }
            toggleTournamentField();

            // Prompt roster rimosso: questa pagina mostra solo l'elenco partite

            loadMatches();
        }

        function updateTeamInfo() {
            if (!selectedTeam) return;
            const clubEl = document.getElementById('clubNameTop');
            const teamEl = document.getElementById('teamNameBottom');
            const nameCombined = selectedTeam.name || '';
            const parts = String(nameCombined).split(' - ');
            const inferredTeam = selectedTeam.teamName || (parts.length ? parts[0] : '');
            const inferredClub = selectedTeam.clubName || (parts.length >= 2 ? parts.slice(1).join(' - ') : '');
            if (clubEl) clubEl.textContent = inferredClub || inferredTeam || '—';
            if (teamEl) teamEl.textContent = inferredTeam || '—';
            const playerCount = Array.isArray(selectedTeam.players) ? selectedTeam.players.length : (selectedTeam.players || 0);
            const selId = selectedTeam?.id != null ? String(selectedTeam.id) : null;
            const selName = selectedTeam?.name;
            const matchesCount = Array.isArray(matches) ? matches.filter(m => {
                const my = m.myTeam || m.teamName;
                const home = m.homeTeam;
                const away = m.awayTeam;
                const teamIdMatch = m.teamId != null ? String(m.teamId) === selId : false;
                return (teamIdMatch) || (selName && (my === selName || home === selName || away === selName));
            }).length : 0;
            teamStats.textContent = `${playerCount} giocatori • ${matchesCount} partite`;
        }

        async function loadMatches() {
            try {
                if (window.matchesModule) {
                    matches = window.matchesModule.getMatches();
                    if (!window.__matchesSubscribed) {
                        window.__matchesSubscribed = true;
                        window.matchesModule.onMatchesUpdate((updated) => {
                            matches = updated;
                            renderMatches();
                            updateTeamInfo();
                        });
                    }
                } else {
                    console.warn('matchesModule non ancora disponibile, riprovo...');
                    setTimeout(loadMatches, 200);
                    return;
                }
                renderMatches();
            } catch (error) {
                console.error('Errore nel caricamento partite:', error);
                showEmptyMatches();
            }
        }

        function switchTab(tab){
            const isNew = tab === 'new';
            if (newMatchSection && listSection){
                newMatchSection.style.display = isNew ? 'block' : 'none';
                listSection.style.display = isNew ? 'none' : 'block';
            }
            if (tabNew && tabList){
                tabNew.classList.toggle('active', isNew);
                tabList.classList.toggle('active', !isNew);
            }
        }

        function toggleTournamentField(){
            const sel = document.getElementById('match-type');
            const wrap = document.getElementById('tournamentNameWrapper');
            if (sel && wrap){
                const isTournament = sel.value === 'torneo';
                wrap.style.display = isTournament ? 'block' : 'none';
            }
        }

        async function handleInlineMatchSubmit(e){
            e.preventDefault();
            if (!selectedTeam){
                alert('Seleziona una squadra prima di creare una partita');
                return;
            }
            const fd = new FormData(inlineMatchForm);
            const matchData = {
                myTeam: selectedTeam.name,
                opponentTeam: fd.get('opponent-team')?.trim() || 'Avversario',
                homeAway: fd.get('home-away') || 'home',
                matchType: fd.get('match-type') || 'campionato',
                date: fd.get('match-date') || new Date().toISOString().slice(0,10),
                description: fd.get('match-description')?.trim() || ''
            };
            // Imposta correttamente le squadre di casa/trasferta per il modulo partite
            const isHome = (matchData.homeAway === 'home');
            matchData.homeTeam = isHome ? matchData.myTeam : matchData.opponentTeam;
            matchData.awayTeam = isHome ? matchData.opponentTeam : matchData.myTeam;
            if (matchData.matchType === 'torneo'){
                const tn = (fd.get('tournament-name') || '').toString().trim();
                if (!tn){
                    alert('Inserisci il nome del torneo');
                    return;
                }
                matchData.tournamentName = tn;
            }
            try {
                if (window.matchesModule?.createMatch){
                    const res = await window.matchesModule.createMatch(matchData);
                    if (res.success){
                        alert('Partita creata!');
                        // passa al tab elenco e aggiorna
                        switchTab('list');
                        loadMatches();
                        inlineMatchForm.reset();
                        const dateInput = document.getElementById('match-date');
                        if (dateInput) dateInput.value = new Date().toISOString().slice(0,10);
                        toggleTournamentField();
                    } else {
                        alert('Errore creazione partita: ' + (res.error || 'Sconosciuto'));
                    }
                } else {
                    alert('Modulo partite non disponibile');
                }
            } catch (err){
                console.error(err);
                alert('Errore nella creazione partita');
            }
        }

        function renderMatches() {
            const selName = selectedTeam?.name || null;
            const selId = selectedTeam?.id != null ? String(selectedTeam.id) : null;
            const relevant = Array.isArray(matches) ? matches.filter(m => {
                const my = m.myTeam || m.teamName;
                const home = m.homeTeam;
                const away = m.awayTeam;
                const teamIdMatch = m.teamId != null ? String(m.teamId) === selId : false;
                return (teamIdMatch) || (selName && (my === selName || home === selName || away === selName));
            }) : [];

            if (relevant.length === 0) {
                showEmptyMatches();
                return;
            }

            matchesList.innerHTML = '';
            emptyMatches.style.display = 'none';

            relevant.forEach(match => {
                const matchCard = createMatchCard(match);
                matchesList.appendChild(matchCard);
            });
        }

        function createMatchCard(match) {
            const card = document.createElement('div');
            card.className = 'match-card';

            const opp = match.opponent || match.opponentTeam || ((match.homeTeam || match.awayTeam) ? ((match.homeTeam === selectedTeam?.name) ? match.awayTeam : match.homeTeam) : 'Avversario');
            const rawDate = match.date || match.matchDate || match.createdAt || '';
            const date = typeof rawDate === 'string' ? rawDate : (rawDate ? new Date(rawDate).toISOString().slice(0,10) : '');
            const rawType = match.type || match.matchType || 'Partita';
            const typeMap = { campionato: 'Campionato', coppa: 'Coppa', pgs: 'PGS', csi: 'CSI', amichevole: 'Amichevole', torneo: 'Torneo' };
            const typeKey = String(rawType).toLowerCase();
            const typeLabel = typeMap[typeKey] || rawType;

            // Singola riga: Data • Tipo partita • Avversario (senza icone, senza status)
            card.innerHTML = `<div class="match-line">${date} • ${typeLabel} • ${opp}</div>`;
            card.style.cursor = 'pointer';
            // Apri configurazione set cliccando la card
            card.addEventListener('click', () => scoutMatch(match.id));
            return card;
        }

        function showEmptyMatches() {
            matchesList.innerHTML = '';
            emptyMatches.style.display = 'block';
        }

        function hideLoadingScreen() {
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 500);
        }

        // Funzioni partite
        function viewMatch(matchId) {
            localStorage.setItem('selectedMatchId', matchId);
            window.location.href = 'match-view.html';
        }

        // Modifica partita: non più usata in questa vista

        // Avvia configurazione set per la partita selezionata
        function scoutMatch(matchId) {
            try {
                const match = matches.find(m => m.id === matchId);
                if (!match) return alert('Partita non trovata');
                
                // Se la partita ha stato/progressi salvati, riprendi direttamente
                const hasProgress = (
                    match.status === 'in_progress' ||
                    (Array.isArray(match.actions) && match.actions.length > 0) ||
                    (Array.isArray(match.scoreHistory) && match.scoreHistory.length > 0)
                );

                if (hasProgress) {
                    // Assicura il roster selezionato coerente
                    if (match.teamId) {
                        localStorage.setItem('selectedTeamId', match.teamId);
                    }
                    // Imposta la sessione corrente e apri direttamente lo scouting
                    localStorage.setItem('currentScoutingSession', JSON.stringify(match));
                    window.location.href = 'index.html';
                } else {
                    // Altrimenti, mappa nei campi attesi da set-config.html
                    const setup = {
                        opponent: match.opponent || match.opponentTeam || 'Avversario',
                        matchDate: match.matchDate || match.date || new Date().toISOString().slice(0,10),
                        eventType: match.eventType || match.matchType || 'partita',
                        location: (match.location === 'home' || match.homeAway === 'home' || match.location === 'casa') ? 'casa' : 'trasferta',
                        venue: match.venue || '',
                        description: match.description || '',
                        teamId: match.teamId || localStorage.getItem('selectedTeamId') || null,
                        createdAt: match.createdAt || new Date().toISOString(),
                        status: match.status || 'planned',
                        id: match.id
                    };
                    localStorage.setItem('currentMatchSetup', JSON.stringify(setup));
                    window.location.href = 'set-config.html';
                }
            } catch (e) {
                console.error('Errore nell\'avvio scouting:', e);
                alert('Impossibile avviare scouting per questa partita');
            }
        }

        // Archivio partite rimosso da questa pagina

        async function handleLogout() {
             try {
                 await window.authFunctions.signOut();
                 localStorage.removeItem('selectedTeamId');
                 window.location.href = 'auth-login.html';
             } catch (error) {
                 console.error('Errore durante il logout:', error);
                 alert('Errore durante il logout');
             }
         }
 
         // --- Roster management rimosso: nessun listener in questa pagina ---
 
         function openRosterDialog() {
             if (!selectedTeam) {
                 const go = confirm('Non hai ancora selezionato una squadra. Vuoi andare alla schermata "Squadre" per crearla o importarla?');
                 if (go) window.location.href = 'welcome.html';
                 return;
             }
             rosterDialogTitle.textContent = `Gestisci Roster — ${selectedTeam.name}`;
             rosterTableBody.innerHTML = '';
             const players = Array.isArray(selectedTeam.players) ? selectedTeam.players : [];
             if (players.length === 0) {
                 for (let i = 0; i < 7; i++) addRosterRow();
             } else {
                 players.forEach(p => addRosterRow(p));
             }
             if (typeof rosterDialog.showModal === 'function') {
                 rosterDialog.showModal();
             } else {
                 rosterDialog.setAttribute('open', '');
             }
         }
 
         function addRosterRow(player = {}) {
             const tr = document.createElement('tr');
             tr.innerHTML = `
                 <td style=\"padding:8px; border-bottom:1px solid #eee;\"><input type=\"text\" class=\"input\" style=\"width:80px\" value=\"${player.number || ''}\" /></td>
                 <td style=\"padding:8px; border-bottom:1px solid #eee;\"><input type=\"text\" class=\"input\" value=\"${player.name || ''}\" /></td>
                 <td style=\"padding:8px; border-bottom:1px solid #eee;\"><input type=\"text\" class=\"input\" value=\"${player.surname || ''}\" /></td>
                 <td style=\"padding:8px; border-bottom:1px solid #eee;\"><input type=\"text\" class=\"input\" value=\"${player.role || ''}\" /></td>
                 <td style=\"padding:8px; border-bottom:1px solid #eee;\"><input type=\"text\" class=\"input\" value=\"${player.nickname || ''}\" /></td>
                 <td style=\"padding:8px; border-bottom:1px solid #eee; text-align:right;\">
                     <button type=\"button\" class=\"btn btn-danger btn-sm\" onclick=\"this.closest('tr').remove();\">Rimuovi</button>
                 </td>
             `;
             rosterTableBody.appendChild(tr);
         }
 
         async function saveRosterChanges() {
             try {
                 if (!selectedTeam) return;
                 const rows = Array.from(rosterTableBody.querySelectorAll('tr'));
                 const players = rows.map(r => {
                     const [number, name, surname, role, nickname] = Array.from(r.querySelectorAll('input')).map(i => i.value.trim());
                     return { number, name, surname, role, nickname };
                 }).filter(p => p && (p.number || p.name || p.surname || p.role || p.nickname));
                 const updatedTeam = {
                     id: selectedTeam.id,
                     name: selectedTeam.name,
                     players
                 };
                 const result = await window.teamsModule.saveTeam(updatedTeam);
                 if (result.success) {
                     selectedTeam = result.team;
                     updateTeamInfo();
                     alert('Roster salvato con successo!');
                     rosterDialog.close();
                 } else {
                     alert('Errore nel salvataggio: ' + (result.error || 'Sconosciuto'));
                 }
             } catch (e) {
                 console.error(e);
                 alert('Si è verificato un errore durante il salvataggio del roster.');
             }
         }
 
         function exportCurrentTeamCSV() {
             if (!selectedTeam) return alert('Nessuna squadra selezionata');
             try {
                 window.teamsModule.downloadCSV([selectedTeam.id], `${selectedTeam.name}_roster.csv`);
             } catch (e) {
                 console.error(e);
                 alert('Impossibile esportare il roster.');
             }
         }
 
         // Import CSV nel roster corrente
         function importRosterCSV(file) {
             if (!selectedTeam) {
                 alert('Seleziona prima una squadra.');
                 return;
             }
             const reader = new FileReader();
             reader.onload = () => {
                 try {
                     const text = reader.result;
                     const lines = text.split(/\r?\n/).filter(l => l.trim());
                     if (lines.length < 2) throw new Error('Il file CSV deve avere intestazione e almeno una riga di dati.');
                     const headers = splitCSVLine(lines[0]).map(h => h.trim().toLowerCase());
                     const idx = {
                         squadra: headers.indexOf('squadra'),
                         numero: headers.indexOf('numero'),
                         nome: headers.indexOf('nome'),
                         cognome: headers.indexOf('cognome'),
                         ruolo: headers.indexOf('ruolo'),
                         soprannome: headers.indexOf('soprannome')
                     };
                     if (idx.numero === -1 || idx.nome === -1 || idx.cognome === -1 || idx.ruolo === -1) {
                         throw new Error('Intestazioni richieste mancanti. Richieste: Numero, Nome, Cognome, Ruolo. Opzionale: Squadra, Soprannome');
                     }
                     const importedPlayers = [];
                     for (let i = 1; i < lines.length; i++) {
                         const cols = splitCSVLine(lines[i]);
                         if (!cols.length) continue;
                         const rowTeam = idx.squadra !== -1 ? (cols[idx.squadra] || '').trim() : '';
                         if (idx.squadra !== -1 && rowTeam && rowTeam !== selectedTeam.name) {
                             // Se il csv contiene più squadre, prendi solo le righe della squadra corrente
                             continue;
                         }
                         const player = {
                             number: idx.numero !== -1 ? (cols[idx.numero] || '').trim() : '',
                             name: idx.nome !== -1 ? (cols[idx.nome] || '').trim() : '',
                             surname: idx.cognome !== -1 ? (cols[idx.cognome] || '').trim() : '',
                             role: idx.ruolo !== -1 ? (cols[idx.ruolo] || '').trim() : '',
                             nickname: idx.soprannome !== -1 ? (cols[idx.soprannome] || '').trim() : ''
                         };
                         if (player.number || player.name || player.surname || player.role || player.nickname) {
                             importedPlayers.push(player);
                         }
                     }
                     if (importedPlayers.length === 0) {
                         alert('Nessun giocatore importato. Verifica che la colonna "Squadra" coincida con il nome della squadra selezionata o che il file contenga i campi richiesti.');
                         return;
                     }
                     // Popola la tabella del dialog e lascia all'utente il salvataggio
                     rosterTableBody.innerHTML = '';
                     importedPlayers.forEach(p => addRosterRow(p));
                     alert(`Import completato: ${importedPlayers.length} giocatori caricati. Premi "Salva" per confermare.`);
                 } catch (err) {
                     console.error(err);
                     alert('Errore nell\'importazione CSV: ' + err.message);
                 }
             };
             reader.onerror = () => alert('Impossibile leggere il file CSV selezionato.');
             reader.readAsText(file);
         }
 
         // Split CSV line rispettando le virgolette
         function splitCSVLine(line) {
             const result = [];
             let current = '';
             let inQuotes = false;
             for (let i = 0; i < line.length; i++) {
                 const ch = line[i];
                 if (ch === '"') {
                     if (inQuotes && i + 1 < line.length && line[i + 1] === '"') {
                         // doppia virgoletta -> escape
                         current += '"';
                         i++;
                     } else {
                         inQuotes = !inQuotes;
                     }
                 } else if (ch === ',' && !inQuotes) {
                     result.push(current);
                     current = '';
                 } else {
                     current += ch;
                 }
             }
             result.push(current);
             return result;
         }
     </script>
