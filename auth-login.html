<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>My Volley Scout - Accesso</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="icon" type="image/png" href="LOGO_APP.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="180x180" href="LOGO_APP.png">
    <link rel="stylesheet" href="/animations.css?v=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            color: #1a1a1a;
            padding-top: 12px;
        }

        .auth-container {
            width: 100%;
            max-width: 520px;
            padding: 12px 30px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #f0f0f0;
        }

        .logo {
            text-align: center;
            margin-bottom: 4px;
        }

        
        .logo-icon {
            width: 100%;
            max-width: 576px;
            height: 180px;
            overflow: hidden;
            display: block;
            margin: 0 auto 0;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 50% 40%;
            display: block;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .logo-subtitle {
            font-size: 14px;
            color: #6b7280;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
            background: #ffffff;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            margin-bottom: 16px;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .btn-google {
            background: #ffffff;
            color: #374151;
            border: 1px solid #d1d5db;
            margin-bottom: 24px;
        }

        .btn-google:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .divider-text {
            display: block;
            text-align: center;
            margin: 16px 0;
            color: #6b7280;
            font-size: 14px;
        }

        .auth-switch {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .auth-switch a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid #fecaca;
            display: none;
        }

        .success-message {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid #bbf7d0;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #e5e7eb;
            border-top: 2px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .auth-container {
                margin: 8px;
                padding: 16px 20px;
            }
        }

        .app-version {
            margin-top: 16px;
            text-align: center;
            font-size: 0.85rem;
            color: #6b7280;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <script>
      try { if (location.hash) { history.replaceState(null, '', location.pathname); } } catch(_){}
    </script>
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">
                <img src="/LOGO_APP.png" alt="Logo My Volley Scout">
            </div>
            <div class="logo-text">My Volley Scout</div>
            <div class="logo-subtitle">Accedi al tuo account</div>
            <div class="app-version">MyVolleyScout Vers. 17.3.2</div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Accesso in corso...</p>
            <div class="app-version">MyVolleyScout Vers. 17.3.2</div>
        </div>

        <div id="inviteNotice" class="success-message" style="display:none;"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" id="loginBtn">
                Accedi
            </button>
        </form>

        <span class="divider-text">oppure</span>

        <button class="btn btn-google" id="googleLoginBtn">
            <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continua con Google
        </button>

        <div class="auth-switch">
            Non hai un account? <a id="registerLink" href="/auth-register.html">Registrati</a>
        </div>
        <div class="app-version">MyVolleyScout Vers. 17.3.2</div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="/connection-manager.js"></script>
    <script src="/firebase-config.js"></script>
    <script src="/firestore-service.js"></script>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');
        const loginBtn = document.getElementById('loginBtn');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const inviteNotice = document.getElementById('inviteNotice');
        const registerLink = document.getElementById('registerLink');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        function showLoading() {
            loading.style.display = 'block';
            loginBtn.disabled = true;
        }

        function hideLoading() {
            loading.style.display = 'none';
            loginBtn.disabled = false;
        }

        function getErrorMessage(errorCode) {
            const messages = {
                'auth/user-not-found': 'Utente non trovato',
                'auth/wrong-password': 'Password non corretta',
                'auth/invalid-email': 'Email non valida',
                'auth/user-disabled': 'Account disabilitato',
                'auth/too-many-requests': 'Troppi tentativi, riprova più tardi',
                'auth/popup-closed-by-user': 'Popup chiuso dall\'utente',
                'auth/cancelled-popup-request': 'Richiesta popup annullata',
                'auth/network-request-failed': 'Errore di connessione',
                'auth/unauthorized-domain': 'Dominio non autorizzato per Google Auth',
                'auth/operation-not-allowed': 'Operazione non consentita',
                'auth/invalid-api-key': 'Chiave API non valida',
                'auth/app-not-authorized': 'App non autorizzata'
            };
            return messages[errorCode] || `Errore durante l\'autenticazione (${errorCode})`;
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (!window.__authListenersAttached) {
                window.__authListenersAttached = true;
                if (loginForm) {
                    loginForm.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        hideMessages();
                        showLoading();
                        const email = document.getElementById('email').value.trim();
                        const password = document.getElementById('password').value;
                        if (typeof window.authFunctions === 'undefined') {
                            showError('Firebase non disponibile');
                            hideLoading();
                            return;
                        }
                    });
                }
                if (googleLoginBtn) {
                    googleLoginBtn.addEventListener('click', async () => {
                        hideMessages();
                        showLoading();
                        if (typeof window.authFunctions === 'undefined') {
                            showError(getErrorMessage('auth/unauthorized-domain'));
                            hideLoading();
                            return;
                        }
                    });
                }
            }
            try {
                if ('serviceWorker' in navigator && (location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
                    navigator.serviceWorker.getRegistrations().then((regs)=>{ regs.forEach(r=> r.unregister()); });
                    if ('caches' in window) { caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))); }
                }
            } catch(_){}
            updateInviteUi();
            setTimeout(() => { if (typeof window.authFunctions === 'undefined') { showError('Firebase non disponibile'); } }, 2500);
            initializeAuth();
        });

        function getInviteToken() {
            try {
                const qp = new URLSearchParams(window.location.search || '');
                const t = String(qp.get('invite') || '').trim();
                if (t) {
                    try { sessionStorage.setItem('__pendingInvite', t); } catch(_) {}
                    return t;
                }
            } catch(_) {}
            try { return String(sessionStorage.getItem('__pendingInvite') || '').trim(); } catch(_) { return ''; }
        }

        function getInviteOwner() {
            try {
                const qp = new URLSearchParams(window.location.search || '');
                const o = String(qp.get('owner') || '').trim();
                if (o) {
                    try { sessionStorage.setItem('__pendingInviteOwner', o); } catch(_) {}
                    return o;
                }
            } catch(_) {}
            try { return String(sessionStorage.getItem('__pendingInviteOwner') || '').trim(); } catch(_) { return ''; }
        }

        function updateInviteUi() {
            const token = getInviteToken();
            const owner = getInviteOwner();
            if (inviteNotice) {
                inviteNotice.textContent = token
                    ? 'Invito rilevato: accedi o registrati per attivare la squadra condivisa.'
                    : '';
                inviteNotice.style.display = token ? 'block' : 'none';
            }
            if (registerLink && token) {
                const qs = `?invite=${encodeURIComponent(token)}${owner ? `&owner=${encodeURIComponent(owner)}` : ''}`;
                registerLink.href = `/auth-register.html${qs}`;
            }
        }

        function redirectToMyTeams() {
            const token = getInviteToken();
            const owner = getInviteOwner();
            const qs = token ? `?invite=${encodeURIComponent(token)}${owner ? `&owner=${encodeURIComponent(owner)}` : ''}` : '';
            window.location.href = `/my-teams.html${qs}`;
        }

        function initializeAuth() {
            if (typeof window.authFunctions === 'undefined') {
                setTimeout(initializeAuth, 200);
                return;
            }

            window.authFunctions.onAuthStateChanged((user) => {
                if (user) {
                    redirectToMyTeams();
                }
            });

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideMessages();
                showLoading();

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    showError('Inserisci email e password');
                    hideLoading();
                    return;
                }

                try {
                    const result = await window.authFunctions.signIn(email, password);
                    if (result && result.success) {
                        showSuccess('Accesso effettuato con successo!');
                        await createUserCollection(result.user.email);
                        setTimeout(() => {
                            redirectToMyTeams();
                        }, 1500);
                    } else {
                        let errorCode = result?.code || null;
                        if (!errorCode && typeof result?.error === 'string') {
                            const m = result.error.match(/\(auth\/([^)]+)\)/);
                            if (m) errorCode = `auth/${m[1]}`;
                        }
                        showError(getErrorMessage(errorCode || 'unknown'));
                    }
                } catch (error) {
                    showError('Errore di connessione. Riprova.');
                } finally {
                    hideLoading();
                }
            });

            googleLoginBtn.addEventListener('click', async () => {
                hideMessages();
                showLoading();

                try {
                    const result = await window.authFunctions.signInWithGoogle();
                    if (result && result.success) {
                        showSuccess('Accesso con Google effettuato!');
                        await createUserCollection(result.user.email);
                        setTimeout(() => {
                            redirectToMyTeams();
                        }, 1500);
                    } else {
                        const errorCode = result?.code || 'unknown';
                        console.error('Errore Google Auth:', errorCode, result?.error);
                        showError(getErrorMessage(errorCode));
                    }
                } catch (error) {
                    showError('Errore di connessione. Riprova.');
                } finally {
                    hideLoading();
                }
            });
        }

        async function createUserCollection(email) {
            if (typeof window.firestoreService === 'undefined') {
                console.warn('Firestore service non disponibile');
                return;
            }

            try {
                await window.firestoreService.createUserCollection(email);
                console.log('Collection utente creata:', email);
            } catch (error) {
                console.error('Errore nella creazione della collection utente:', error);
            }
        }
    </script>
</body>
</html>
