    <style>
      body { background-color: #ffffff !important; }
      .main { padding: 2px !important; overflow-y: auto !important; }
      .section { padding: 2px !important; margin: 0 !important; border: 0 !important; background: transparent !important; box-shadow: none !important; }
      .panel { padding: 2px !important; border: 0 !important; border-radius: 0 !important; }
      .section-header { margin: 4px 0 !important; }
      .panel-title { margin-bottom: 4px !important; }
      .report-row, .panel, .placeholder-area { min-width: 0 !important; }
      .placeholder-area { padding: 2px !important; border: 0 !important; background: transparent !important; overflow-x: visible !important; overflow-y: visible !important; width: 100% !important; max-width: 100% !important; -webkit-overflow-scrolling: touch; touch-action: pan-x pan-y; overscroll-behavior: contain; }
      #matchStatsSummary { display: flex; flex-direction: row; gap: 16px; align-items: center; flex-wrap: wrap; }
      #matchStatsSummary .form-group { display: flex; flex-direction: row; align-items: center; gap: 6px; }
      #matchStatsSummary label { margin: 0; white-space: nowrap; }
      #matchStatsSummary label::after { content: ':'; }
      #matchStatsSummary .readonly-field { padding: 0; border: 0; background: transparent; }
      .fund-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
      .fund-tab { border: 1px solid #cbd5f5; background: #ffffff; color: #1d4ed8; padding: 6px 10px; border-radius: 999px; font-weight: 600; font-size: 12px; cursor: pointer; }
      .fund-tab.active { background: #1d4ed8; color: #ffffff; border-color: #1d4ed8; }
      .set-filter { position: sticky; top: var(--sticky-filter-top, 56px); z-index: 5; background: #ffffff; padding: 4px 0; box-shadow: 0 2px 0 rgba(0,0,0,0.06); }
      .set-filter .filter-btn { margin-right: 6px; }
      .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; }
      .simple-table { border-collapse: separate; border-spacing: 0; width: 100%; table-layout: fixed; }
      .simple-table th, .simple-table td { white-space: nowrap; padding: 2px 2px; font-size: 11px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; }
      .simple-table th:first-child,
      .simple-table td:first-child { position: sticky; left: 0; z-index: 4; background: #fff; box-shadow: 1px 0 0 rgba(0,0,0,0.08); width: 24px; min-width: 24px; max-width: 24px; text-align: center; padding: 2px 1px; }
      .simple-table th:nth-child(2),
      .simple-table td:nth-child(2) { position: sticky; left: var(--sticky-left-2, 24px); z-index: 3; background: #fff; box-shadow: 1px 0 0 rgba(0,0,0,0.08); width: 16px; min-width: 16px; max-width: 16px; text-align: center; padding: 2px 1px; }
      .simple-table th:nth-child(3),
      .simple-table td:nth-child(3) { position: sticky; left: var(--sticky-left-3, 40px); z-index: 2; background: #fff; box-shadow: 2px 0 0 rgba(0,0,0,0.1); min-width: 48px; text-align: left; padding: 2px 3px; }
      .simple-table th:nth-child(n+4),
      .simple-table td:nth-child(n+4) { text-align: center; padding: 2px 1px; }
      .simple-table tr.total-row td { text-align: center; }
      .simple-table tr.total-row td[colspan="3"] { text-align: left; }
    </style>
      <script src="/pwa-install.js" defer></script>

  <script>
    window.goBackToMatches = function(){
      try {
        const stored = (() => { try { return localStorage.getItem('mvsSelectedArchive'); } catch(_) { return null; } })();
        const qp = new URLSearchParams();
        if (stored === 'cloud' || stored === 'shared') qp.set('archive', stored);
        const qs = qp.toString();
        location.href = '/matches.html' + (qs ? ('?' + qs) : '');
      } catch(_) {
        location.href = '/matches.html';
      }
    };
    document.addEventListener('DOMContentLoaded', function(){
      function resolveCurrentUserEmail(){
        try {
          const email = String(window.authFunctions?.getCurrentUser?.()?.email || '').trim();
          if (email) return email;
        } catch(_) {}
        try {
          const email = String(window.authModule?.getCurrentUser?.()?.email || '').trim();
          if (email) return email;
        } catch(_) {}
        try {
          const email = String(window.auth?.currentUser?.email || '').trim();
          if (email) return email;
        } catch(_) {}
        return '';
      }
      function resolveObserverStatus(){
        try {
          const role = String(localStorage.getItem('selectedTeamRole') || '').trim();
          const owner = String(localStorage.getItem('selectedTeamOwner') || '').trim();
          const meta = (() => { try { const raw = localStorage.getItem('selectedSharedTeamMeta'); return raw ? JSON.parse(raw) : null; } catch(_) { return null; } })();
          const metaRole = String(meta?.role || '').trim();
          const sharedOwner = String(meta?.owner || '').trim();
          const ownerResolved = String(owner || sharedOwner || '').trim();
          const userEmail = resolveCurrentUserEmail();
          const archive = (() => { try { return String(localStorage.getItem('mvsSelectedArchive') || '').trim(); } catch(_) { return ''; } })();
          if (archive === 'shared') return true;
          return (role === 'observer') || (metaRole === 'observer') || (!!ownerResolved && (!userEmail || ownerResolved !== userEmail));
        } catch(_) { return false; }
      }
      function applyObserverUI(){
        try {
          if (!resolveObserverStatus()) return;
          try { window.__mvsDisableAutosave = true; } catch(_) {}
          try { if (window.cancelAutosave) window.cancelAutosave(); } catch(_) {}
          const sidebar = document.querySelector('.set-sidebar');
          if (sidebar) {
            const items = sidebar.querySelectorAll('.set-item');
            items.forEach(btn => {
              const text = (btn.textContent || '').trim();
              if (text.includes('Match-Stats')) return;
              btn.style.display = 'none';
            });
          }
          const exportBtn = document.getElementById('exportSetsBtnMobile');
          if (exportBtn) exportBtn.style.display = 'none';
          const saveBtn = document.getElementById('save-match-btn');
          if (saveBtn) saveBtn.style.display = 'none';
        } catch(_) {}
      }
      (async function(){
        try { applyObserverUI(); } catch(_) {}

        try {
          try {
            const qs = new URLSearchParams(location.search || '');
            const team = qs.get('team');
            const match = qs.get('match');
            if (team) localStorage.setItem('selectedTeamId', String(team));
            if (match) localStorage.setItem('selectedMatchId', String(match));
          } catch(_) {}

          try {
            const s = sessionStorage.getItem('currentScoutingSession');
            if (s) { localStorage.setItem('currentScoutingSession', s); }
          } catch(_) {}

          const selectedMatchId = (() => { try { return String(localStorage.getItem('selectedMatchId') || '').trim(); } catch(_) { return ''; } })();
          let sessionData = {};
          try { sessionData = JSON.parse(localStorage.getItem('currentScoutingSession')||'{}') || {}; } catch(_) { sessionData = {}; }

          const sessionId = String(sessionData?.id || sessionData?.matchId || '').trim();
          const needsMatch = !!(selectedMatchId && sessionId && selectedMatchId !== sessionId);

          let payload = (sessionData && Object.keys(sessionData).length > 0 && !needsMatch) ? sessionData : null;

          if (!payload && selectedMatchId) {
            try {
              const localMatches = [];
              const found = Array.isArray(localMatches) ? localMatches.find(m => String(m?.id || '') === selectedMatchId) : null;
              if (found) {
                payload = Object.assign({}, found, { id: selectedMatchId });
              }
            } catch(_) {}
          }

          if (!payload && selectedMatchId) {
            payload = { id: selectedMatchId, teamId: (() => { try { return localStorage.getItem('selectedTeamId') || null; } catch(_) { return null; } })() };
          }

          if (payload && typeof window.loadScoutingSession === 'function') {
            try { localStorage.setItem('currentScoutingSession', JSON.stringify(payload)); } catch(_) {}
            try { sessionStorage.setItem('currentScoutingSession', JSON.stringify(payload)); } catch(_) {}
            try { window.loadScoutingSession(payload); } catch(_) {}
          }
        } catch(_) {}
        try { switchPage('match-stats'); } catch (_) {}
        const safeRender = () => {
          try { if (typeof window.renderMatchStats === 'function') window.renderMatchStats(); } catch(_) {}
          setTimeout(() => { try { computeStickyOffsets(); setStickyFilterTop(); } catch(_) {} }, 0);
        };
        safeRender();
        setTimeout(safeRender, 350);
        setTimeout(safeRender, 1200);
      })();
      try {
        const toggle = document.getElementById('headerMenuToggle');
        const menu = document.getElementById('headerMenu');
        const emailEl = document.getElementById('accountEmail');
        function updateAccountEmail(){
          try {
            const email = resolveCurrentUserEmail();
            if (emailEl) emailEl.textContent = email || 'Caricamento...';
          } catch(_) {}
        }
        function closeMenu(){ if (menu){ menu.hidden = true; } if (toggle){ toggle.setAttribute('aria-expanded','false'); } }
        function openMenu(){ if (menu){ menu.hidden = false; } if (toggle){ toggle.setAttribute('aria-expanded','true'); } updateAccountEmail(); }
        if (toggle && menu){
          toggle.addEventListener('click', (e)=>{ e.preventDefault(); const expanded = toggle.getAttribute('aria-expanded') === 'true'; if (expanded) closeMenu(); else openMenu(); });
          document.addEventListener('click', (e)=>{ if (!menu.hidden && !menu.contains(e.target) && !toggle.contains(e.target)){ closeMenu(); } });
          document.addEventListener('keydown', (e)=>{ if (e.key==='Escape'){ closeMenu(); } });
        }
        updateAccountEmail();
        setTimeout(updateAccountEmail, 600);
        setTimeout(updateAccountEmail, 1500);
        try {
          if (window.authFunctions?.onAuthStateChanged) {
            window.authFunctions.onAuthStateChanged((user) => {
              if (emailEl) emailEl.textContent = user?.email || 'Non autenticato';
              applyObserverUI();
            });
          }
        } catch(_) {}
        const toMatches = document.getElementById('goToMatchesBtnMobile');
        const toTeams = document.getElementById('goToTeamsBtnMobile');
        const exitBtn = document.getElementById('exitToWelcomeBtnMobile');
        const logoutBtn = document.getElementById('signOutBtnMobile');
        if (toMatches){ toMatches.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); closeMenu(); location.href='/matches.html'; }); }
        if (toTeams){ toTeams.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); closeMenu(); location.href='/my-teams.html'; }); }
        if (exitBtn){ exitBtn.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); closeMenu(); location.href='/my-teams.html'; }); }
        if (logoutBtn){ logoutBtn.addEventListener('click', async (e)=>{ e.preventDefault(); e.stopPropagation(); try { if (window.authFunctions && typeof window.authFunctions.signOut==='function'){ await window.authFunctions.signOut(); } localStorage.removeItem('selectedTeamId'); } finally { closeMenu(); try{ if(location.hash){ history.replaceState(null,'',location.pathname); } }catch(_){ } location.href='/auth-login.html'; } }); }
      } catch(_) {}
      function computeStickyOffsets(){
        try {
          document.querySelectorAll('#match-stats .simple-table').forEach(tbl => {
            const c1 = tbl.querySelector('tbody tr td:first-child') || tbl.querySelector('thead tr th:first-child');
            const c2 = tbl.querySelector('tbody tr td:nth-child(2)') || tbl.querySelector('thead tr th:nth-child(2)');
            if (!c1 || !c2) return;
            const w1 = Math.round(c1.getBoundingClientRect().width);
            const w2 = Math.round(c2.getBoundingClientRect().width);
            tbl.style.setProperty('--sticky-left-2', (w1 || 48) + 'px');
            tbl.style.setProperty('--sticky-left-3', ((w1 || 48) + (w2 || 48)) + 'px');
          });
        } catch(_) {}
      }
      function setStickyFilterTop(){
        try {
          const header = document.querySelector('.topappbar');
          const h = header ? Math.round(header.getBoundingClientRect().height) : 56;
          document.documentElement.style.setProperty('--sticky-filter-top', (h + 4) + 'px');
        } catch(_) {}
      }
      computeStickyOffsets();
      setStickyFilterTop();
      window.addEventListener('resize', computeStickyOffsets);
      window.addEventListener('resize', setStickyFilterTop);
      try {
        const list = document.getElementById('setToolbar');
        if (list) {
          list.addEventListener('click', (ev) => {
            const btn = ev.target.closest('.set-item, .set-pill');
            if (!btn) return;
            const setNum = parseInt(btn.dataset.set, 10);
            if (Number.isInteger(setNum) && setNum >= 1 && setNum <= 6) {
              try { localStorage.setItem('allowScoutingEntry','1'); } catch(_){}
              location.href = `scouting.html#/set/${setNum}`;
            }
          });
        }
      } catch(_) {}
      try {
        const tabs = document.getElementById('matchStatsTabs');
        if (tabs) {
          tabs.addEventListener('click', (ev) => {
            const btn = ev.target.closest('.fund-tab');
            if (!btn) return;
            const fund = btn.getAttribute('data-fund');
            if (!fund) return;
            if (!window.appState) window.appState = {};
            window.appState.matchStatsActiveFund = fund;
            try { localStorage.setItem('matchStatsActiveFund', String(fund)); } catch(_){}
            if (typeof window.renderMatchStats === 'function') window.renderMatchStats();
          });
        }
      } catch(_) {}
      try {
        const setList = document.getElementById('setToolbar');
        if (setList) {
          setList.querySelectorAll('.set-item').forEach(btn => {
            if (btn.dataset.set) { btn.classList.remove('active'); btn.removeAttribute('aria-current'); }
          });
        }
        const msBtn = document.getElementById('sidebar-match-stats-btn');
        if (msBtn) {
          msBtn.classList.add('active');
          msBtn.setAttribute('aria-current','true');
        }
        try { if (window.updateSetSidebarColors) window.updateSetSidebarColors(); } catch(_) {}
      } catch(_) {}
    });
  </script>
  </body>
</html>
