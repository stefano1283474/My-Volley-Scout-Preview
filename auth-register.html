<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Volley Scout - Registrazione</title>
    <link rel="stylesheet" href="animations.css?v=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #f0f0f0;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: #16a34a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: white;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .logo-subtitle {
            font-size: 14px;
            color: #6b7280;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
            background: #ffffff;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #16a34a;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
        }

        .password-requirements {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: #16a34a;
            color: white;
            margin-bottom: 16px;
        }

        .btn-primary:hover {
            background: #15803d;
        }

        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .btn-google {
            background: #ffffff;
            color: #374151;
            border: 1px solid #d1d5db;
            margin-bottom: 24px;
        }

        .btn-google:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 24px 0;
            color: #6b7280;
            font-size: 14px;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            background: #ffffff;
            padding: 0 16px;
        }

        .auth-switch {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .auth-switch a {
            color: #16a34a;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid #fecaca;
            display: none;
        }

        .success-message {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid #bbf7d0;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #e5e7eb;
            border-top: 2px solid #16a34a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .password-match {
            color: #16a34a;
            font-size: 12px;
            margin-top: 4px;
        }

        .password-mismatch {
            color: #dc2626;
            font-size: 12px;
            margin-top: 4px;
        }

        @media (max-width: 480px) {
            .auth-container {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">🏐</div>
            <div class="logo-text">My Volley Scout</div>
            <div class="logo-subtitle">Crea il tuo account</div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Registrazione in corso...</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6">
                <div class="password-requirements">Minimo 6 caratteri</div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Conferma Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
                <div id="passwordMatch" class="password-match" style="display: none;">✓ Le password corrispondono</div>
                <div id="passwordMismatch" class="password-mismatch" style="display: none;">✗ Le password non corrispondono</div>
            </div>
            
            <button type="submit" class="btn btn-primary" id="registerBtn">
                Registrati
            </button>
        </form>

        <div class="divider">
            <span>oppure</span>
        </div>

        <button class="btn btn-google" id="googleRegisterBtn">
            <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Registrati con Google
        </button>

        <div class="auth-switch">
            Hai già un account? <a href="auth-login.html">Accedi</a>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="./connection-manager.js"></script>
    <script src="./firebase-config.js"></script>
    <script src="./firestore-service.js"></script>

    <script>
        // Elementi DOM
        const registerForm = document.getElementById('registerForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');
        const registerBtn = document.getElementById('registerBtn');
        const googleRegisterBtn = document.getElementById('googleRegisterBtn');
        const passwordField = document.getElementById('password');
        const confirmPasswordField = document.getElementById('confirmPassword');
        const passwordMatch = document.getElementById('passwordMatch');
        const passwordMismatch = document.getElementById('passwordMismatch');

        // Funzioni di utilità
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        function showLoading() {
            loading.style.display = 'block';
            registerBtn.disabled = true;
        }

        function hideLoading() {
            loading.style.display = 'none';
            registerBtn.disabled = false;
        }

        // Validazione password in tempo reale
        function checkPasswordMatch() {
            const password = passwordField.value;
            const confirmPassword = confirmPasswordField.value;
            
            if (confirmPassword === '') {
                passwordMatch.style.display = 'none';
                passwordMismatch.style.display = 'none';
                return;
            }
            
            if (password === confirmPassword) {
                passwordMatch.style.display = 'block';
                passwordMismatch.style.display = 'none';
            } else {
                passwordMatch.style.display = 'none';
                passwordMismatch.style.display = 'block';
            }
        }

        // Messaggi di errore localizzati
        function getErrorMessage(errorCode) {
            const messages = {
                'auth/email-already-in-use': 'Email già registrata',
                'auth/invalid-email': 'Email non valida',
                'auth/operation-not-allowed': 'Operazione non consentita',
                'auth/weak-password': 'Password troppo debole (minimo 6 caratteri)',
                'auth/popup-closed-by-user': 'Popup chiuso dall\'utente',
                'auth/cancelled-popup-request': 'Richiesta popup annullata',
                'auth/network-request-failed': 'Errore di connessione',
                'auth/unauthorized-domain': 'Dominio non autorizzato per Google Auth',
                'auth/invalid-api-key': 'Chiave API non valida',
                'auth/app-not-authorized': 'App non autorizzata'
            };
            return messages[errorCode] || `Errore durante la registrazione (${errorCode})`;
        }

        // Inizializzazione
        document.addEventListener('DOMContentLoaded', function() {
            initializeAuth();
            setupPasswordValidation();
        });

        function setupPasswordValidation() {
            passwordField.addEventListener('input', checkPasswordMatch);
            confirmPasswordField.addEventListener('input', checkPasswordMatch);
        }

        function initializeAuth() {
            if (typeof window.authFunctions === 'undefined') {
                setTimeout(initializeAuth, 200);
                return;
            }

            // Controlla se l'utente è già autenticato
            window.authFunctions.onAuthStateChanged((user) => {
                if (user) {
                    window.location.href = 'welcome.html';
                }
            });

            // Registrazione con email/password
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideMessages();

                const email = document.getElementById('email').value.trim();
                const password = passwordField.value;
                const confirmPassword = confirmPasswordField.value;

                // Validazioni
                if (!email || !password || !confirmPassword) {
                    showError('Compila tutti i campi');
                    return;
                }

                if (password.length < 6) {
                    showError('La password deve essere di almeno 6 caratteri');
                    return;
                }

                if (password !== confirmPassword) {
                    showError('Le password non corrispondono');
                    return;
                }

                showLoading();

                try {
                    const result = await window.authFunctions.signUp(email, password);
                    if (result && result.success) {
                        showSuccess('Account creato con successo!');
                        await createUserCollection(result.user.email);
                        setTimeout(() => {
                            window.location.href = 'welcome.html';
                        }, 1500);
                    } else {
                        const msg = result?.error || 'Errore durante la registrazione';
                        showError(getErrorMessage(msg));
                    }
                } catch (error) {
                    showError('Errore di connessione. Riprova.');
                } finally {
                    hideLoading();
                }
            });

            // Registrazione con Google
            googleRegisterBtn.addEventListener('click', async () => {
                hideMessages();
                showLoading();

                try {
                    const result = await window.authFunctions.signInWithGoogle();
                    if (result && result.success) {
                        showSuccess('Registrazione con Google completata!');
                        await createUserCollection(result.user.email);
                        setTimeout(() => {
                            window.location.href = 'welcome.html';
                        }, 1500);
                    } else {
                        const errorCode = result?.code || 'unknown';
                        console.error('Errore Google Auth:', errorCode, result?.error);
                        showError(getErrorMessage(errorCode));
                    }
                } catch (error) {
                    showError('Errore di connessione. Riprova.');
                } finally {
                    hideLoading();
                }
            });
        }

        // Funzione per creare la collection dell'utente
        async function createUserCollection(email) {
            if (typeof window.firestoreService === 'undefined') {
                console.warn('Firestore service non disponibile');
                return;
            }

            try {
                await window.firestoreService.createUserCollection(email);
                console.log('Collection utente creata:', email);
            } catch (error) {
                console.error('Errore nella creazione della collection utente:', error);
            }
        }
    </script>
</body>
</html>
