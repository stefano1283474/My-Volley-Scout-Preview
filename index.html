<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>My Volley Scout PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css?v=2">
    <meta name="theme-color" content="#2563eb">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192x192.png">
    <script>
        // Registra il Service Worker per PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => console.log('Service Worker registrato:', registration))
                    .catch(error => console.log('Registrazione Service Worker fallita:', error));
            });
        }

        // Gestione Service Worker: su localhost disattiva e pulisci cache; in produzione registra
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    if (location.hostname === 'localhost') {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        await Promise.all(regs.map(r => r.unregister()));
                        if (window.caches && caches.keys) {
                            const keys = await caches.keys();
                            await Promise.all(keys.map(k => caches.delete(k)));
                        }
                        console.log('SW e cache puliti su localhost');
                    } else {
                        const registration = await navigator.serviceWorker.register('/sw.js');
                        console.log('Service Worker registrato:', registration);
                    }
                } catch (error) {
                    console.log('Gestione Service Worker fallita:', error);
                }
            });
        }

        // Fallback: alla DOMContentLoaded mostra l'app e nasconde il loading a prescindere
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const dbg = document.getElementById('debug-banner');
                if (dbg) dbg.remove();
                const appRoot = document.getElementById('app');
                if (appRoot) appRoot.style.display = 'block';
                const loading = document.getElementById('loading-screen');
                if (loading) loading.style.display = 'none';
            } catch(_) {}
        });

        // Auto-ripristino: se dopo ~2s il banner debug è ancora presente, svuota SW/cache e ricarica (1 sola volta)
        window.addEventListener('load', () => {
            setTimeout(async () => {
                try {
                    const dbg = document.getElementById('debug-banner');
                    if (dbg && !sessionStorage.getItem('swRefreshedOnce')) {
                        sessionStorage.setItem('swRefreshedOnce', '1');
                        if ('serviceWorker' in navigator) {
                            const regs = await navigator.serviceWorker.getRegistrations();
                            await Promise.all(regs.map(r => r.unregister()));
                        }
                        if (window.caches && caches.keys) {
                            const keys = await caches.keys();
                            await Promise.all(keys.map(k => caches.delete(k)));
                        }
                        location.reload();
                    }
                } catch (e) { console.warn('Auto-ripristino SW/cache non riuscito:', e); }
            }, 2000);
        });
    </script>
    <script src="./src/modules/teams/teams.js"></script>
</head>
<body>
    <div id="debug-banner" style="position:fixed;top:8px;right:8px;background:#fde68a;color:#92400e;padding:6px 10px;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.2);z-index:10000;font-size:12px;">DEBUG: JS non ancora inizializzato</div>
    <div id="loading-screen" style="position:fixed;inset:0;background:rgba(255,255,255,0.95);display:flex;align-items:center;justify-content:center;z-index:9999;">
      <div style="text-align:center;">
        <div style="font-weight:600;color:#2563eb;margin-bottom:6px;">My Volley Scout</div>
        <div style="color:#374151;">Caricamento…</div>
      </div>
    </div>
    <div id="app" style="display:none;">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>My Volley Scout</h1>
                
                <!-- User Info Section -->
                <div class="auth-section">
                    <div id="userInfo" class="user-info">
                        <span id="userEmail"></span>
                        <button id="backToWelcomeBtn" class="btn btn-outline desktop-only">Cambia Squadra</button>
                        <button id="signOutBtn" class="btn btn-outline desktop-only">Esci</button>
                        <button id="headerMenuToggle" class="btn btn-outline mobile-only" aria-expanded="false" aria-controls="headerMenu" title="Menu">
                          ⋮
                        </button>
                        <div id="headerMenu" class="header-menu" hidden>
                          <button id="backToWelcomeBtnMobile" class="menu-item">Cambia Squadra</button>
                          <button id="signOutBtnMobile" class="menu-item">Esci</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <div class="section" id="scouting-section">
                
                <!-- Sezione INIZIA SET rimossa -->

                    <div class="section-header">
                       <h3>Scouting Azioni</h3>
                       <button id="view-actions-btn" class="secondary-btn" onclick="openActionsDialog()">📋 Visualizza Azioni</button>
                     </div>
                
                <!-- Pulsante per aprire il dialog di scouting -->
                <!-- RIMOSSO: pulsante di apertura del dialog -->
                
                <div id="scouting-dialog" class="embedded">
                  <div class="scaffold">


                    <!-- Fondamentale previsto -->
<div class="phase-info">
  <strong><span id="current-fundamental">Servizio</span></strong>
</div>



                    <!-- Griglia giocatori -->
                    <div id="players-grid" class="players-grid"></div>

                    <!-- Sezione valutazione -->
                    <h4>Valutazione</h4>
                    <div class="evaluation-buttons">
                      <button class="eval-btn" data-eval="1" onclick="selectEvaluation(1)">1 - Errore</button>
                      <button class="eval-btn" data-eval="2" onclick="selectEvaluation(2)">2 - Negativo</button>
                      <button class="eval-btn" data-eval="3" onclick="selectEvaluation(3)">3 - Neutro</button>
                      <button class="eval-btn" data-eval="4" onclick="selectEvaluation(4)">4 - Positivo</button>
                      <button class="eval-btn" data-eval="5" onclick="selectEvaluation(5)">5 - Punto</button>
                      <button class="eval-btn" onclick="submitOpponentError()">Err Avv</button>
                    </div>

                    <!-- Fondamentale -->
                     <div class="next-fundamental-info">
                       <strong><span id="next-fundamental">Servizio (b)</span></strong>
                       <div id="selected-info" class="selected-info">
                         <span id="selected-player-text">-</span>
                         <span id="selected-evaluation-text">-</span>
                       </div>
                     </div>

                    <!-- Punteggio -->
                    <div class="score-display">
                      <h4>Storico Punteggio</h4>
                      <div class="score-current">
                        <span class="score-home">Casa: <span id="score-home">0</span></span>
                        <span class="score-separator">-</span>
                        <span class="score-away">Ospiti: <span id="score-away">0</span></span>
                        <span class="set-info">(Set <span id="current-set-display">1</span>)</span>
                      </div>
                      <div id="score-history" class="score-history">
                        <div class="score-history-item initial">
                          <span class="score-text">0 - 0</span>
                          <span class="score-description">Set 1 - Servizio P1 Vs P2</span>
                        </div>
                      </div>
                    </div>

                  </div>
                </div>
            </div>
        </main>

        <!-- Dialog per visualizzare le azioni scoutizzate -->
        <div id="actions-dialog" class="dialog">
            <div class="dialog-content">
                <div class="dialog-header">
                    <h3>Azioni Scoutizzate</h3>
                    <button class="close-btn" onclick="closeActionsDialog()" aria-label="Chiudi">×</button>
                </div>
                <div class="dialog-body">
                    <div class="actions-summary">
                        <p>Totale azioni: <span id="total-actions-count">0</span></p>
                    </div>
                    <div id="actions-list-dialog" class="actions-list-container">
                        <p class="no-actions-message">Nessuna azione scoutizzata ancora.</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="./firebase-config.js?v=4"></script>
    
    <script>
        // Funzioni per gestire il dialog delle azioni scoutizzate
        function openActionsDialog() {
            const dialog = document.getElementById('actions-dialog');
            if (dialog) {
                populateActionsDialog();
                dialog.style.display = 'flex';
            }
        }

        function closeActionsDialog() {
            const dialog = document.getElementById('actions-dialog');
            if (dialog) {
                dialog.style.display = 'none';
            }
        }

        function populateActionsDialog() {
            const totalCountElement = document.getElementById('total-actions-count');
            const actionsListContainer = document.getElementById('actions-list-dialog');
            
            if (!totalCountElement || !actionsListContainer) return;
            
            // Ottieni le azioni dal log globale
            const actions = window.appState ? window.appState.actionsLog : [];
            
            // Aggiorna il conteggio totale
            totalCountElement.textContent = actions.length;
            
            if (actions.length === 0) {
                actionsListContainer.innerHTML = '<p class="no-actions-message">Nessuna azione scoutizzata ancora.</p>';
                return;
            }
            
            // Crea la lista delle azioni
            const actionsHTML = actions.map((log, index) => {
                let resultText = '';
                let resultClass = '';
                
                switch (log.result?.result) {
                    case 'home_point':
                        resultText = '🏐 Punto Casa';
                        resultClass = 'home-point';
                        break;
                    case 'away_point':
                        resultText = '🏐 Punto Ospiti';
                        resultClass = 'away-point';
                        break;
                    default:
                        resultText = '↔️ In corso';
                        resultClass = 'in-progress';
                }
                
                const actionDisplay = log.action || '';
                const timestamp = log.timestamp || `Azione ${index + 1}`;
                const score = log.score || '';
                
                return `
                    <div class="action-item">
                        <div class="action-header">
                            <span class="action-number">#${index + 1}</span>
                            <span class="action-timestamp">${timestamp}</span>
                            ${score ? `<span class="action-score">${score}</span>` : ''}
                        </div>
                        <div class="action-quartet">${actionDisplay}</div>
                        <div class="action-result ${resultClass}">${resultText}</div>
                    </div>
                `;
            }).join('');
            
            actionsListContainer.innerHTML = actionsHTML;
        }

        // Funzione per aggiornare i valori del game status nel dialog
        function updateGameStatusInDialog() {
            // Non è più necessario copiare i valori poiché ora usiamo gli stessi elementi
        }

        // Chiudi il dialog cliccando fuori dal contenuto
        document.addEventListener('click', function(e) {
            const dialog = document.getElementById('actions-dialog');
            if (dialog && e.target === dialog) {
                closeActionsDialog();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            // Avvia subito il guard di autenticazione
            checkAuthAndSession();

            // Guard di autenticazione e controllo sessione
            function checkAuthAndSession() {
                if (typeof window.authFunctions === 'undefined') {
                    setTimeout(checkAuthAndSession, 200);
                    return;
                }

                window.authFunctions.onAuthStateChanged((user) => {
                    if (!user) {
                        // Utente non autenticato: redirect immediato al login
                        window.location.replace('auth-login.html');
                        return;
                    }
                    // Utente autenticato: verifica una sessione di scouting attiva
                    checkScoutingSession();
                });
            }

            function checkScoutingSession() {
                const currentSession = localStorage.getItem('currentScoutingSession');
                const selectedTeamId = localStorage.getItem('selectedTeamId');
                
                // Verifica prerequisiti: sessione di scouting E roster selezionato
                if (!currentSession || !selectedTeamId) {
                    let message = 'Per accedere alla pagina di scouting è necessario:';
                    if (!selectedTeamId) {
                        message += '\n• Selezionare un roster/squadra';
                    }
                    if (!currentSession) {
                        message += '\n• Avviare una sessione di scouting';
                    }
                    message += '\n\nVerrai reindirizzato alla selezione del roster.';
                    
                    alert(message);
                    localStorage.setItem('requireRosterSelection', '1');
                    window.location.replace('welcome.html');
                    return;
                }
                
                try {
                    const sessionData = JSON.parse(currentSession);
                    
                    // Verifica aggiuntiva: se la sessione non ha teamId o è diversa da selectedTeamId
                    if (!sessionData.teamId || sessionData.teamId !== selectedTeamId) {
                        alert('La sessione di scouting non corrisponde al roster selezionato.\nSeleziona nuovamente il roster e avvia una nuova sessione.');
                        localStorage.removeItem('currentScoutingSession');
                        localStorage.setItem('requireRosterSelection', '1');
                        window.location.replace('welcome.html');
                        return;
                    }
                    
                    if (window.loadScoutingSession) {
                        window.loadScoutingSession(sessionData);
                    } else {
                        console.error('Funzione loadScoutingSession non disponibile');
                    }
                } catch (error) {
                    console.error('Errore nel parsing della sessione:', error);
                    localStorage.removeItem('currentScoutingSession');
                    alert('Sessione di scouting corrotta. Seleziona nuovamente il roster e avvia una nuova sessione.');
                    localStorage.setItem('requireRosterSelection', '1');
                    window.location.replace('welcome.html');
                }
            }
        });
    </script>

    <!-- App script -->
    <script src="app.js?v=6" defer></script>
</body>
</html>
