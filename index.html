<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>My Volley Scout</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" type="image/png" href="LOGO_APP.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" sizes="180x180" href="LOGO_APP.png">
    <script src="/pwa-install.js" defer></script>
</head>
<body>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="/connection-manager.js"></script>
  <script src="/firebase-config.js"></script>
  <script>
    (function(){
      function go(){
        try{
          window.authFunctions.onAuthStateChanged(function(user){
            if (user) {
              location.replace('/my-teams.html');
            } else {
              location.replace('/auth-login.html');
            }
          });
        }catch(_){ setTimeout(go,200); }
      }
      go();
      setTimeout(function(){ if (!window.authFunctions) location.replace('/auth-login.html'); }, 2000);
    })();
  </script>
</body>
</html>
