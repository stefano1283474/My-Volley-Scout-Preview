    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const saveStatus = document.getElementById('save-status-pill');
        function setStatusPill(state, msg) {
          if (!saveStatus) return;
          saveStatus.style.display = 'inline-flex';
          saveStatus.dataset.state = state;
          saveStatus.textContent = msg || (state === 'saving' ? 'Salvataggio…' : state === 'saved' ? 'Salvato' : 'Errore');
          if (state === 'saved') {
            setTimeout(() => { saveStatus.style.display = 'none'; }, 2500);
          }
        }
        window.addEventListener('save:started', () => setStatusPill('saving', 'Salvataggio…'));
        window.addEventListener('save:completed', (e) => {
          const ok = !!e.detail?.ok;
          setStatusPill(ok ? 'saved' : 'error', ok ? 'Salvato' : 'Errore');
        });

        try {
          const ss = sessionStorage.getItem('currentScoutingSession');
          if (ss) {
            // Non sovrascrivere localStorage se ha già dati di scouting (rally/azioni)
            const lsRaw = localStorage.getItem('currentScoutingSession');
            const ls = lsRaw ? JSON.parse(lsRaw) : null;
            const lsHasData = ls && ls.actionsBySet && Object.keys(ls.actionsBySet).some(function(k) {
              return Array.isArray(ls.actionsBySet[k]) && ls.actionsBySet[k].length > 0;
            });
            if (!lsHasData) { localStorage.setItem('currentScoutingSession', ss); }
          }
        } catch(_) {}
      });
    </script>
    <script src="./src/modules/teams/teams.js"></script>

    <script>
      document.addEventListener('DOMContentLoaded', function(){
        try {
            const role = localStorage.getItem('selectedTeamRole');
            if (role === 'observer') {
                window.location.href = '/match-stats.html';
                return;
            }
        } catch(e) {}

        try {
          try {
            var ss = sessionStorage.getItem('currentScoutingSession');
            if (ss) {
              var lsRaw2 = localStorage.getItem('currentScoutingSession');
              var ls2 = lsRaw2 ? JSON.parse(lsRaw2) : null;
              var lsHasData2 = ls2 && ls2.actionsBySet && Object.keys(ls2.actionsBySet).some(function(k) {
                return Array.isArray(ls2.actionsBySet[k]) && ls2.actionsBySet[k].length > 0;
              });
              if (!lsHasData2) { localStorage.setItem('currentScoutingSession', ss); }
            }
          } catch(_) {}
          var s = JSON.parse(localStorage.getItem('currentScoutingSession')||'{}');
          if (s && Object.keys(s).length > 0 && typeof window.loadScoutingSession === 'function') {
            window.loadScoutingSession(s);
          }
        } catch(_) {}
        try { switchPage('scouting'); } catch(_) {}
        try {
          var toggle = document.getElementById('autoSavesToggleMobile');
          function readAppSettings() {
            try {
              var raw = localStorage.getItem('appSettings');
              var parsed = raw ? JSON.parse(raw) : {};
              return (parsed && typeof parsed === 'object') ? parsed : {};
            } catch(_) { return {}; }
          }
          function writeAppSettings(settings) {
            try { localStorage.setItem('appSettings', JSON.stringify(settings || {})); } catch(_) {}
          }
          if (toggle) {
            var settings = readAppSettings();
            toggle.checked = settings.autoSaveCleanupOnSetCompleted !== false;
            toggle.addEventListener('change', function(){
              var next = readAppSettings();
              next.autoSaveCleanupOnSetCompleted = !!toggle.checked;
              writeAppSettings(next);
            });
          }
        } catch(_) {}
      });
    </script>
    <script>

        if (window.authModule && typeof window.authModule.initializeAuth === 'function') {
          window.authModule.initializeAuth();
        }

    </script>
    <script>
      (function(){
        try {
          var toggleBtn = document.getElementById('headerMenuToggle');
          var menu = document.getElementById('headerMenu');
          if (toggleBtn && menu) {
            var open = false;
            function setOpen(v){ open = !!v; if (open){ menu.removeAttribute('hidden'); toggleBtn.setAttribute('aria-expanded','true'); menu.style.zIndex = '1001'; } else { menu.setAttribute('hidden',''); toggleBtn.setAttribute('aria-expanded','false'); } }
            toggleBtn.addEventListener('click', function(e){ e.stopPropagation(); setOpen(!open); });
            document.addEventListener('click', function(){ if (open) setOpen(false); });
          }
        } catch(_) {}
      })();
