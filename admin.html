<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Admin - My Volley Scout</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="icon" type="image/png" href="LOGO_APP.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="180x180" href="LOGO_APP.png">
    <link rel="stylesheet" href="animations.css?v=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ffffff; min-height: 100vh; color: #334155; }
        .container { max-width: 1080px; margin: 0 auto; padding: 24px; }
        .header { background: #ffffff; border-radius: 16px; border: 1px solid #e5e7eb; padding: 12px 16px; margin-bottom: 16px; display: flex; justify-content: center; align-items: center; position: relative; }
        .logo-icon { width: 100%; max-width: 620px; height: 156px; overflow: hidden; display: block; margin: 0 auto; }
        .logo-icon img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 42%; display: block; }
        .back-actions { position: absolute; top: 12px; left: 12px; display: flex; align-items: center; z-index: 2; }
        .account-actions { position: absolute; top: 12px; right: 12px; display: flex; align-items: center; z-index: 2; }
        .icon-button { background: #ffffff; color: #2563eb; border: 1px solid #e5e7eb; width: 36px; height: 36px; border-radius: 10px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .account-dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.08); min-width: 240px; overflow: hidden; }
        .account-dropdown .menu-item { width: 100%; padding: 12px 14px; text-align: left; background: transparent; border: none; cursor: pointer; color: #334155; font-size: 14px; }
        .hero-card { border: 1px solid #2563eb; border-radius: 16px; padding: 18px; margin-bottom: 16px; background: linear-gradient(180deg,#f8fbff 0%,#ffffff 100%); }
        .hero-title { font-size: 28px; font-weight: 800; color: #0f172a; text-align: center; }
        .hero-subtitle { font-size: 16px; color: #64748b; text-align: center; margin-top: 6px; }
        .admin-layout { display: grid; grid-template-columns: 240px 1fr; gap: 14px; align-items: start; position: relative; }
        .admin-sidebar-toggle { display: none; align-items: center; justify-content: center; gap: 8px; border: 1px solid #dbeafe; background: #eff6ff; color: #1e3a8a; border-radius: 10px; padding: 10px 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .admin-sidebar { border: 1px solid #e5e7eb; border-radius: 14px; background: #fff; padding: 10px; position: sticky; top: 18px; }
        .admin-sidebar-backdrop { display: none; }
        .sidebar-title { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: #64748b; font-weight: 700; margin: 4px 6px 8px 6px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; }
        .sidebar-link { width: 100%; text-align: left; border: 1px solid #dbeafe; background: #eff6ff; color: #1e3a8a; border-radius: 10px; padding: 10px 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
        .sidebar-link.is-active { background: #2563eb; border-color: #2563eb; color: #fff; }
        .admin-content { display: block; }
        .admin-view { display: none; }
        .admin-view.is-active { display: block; animation: fadeIn .18s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
        .card { border: 1px solid #e5e7eb; border-radius: 14px; background: #fff; padding: 14px; }
        .card.full { grid-column: span 12; }
        .card.half { grid-column: span 6; }
        .card-title { font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 12px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { color: #334155; font-weight: 600; font-size: 14px; }
        .input, select { width: 100%; border: 1px solid #d1d5db; border-radius: 10px; background: #fff; color: #0f172a; padding: 10px 12px; font-size: 15px; }
        .input:focus, select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
        .btn { border: 1px solid #2563eb; background: #2563eb; color: #fff; padding: 10px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .btn.btn-secondary { background: #fff; color: #2563eb; }
        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .result-message { margin-top: 8px; min-height: 20px; font-size: 14px; }
        .result-message.success { color: #15803d; }
        .result-message.error { color: #b91c1c; }
        .result-message.info { color: #1d4ed8; }
        .users-list { border: 1px solid #e5e7eb; border-radius: 12px; background: #fff; overflow: auto; max-height: 55vh; }
        .users-table { width: 100%; border-collapse: collapse; min-width: 760px; }
        .users-table th, .users-table td { border-bottom: 1px solid #edf2f7; padding: 10px; text-align: left; font-size: 14px; color: #334155; vertical-align: middle; }
        .users-table th { position: sticky; top: 0; background: #f8fafc; z-index: 2; color: #0f172a; font-weight: 700; }
        .users-table td select { padding: 6px 8px; font-size: 13px; border-radius: 8px; }
        .admin-error { border: 1px solid #fca5a5; border-radius: 14px; background: #fff1f2; color: #9f1239; padding: 14px; }
        .admin-error p { margin-bottom: 10px; font-weight: 600; }
        @media (max-width: 980px) {
            .admin-layout { grid-template-columns: 1fr; }
            .admin-sidebar-toggle { display: inline-flex; }
            .admin-sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: min(280px, 84vw);
                height: 100vh;
                border-radius: 0 14px 14px 0;
                border-left: none;
                z-index: 1200;
                transform: translateX(-105%);
                transition: transform .22s ease;
                overflow: auto;
            }
            .admin-sidebar.is-open { transform: translateX(0); }
            .admin-sidebar-backdrop {
                position: fixed;
                inset: 0;
                z-index: 1100;
                background: rgba(15, 23, 42, .42);
            }
            .admin-sidebar-backdrop.is-open { display: block; }
            .sidebar-nav { flex-direction: row; flex-wrap: wrap; }
            .sidebar-link { width: auto; }
        }
        @media (max-width: 640px) {
            .container { padding: 16px; }
            .logo-icon { height: 132px; }
            .hero-title { font-size: 24px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
    <script src="/pwa-install.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="back-actions">
                <button class="icon-button" id="backBtn" aria-label="Indietro">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <div class="logo-icon">
                <img src="./LOGO_APP.png" alt="Logo My Volley Scout">
            </div>
            <div class="account-actions">
                <button class="icon-button" id="accountBtn" aria-expanded="false" aria-controls="accountMenu" aria-label="Account">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"></circle><path d="M4 20c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
                </button>
                <div class="account-dropdown" id="accountMenu" hidden>
                    <div class="menu-item" id="accountEmail">Caricamento...</div>
                    <button class="menu-item" id="accountLogout" type="button">Logout</button>
                    <div class="menu-item app-version"></div>
                </div>
            </div>
        </div>

        <div id="adminContent" class="admin-layout" style="display:none;">
            <button type="button" id="adminSidebarToggle" class="admin-sidebar-toggle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                <span>Sezioni Admin</span>
            </button>
            <div id="adminSidebarBackdrop" class="admin-sidebar-backdrop"></div>
            <aside class="admin-sidebar">
                <div class="sidebar-title">Console Admin</div>
                <nav class="sidebar-nav" id="adminSidebarNav">
                    <button type="button" class="sidebar-link is-active" data-admin-view="users">Gestione utenti</button>
                    <button type="button" class="sidebar-link" data-admin-view="requests">Gestione richieste</button>
                    <button type="button" class="sidebar-link" data-admin-view="usage">Dati di utilizzo</button>
                </nav>
            </aside>
            <div class="admin-content">
                <section id="adminViewUsers" class="admin-view is-active">
                    <section class="card">
                        <div class="card-title">Gestione Accessi MVS</div>
                        <div class="form-grid">
                            <div class="form-group" style="grid-column: span 2;">
                                <label for="userEmail">Email utente</label>
                                <input class="input" type="email" id="userEmail" placeholder="utente@example.com" required>
                            </div>
                            <div class="form-group">
                                <label for="userRole">Ruolo</label>
                                <select id="userRole">
                                    <option value="user">Utente</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="userPackage">Pacchetto</label>
                                <select id="userPackage">
                                    <option value="Base">Base</option>
                                    <option value="Pro">Pro</option>
                                    <option value="ProMax">ProMax</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="userEnabled">Stato accesso</label>
                                <select id="userEnabled">
                                    <option value="true">Abilitato</option>
                                    <option value="false">Disabilitato</option>
                                </select>
                            </div>
                        </div>
                        <div class="btn-row">
                            <button type="button" id="setRoleBtn" class="btn">Salva Accesso</button>
                            <button type="button" id="checkRoleBtn" class="btn btn-secondary">Verifica Mio Profilo</button>
                        </div>
                        <div id="roleResult" class="result-message"></div>
                        <div id="currentRole" class="result-message"></div>
                    </section>
                    <section class="card" style="margin-top:12px;">
                        <div class="card-title">Utenti Registrati</div>
                        <div class="btn-row" style="margin-top:0;">
                            <button type="button" id="refreshUsersBtn" class="btn btn-secondary">Aggiorna Lista</button>
                        </div>
                        <div id="usersList" class="users-list" style="margin-top:10px;">
                            <p style="padding:12px;">Caricamento...</p>
                        </div>
                    </section>
                </section>

                <section id="adminViewRequests" class="admin-view">
                    <section class="card">
                        <div class="card-title">Gestione Richieste Upgrade</div>
                        <div class="btn-row" style="margin-top:0;">
                            <button type="button" id="refreshRequestsBtn" class="btn btn-secondary">Aggiorna Richieste</button>
                        </div>
                        <div id="upgradeRequestsList" class="users-list" style="margin-top:10px;">
                            <p style="padding:12px;">Caricamento...</p>
                        </div>
                    </section>
                </section>

                <section id="adminViewUsage" class="admin-view">
                    <section class="card">
                        <div class="card-title">Dati di Utilizzo</div>
                        <div class="btn-row" style="margin-top:0;">
                            <button type="button" id="refreshUsageBtn" class="btn btn-secondary">Aggiorna Dati</button>
                        </div>
                        <div id="usageDataList" class="users-list" style="margin-top:10px;">
                            <p style="padding:12px;">Caricamento...</p>
                        </div>
                    </section>
                </section>
            </div>
        </div>

        <div id="adminError" class="admin-error" style="display:none;">
            <p>Accesso negato. Solo gli admin possono accedere a questa pagina.</p>
            <button type="button" class="btn" id="backBtnDenied">Torna Indietro</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firestore-service.js"></script>
    <script src="auth.js"></script>
    <script src="connection-manager.js"></script>
    <script src="admin.js"></script>
    <script>
        (function(){
            const accountBtn = document.getElementById('accountBtn');
            const accountMenu = document.getElementById('accountMenu');
            const backBtnDenied = document.getElementById('backBtnDenied');
            if (accountBtn && accountMenu) {
                accountBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isHidden = accountMenu.hasAttribute('hidden');
                    if (isHidden) {
                        accountMenu.removeAttribute('hidden');
                        accountBtn.setAttribute('aria-expanded', 'true');
                    } else {
                        accountMenu.setAttribute('hidden', '');
                        accountBtn.setAttribute('aria-expanded', 'false');
                    }
                });
                document.addEventListener('click', (e) => {
                    if (!accountMenu.contains(e.target) && e.target !== accountBtn) {
                        accountMenu.setAttribute('hidden', '');
                        accountBtn.setAttribute('aria-expanded', 'false');
                    }
                });
            }
            if (backBtnDenied) {
                backBtnDenied.addEventListener('click', () => {
                    window.location.href = '/my-teams.html';
                });
            }
        })();
    </script>
</body>
</html>
