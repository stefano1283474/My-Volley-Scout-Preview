<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elenco Player - MyVolleyScout</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        background: #f8f9fa;
        color: #212529;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .title {
        font-size: 1.2rem;
        font-weight: 700;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: #0d6efd;
        color: #fff;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn.secondary {
        background: #ffffff;
        color: #0d6efd;
        border: 1px solid #e9ecef;
      }
      .card {
        background: #fff;
        border: 1px solid #e9ecef;
        border-radius: 12px;
        padding: 14px;
      }
      .card-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 12px;
      }
      .players-table {
        width: 100%;
        border-collapse: collapse;
      }
      .players-table th,
      .players-table td {
        border-bottom: 1px solid #e9ecef;
        text-align: left;
        padding: 8px 6px;
        font-size: 0.95rem;
      }
      .empty-note {
        color: #6b7280;
        font-weight: 600;
        padding: 10px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <button id="backBtn" class="btn secondary">Indietro</button>
        <div class="title">Elenco Player</div>
        <div style="width: 88px"></div>
      </div>

      <div class="card">
        <div class="card-actions">
          <button id="saveRosterBtn" class="btn">Salva in Partita</button>
          <button id="exportXlsBtn" class="btn secondary">Esporta XLS</button>
        </div>
        <div id="playersPanel"></div>
      </div>
    </div>

    <script>
      (function () {
        function safeJsonParse(raw, fallback) {
          try { return raw ? JSON.parse(raw) : fallback; } catch (_) { return fallback; }
        }
        function normalizePlayer(p) {
          var o = (p && typeof p === 'object') ? p : {};
          return {
            number: String(o.number || o.numero || o.maglia || '').trim(),
            name: String(o.name || o.nome || o.firstName || '').trim(),
            surname: String(o.surname || o.cognome || o.lastName || '').trim(),
            nickname: String(o.nickname || o.soprannome || o.nick || '').trim(),
            role: String(o.role || o.ruolo || o.position || o.posizione || '').trim()
          };
        }
        function rosterQualityScore(list) {
          if (!Array.isArray(list) || list.length === 0) return 0;
          var score = 0;
          for (var i = 0; i < list.length; i++) {
            var p = normalizePlayer(list[i]);
            if (p.number) score += 1;
            if (p.name) score += 1;
            if (p.surname) score += 1;
            if (p.nickname) score += 1;
            if (p.role) score += 1;
          }
          return score;
        }
        function pickBestRoster(candidates) {
          var best = [];
          var bestScore = -1;
          for (var i = 0; i < candidates.length; i++) {
            var r = candidates[i];
            if (!Array.isArray(r) || r.length === 0) continue;
            var sc = rosterQualityScore(r);
            if (sc > bestScore) {
              bestScore = sc;
              best = r;
            }
          }
          return Array.isArray(best) ? best : [];
        }
        function getMatchRoster() {
          var candidates = [];
          try {
            var sess = safeJsonParse(localStorage.getItem('currentScoutingSession'), {});
            if (Array.isArray(sess.roster) && sess.roster.length) candidates.push(sess.roster);
          } catch (_) {}
          try {
            var imported = safeJsonParse(localStorage.getItem('importedRoster'), []);
            if (Array.isArray(imported) && imported.length) candidates.push(imported);
          } catch (_) {}
          try {
            var saved = safeJsonParse(localStorage.getItem('savedRosters'), []);
            if (Array.isArray(saved) && saved.length) {
              for (var i = 0; i < saved.length; i++) {
                var item = saved[i] || {};
                var rr = Array.isArray(item.roster) ? item.roster : (Array.isArray(item.players) ? item.players : []);
                if (Array.isArray(rr) && rr.length) candidates.push(rr);
              }
            }
          } catch (_) {}
          var roster = pickBestRoster(candidates);
          return roster.map(normalizePlayer).filter(function (p) {
            return p.number || p.name || p.surname || p.nickname || p.role;
          });
        }
        function escapeHtml(str) {
          return String(str || '').replace(/[&<>"']/g, function (ch) {
            if (ch === '&') return '&amp;';
            if (ch === '<') return '&lt;';
            if (ch === '>') return '&gt;';
            if (ch === '"') return '&quot;';
            return '&#39;';
          });
        }
        function renderPlayers() {
          var panel = document.getElementById('playersPanel');
          if (!panel) return;
          var players = getMatchRoster();
          if (!players.length) {
            panel.innerHTML = '<div class="empty-note">Nessun giocatore presente per questa partita</div>';
            return;
          }
          var rows = players.map(function (p) {
            var nn = p.number ? ("'" + escapeHtml(p.number)) : '';
            return '<tr>'
              + '<td style="width:6ch;">' + nn + '</td>'
              + '<td>' + escapeHtml(p.name) + '</td>'
              + '<td>' + escapeHtml(p.surname) + '</td>'
              + '<td>' + escapeHtml(p.nickname) + '</td>'
              + '<td style="width:6ch;">' + escapeHtml(p.role) + '</td>'
              + '</tr>';
          }).join('');
          panel.innerHTML = '<table class="players-table"><thead><tr><th>N°</th><th>Nome</th><th>Cognome</th><th>Nick</th><th>Ruolo</th></tr></thead><tbody>' + rows + '</tbody></table>';
        }
        function savePlayersToSession() {
          try {
            var sess = safeJsonParse(localStorage.getItem('currentScoutingSession'), {});
            sess.roster = getMatchRoster();
            localStorage.setItem('currentScoutingSession', JSON.stringify(sess));
            alert('Elenco player salvato nella partita');
          } catch (_) {
            alert('Errore salvataggio elenco player');
          }
        }
        document.addEventListener('DOMContentLoaded', function () {
          renderPlayers();
          var save = document.getElementById('saveRosterBtn');
          if (save) save.addEventListener('click', savePlayersToSession);
          var exp = document.getElementById('exportXlsBtn');
          if (exp) exp.addEventListener('click', async function () {
            try {
              if (typeof window.exportAllSetsToExcel === 'function') {
                await window.exportAllSetsToExcel();
              } else {
                alert('Esporta non disponibile su questa pagina');
              }
            } catch (_) {}
          });
          var back = document.getElementById('backBtn');
          if (back) {
            back.addEventListener('click', function (e) {
              e.preventDefault();
              try {
                if (window.history && history.length > 1) history.back();
                else location.href = '/scouting.html';
              } catch (_) {
                location.href = '/scouting.html';
              }
            });
          }
        });
      })();
    </script>
  </body>
</html>
