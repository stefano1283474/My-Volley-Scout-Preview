<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Volley Scout - Gestione Roster</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="animations.css?v=1" />
</head>
<body>
  <!-- Top App Bar coerente con le altre pagine -->
  <header class="topappbar" style="--topbar-h:81px;">
    <div class="topappbar-content">
      <div class="topappbar-left">
        <a href="matches.html" class="back-btn" aria-label="Elenco Partite" title="Elenco Partite" style="text-decoration:none;">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true">
            <path d="M15.5 19a1 1 0 0 1-.71-.29l-6-6a1 1 0 0 1 0-1.42l6-6a1 1 0 0 1 1.42 1.42L10.92 12l5.29 5.29A1 1 0 0 1 15.5 19z"/>
          </svg>
        </a>
      </div>
      <div class="topappbar-center">
        <img src="LOGO_APP.png" alt="My Volley Scout" class="app-logo" />
      </div>
      <div class="topappbar-right">
        <button id="accountBtn" class="top-account-btn" title="Account" aria-label="Account">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5zm0 2c-4.418 0-8 2.239-8 5v2h16v-2c0-2.761-3.582-5-8-5z"/>
          </svg>
          <span>Account</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="section">
      <div class="section-header">
        <h3>Roster</h3>
        <div class="section-actions">
          <button class="btn btn-primary" id="confirmRosterBtn">Salva ed esci</button>
        </div>
      </div>

      <div id="teamInfo" class="form two-rows" style="margin: 8px 0 12px 0;">
        <div class="form-group">
          <label for="rosterClubNameInput">Nome Società</label>
          <input id="rosterClubNameInput" type="text" placeholder="Es. Bollate Team Volley" />
        </div>
        <div class="form-group">
          <label for="rosterTeamNameInput">Nome Squadra</label>
          <input id="rosterTeamNameInput" type="text" placeholder="Es. 2Div F" />
        </div>
      </div>
      <!-- Azioni extra rimosse per UX semplificata su mobile -->
      <input type="file" id="rosterImportFile" accept=".csv" style="display:none;" />
    </section>

    <section class="section">
      <div class="roster-grid" id="rosterGrid">
        <div class="player-row player-header">
          <div>N</div>
          <div>Nome</div>
          <div>Cognome</div>
          <div>Soprannome</div>
          <div>Ruolo</div>
          <div class="actions-header">Azioni</div>
        </div>
      </div>
    </section>
  </main>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="./connection-manager.js"></script>
  <script src="./firebase-config.js"></script>
  <script src="./firestore-service.js"></script>
  <script src="./auth.js"></script>
  <script src="./src/modules/teams/teams.js"></script>

  <script>
    let currentUser = null;
    let currentSession = null;
    let currentMatchId = null;

    const userEmail = document.getElementById('userEmail');
    const accountBtn = document.getElementById('accountBtn');
    const rosterTeamNameInput = document.getElementById('rosterTeamNameInput');
    const rosterClubNameInput = document.getElementById('rosterClubNameInput');
    const rosterGrid = document.getElementById('rosterGrid');
    const importRosterBtn = document.getElementById('importRosterBtn');
    const rosterImportFile = document.getElementById('rosterImportFile');
    const exportRosterBtn = document.getElementById('exportRosterBtn');
    const clearRosterBtn = document.getElementById('clearRosterBtn');
    const deleteRosterBtn = document.getElementById('deleteRosterBtn');
    const confirmRosterBtn = document.getElementById('confirmRosterBtn');

    document.addEventListener('DOMContentLoaded', initializeRosterPage);

    function initializeRosterPage(){
      if (typeof window.authFunctions === 'undefined'){
        setTimeout(initializeRosterPage, 200);
        return;
      }

      window.authFunctions.onAuthStateChanged((user) => {
        if (!user){ window.location.href = '/auth-login.html'; return; }
        currentUser = user;
        try { currentSession = JSON.parse(localStorage.getItem('currentScoutingSession')||'{}'); } catch(_) { currentSession = null; }
        currentMatchId = (currentSession && currentSession.id) ? currentSession.id : localStorage.getItem('selectedMatchId');
        if (!currentMatchId){
          alert('Nessuna partita selezionata. Torno a Elenco Partite.');
          window.location.href = 'matches.html';
          return;
        }
        renderRosterEditor();
      });

      // Bind UI actions
    if (accountBtn) accountBtn.addEventListener('click', () => { window.location.href = '/auth-login.html'; });
      if (importRosterBtn) importRosterBtn.addEventListener('click', () => rosterImportFile && rosterImportFile.click());
      if (rosterImportFile) rosterImportFile.addEventListener('change', (e) => {
        const f = e.target.files && e.target.files[0];
        if (f) importRosterCSV(f);
        e.target.value = '';
      });
      if (exportRosterBtn) exportRosterBtn.addEventListener('click', exportSelectedTeamCSV);
      if (clearRosterBtn) clearRosterBtn.addEventListener('click', clearRosterFields);
      if (deleteRosterBtn) deleteRosterBtn.addEventListener('click', deleteCurrentRoster);
      if (confirmRosterBtn) confirmRosterBtn.addEventListener('click', confirmRosterAndProceed);
    }

    function renderRosterEditor(){
      const header = rosterGrid.querySelector('.player-header');
      rosterGrid.innerHTML = '';
      if (header) rosterGrid.appendChild(header);
      let players = [];
      try {
        const list = JSON.parse(localStorage.getItem('volleyMatches')||'[]');
        const m = Array.isArray(list) ? list.find(x => x.id === currentMatchId) : null;
        players = Array.isArray(m?.roster) ? m.roster : Array.isArray(currentSession?.roster) ? currentSession.roster : [];
      } catch(_) {}
      if (!players.length) { for (let i = 0; i < 7; i++) addRosterRow(); }
      else { players.forEach(p => addRosterRow(p)); }
      addRosterRow();
    }

    function addRosterRow(player = {}){
      const row = document.createElement('div');
      row.className = 'player-row';
      row.innerHTML = `
        <div><input type="text" class="input num-input" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="#" value="${(player.number || '').toString().slice(0,2)}" /></div>
        <div><input type="text" class="input name-input" maxlength="12" placeholder="Nome" value="${(player.name || '').toString().slice(0,12)}" /></div>
        <div><input type="text" class="input surname-input" maxlength="12" placeholder="Cognome" value="${(player.surname || '').toString().slice(0,12)}" /></div>
        <div><input type="text" class="input nick-input" maxlength="12" placeholder="Soprannome" value="${(player.nickname || '').toString().slice(0,12)}" /></div>
        <div class="role-cell" data-empty="1">
          <select class="input role-select">
            <option value="">—</option>
            <option value="P">P</option>
            <option value="S">S</option>
            <option value="O">O</option>
            <option value="C">C</option>
            <option value="L">L</option>
          </select>
        </div>
        <div><button type="button" class="btn delete-btn" aria-label="Rimuovi" onclick="this.closest('.player-row').remove();">✕</button></div>`;
      // Pre-seleziona ruolo se presente
      const roleSel = row.querySelector('.role-select');
      const roleCell = row.querySelector('.role-cell');
      if (roleSel){
        const val = (player.role || '').toString().trim().toUpperCase();
        const initial = val ? val[0] : '';
        roleSel.value = ['P','S','O','C','L'].includes(val) ? val : (['P','S','O','C','L'].includes(initial) ? initial : '');
        if (roleCell) roleCell.dataset.empty = roleSel.value ? '0' : '1';
        roleSel.addEventListener('change', () => {
          if (roleCell) roleCell.dataset.empty = roleSel.value ? '0' : '1';
        });
      }
      rosterGrid.appendChild(row);
    }

    function clearRosterFields(){
      if (!confirm('Sicuro di voler pulire tutti i campi del roster?')) return;
      const header = rosterGrid.querySelector('.player-header');
      rosterGrid.innerHTML = '';
      if (header) rosterGrid.appendChild(header);
      for (let i = 0; i < 7; i++) addRosterRow();
    }

    async function confirmRosterAndProceed(){
      try {
        const rows = Array.from(rosterGrid.querySelectorAll('.player-row'));
        const players = rows.map(r => {
          const number = (r.querySelector('.num-input')?.value || '').trim();
          const name = (r.querySelector('.name-input')?.value || '').trim();
          const surname = (r.querySelector('.surname-input')?.value || '').trim();
          const role = (r.querySelector('.role-select')?.value || '').trim();
          const nickname = (r.querySelector('.nick-input')?.value || '').trim().slice(0,12);
          return { number, name, surname, role, nickname };
        }).filter(p => p && (p.number || p.name || p.surname || p.role || p.nickname));
        // Aggiorna match in archivio locale
        const list = JSON.parse(localStorage.getItem('volleyMatches')||'[]');
        for (let i=0; i<list.length; i++) { if (list[i].id === currentMatchId) { list[i].roster = players; } }
        localStorage.setItem('volleyMatches', JSON.stringify(list));
        // Aggiorna sessione corrente
        try { const sess = JSON.parse(localStorage.getItem('currentScoutingSession')||'{}'); if (sess && sess.id === currentMatchId) { sess.roster = players; localStorage.setItem('currentScoutingSession', JSON.stringify(sess)); } } catch(_) {}
        alert('Elenco giocatori salvato sulla partita.');
        window.location.href = 'index.html';
      } catch (e) {
        console.error(e);
        alert('Errore nel salvataggio dell\'elenco giocatori: ' + e.message);
      }
    }

    function exportSelectedTeamCSV(){
      try {
        const rows = Array.from(rosterGrid.querySelectorAll('.player-row'));
        const players = rows.map(r => {
          const number = (r.querySelector('.num-input')?.value || '').trim();
          const name = (r.querySelector('.name-input')?.value || '').trim();
          const surname = (r.querySelector('.surname-input')?.value || '').trim();
          const role = (r.querySelector('.role-select')?.value || '').trim();
          const nickname = (r.querySelector('.nick-input')?.value || '').trim().slice(0,12);
          return { number, name, surname, role, nickname };
        }).filter(p => p && (p.number || p.name || p.surname || p.role || p.nickname));
        const teamNameExp = (rosterTeamNameInput && rosterTeamNameInput.value.trim()) || '';
        const clubNameExp = (rosterClubNameInput && rosterClubNameInput.value.trim()) || '';
        const currentName = teamNameExp + (clubNameExp ? ` - ${clubNameExp}` : '');
        const header = ['Squadra','Numero','Nome','Cognome','Ruolo','Soprannome'];
        const lines = [header.join(',')];
        players.forEach(p => {
          const vals = [currentName || '', p.number || '', p.name || '', p.surname || '', p.role || '', p.nickname || ''];
          lines.push(vals.map(v => {
            const s = String(v).replace(/"/g, '""');
            return /[",\n]/.test(s) ? '"' + s + '"' : s;
          }).join(','));
        });
        const csv = lines.join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const safeName = (currentName || 'roster').replace(/[^a-z0-9_-]+/gi, '-');
        a.download = `${safeName}_roster_${new Date().toLocaleDateString('it-IT').replace(/\//g, '-')}.csv`;
        a.click();
        window.URL.revokeObjectURL(url);
      } catch (e) {
        console.error(e);
        alert('Impossibile esportare il roster.');
      }
    }

    function importRosterCSV(file){
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const text = reader.result;
          const lines = text.split(/\r?\n/).filter(l => l.trim());
          if (lines.length < 2) throw new Error('Il file CSV deve avere intestazione e almeno una riga di dati.');
          const headers = splitCSVLine(lines[0]).map(h => h.trim().toLowerCase());
          const idx = {
            numero: headers.indexOf('numero'),
            nome: headers.indexOf('nome'),
            cognome: headers.indexOf('cognome'),
            ruolo: headers.indexOf('ruolo'),
            soprannome: headers.indexOf('soprannome')
          };
          if (idx.numero === -1 || idx.nome === -1 || idx.cognome === -1 || idx.ruolo === -1){
            throw new Error('Intestazioni richieste mancanti. Richieste: Numero, Nome, Cognome, Ruolo. Opzionale: Soprannome');
          }
          const importedPlayers = [];
          for (let i = 1; i < lines.length; i++){
            const cols = splitCSVLine(lines[i]);
            if (!cols.length) continue;
            const player = {
              number: idx.numero !== -1 ? (cols[idx.numero] || '').trim() : '',
              name: idx.nome !== -1 ? (cols[idx.nome] || '').trim() : '',
              surname: idx.cognome !== -1 ? (cols[idx.cognome] || '').trim() : '',
              role: idx.ruolo !== -1 ? (cols[idx.ruolo] || '').trim() : '',
              nickname: idx.soprannome !== -1 ? (cols[idx.soprannome] || '').trim().slice(0,12) : ''
            };
            if (player.number || player.name || player.surname || player.role || player.nickname){
              importedPlayers.push(player);
            }
          }
          if (!importedPlayers.length){
            alert('Nessun giocatore importato. Verifica che il file contenga i campi richiesti.');
            return;
          }
          const header = rosterGrid.querySelector('.player-header');
          rosterGrid.innerHTML = '';
          if (header) rosterGrid.appendChild(header);
          importedPlayers.forEach(p => addRosterRow(p));
          alert(`Import completato: ${importedPlayers.length} giocatori caricati. Premi "Conferma e procedi" per salvare.`);
        } catch(err){
          console.error(err);
          alert('Errore nell\'importazione CSV: ' + err.message);
        }
      };
      reader.onerror = () => alert('Impossibile leggere il file CSV selezionato.');
      reader.readAsText(file);
    }

    async function deleteCurrentRoster(){
      const ok = confirm('Eliminare definitivamente l\'elenco giocatori della partita?');
      if (!ok) return;
      try {
        const list = JSON.parse(localStorage.getItem('volleyMatches')||'[]');
        for (let i=0; i<list.length; i++) { if (list[i].id === currentMatchId) { list[i].roster = []; } }
        localStorage.setItem('volleyMatches', JSON.stringify(list));
        try { const sess = JSON.parse(localStorage.getItem('currentScoutingSession')||'{}'); if (sess && sess.id === currentMatchId) { sess.roster = []; localStorage.setItem('currentScoutingSession', JSON.stringify(sess)); } } catch(_) {}
        renderRosterEditor();
        alert('Elenco giocatori eliminato dalla partita.');
      } catch(err){
        console.error(err);
        alert('Errore durante l\'eliminazione del roster: ' + err.message);
      }
    }

    function splitCSVLine(line){
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++){
        const ch = line[i];
        if (ch === '"'){
          if (inQuotes && i + 1 < line.length && line[i+1] === '"'){ current += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (ch === ',' && !inQuotes){ result.push(current); current = ''; }
        else { current += ch; }
      }
      result.push(current);
      return result;
    }
  </script>
</body>
</html>
